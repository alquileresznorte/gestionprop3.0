  DB.ref('finanzas/variables').on('value',function(s){FD.variables=s.exists()?s.val():{};loaded['finanzas/variables']=true;checkDone();});
  DB.ref('finanzas/usd').on('value',function(s){FD.usd=s.exists()?s.val():{};loaded['finanzas/usd']=true;checkDone();});
  DB.ref('finanzas/ovs').on('value',function(s){FD.ovs=s.exists()?s.val():{};loaded['finanzas/ovs']=true;checkDone();});
  DB.ref('finanzas/cats').on('value',function(s){FD.cats=s.exists()?s.val():{};loaded['finanzas/cats']=true;checkDone();});
}

function dbSet(path,val,cb){
  setSyncDot(true);
  DB.ref(path).set(val,function(){setSyncDot(false);if(cb)cb();});
}
function dbUpdate(path,val,cb){
  setSyncDot(true);
  DB.ref(path).update(val,function(){setSyncDot(false);if(cb)cb();});
}
function dbRemove(path,cb){
  setSyncDot(true);
  DB.ref(path).remove(function(){setSyncDot(false);if(cb)cb();});
}
function dbPush(path,val,cb){

}

// в”Ђв”Ђ CONSTRUIR ITEMS CTA SOCIOS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildItems(mesKey){
  var items=[];
  allMovs.forEach(function(mv){
    if(!mv.fecha||!mv.fecha.startsWith(mesKey))return;
    var quien=mv.cuenta==='Cuenta Loli'?'loli':mv.cuenta==='Cuenta Hugo'?'hugo':null;
    if(!quien)return;
    var monto=Number(mv.monto||0);
    items.push({
      id:'mv__'+mv.fecha+'__'+(mv.nota||'')+'__'+monto,
      fecha:mv.fecha,
      concepto:(mv.tipo==='retiro'?'Retiro':'Aporte')+' вЂ” '+(mv.nota||''),
      medio:mv.cuenta_caja||mv.medio||'Efectivo',
      monto:mv.tipo==='retiro'?monto:-monto,
      quien:quien
    });
  });
  allCobs.forEach(function(cob){
    if(!cob.pagos)return;
    Object.values(cob.pagos).forEach(function(pago){
      if(!pago.fecha||!pago.fecha.startsWith(mesKey))return;
      var medio=pago.cuenta||'';
      var quien=CTAS_LOLI.indexOf(medio)>=0?'loli':CTAS_HUGO.indexOf(medio)>=0?'hugo':null;
      if(!quien)return;
      var monto=Number(pago.monto||0);
      items.push({
        id:'cob__'+pago.fecha+'__'+(cob.unidad||'')+'__'+(cob.inq||'').split(',')[0]+'__'+monto,
        fecha:pago.fecha,
        concepto:'Cobro '+(cob.unidad||'')+' '+(cob.inq||'').split(',')[0],
        medio:medio,
        monto:monto,
        quien:quien
      });
    });
  });
  items.sort(function(a,b){return(a.fecha||'').localeCompare(b.fecha||'');});
  return items;
}

function fmt(n,c){if(c==='USD')return 'U$S '+Math.round(n).toLocaleString('es-AR');return '$ '+Math.round(n).toLocaleString('es-AR');}
function fmtP(n){return '$ '+Math.round(n).toLocaleString('es-AR');}

function diasHasta(dia){
  if(!dia)return 999;
  var hoy=new Date();
  var venc=new Date(curYear,curMonth,Number(dia));
  return Math.round((venc-hoy)/86400000);
}
