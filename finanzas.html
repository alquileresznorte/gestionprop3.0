<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Finanzas · Loli & Hugo</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F172A;color:#F1F5F9;font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;font-size:14px}
input,select,button{font-family:inherit;font-size:14px}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:32px 28px;width:100%;max-width:300px;text-align:center}
.login-logo{font-size:40px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#64748B;margin-bottom:24px}
.login-input{width:100%;padding:12px;font-size:24px;letter-spacing:8px;text-align:center;border-radius:10px;border:1px solid #334155;background:#0F172A;color:#F1F5F9;margin-bottom:12px}
.login-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#3B82F6;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{background:#2563EB}
.login-error{color:#EF4444;font-size:12px;margin-top:8px;display:none}

/* APP */
#app-screen{display:none;min-height:100vh}
.top-bar{background:#1E293B;border-bottom:1px solid #334155;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:10}
.top-bar-title{font-weight:700;font-size:15px;color:#F1F5F9}
.month-nav{display:flex;align-items:center;gap:6px;font-size:13px;color:#94A3B8}
.month-nav button{background:none;border:none;cursor:pointer;color:#94A3B8;font-size:18px;padding:2px 6px;border-radius:6px}
.month-nav button:hover{background:#334155}
.tabs{display:flex;background:#1E293B;border-bottom:1px solid #334155;overflow-x:auto;padding:0 12px}
.tab{padding:12px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:#64748B;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#3B82F6;border-bottom-color:#3B82F6}
.content{padding:16px;max-width:700px;margin:0 auto}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#64748B;margin-bottom:10px}
.card{background:#1E293B;border-radius:12px;border:1px solid #334155;padding:14px;margin-bottom:8px}
.expense-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#1E293B;margin-bottom:6px}
.expense-name{font-size:13px;color:#F1F5F9}
.expense-rubro{font-size:11px;color:#64748B;margin-top:2px}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-loli{background:#D4537E22;color:#D4537E}
.badge-hugo{background:#185FA522;color:#60A5FA}
.badge-shared{background:#1D9E7522;color:#34D399}
.amount{font-size:13px;font-weight:700;color:#F1F5F9;text-align:right;min-width:80px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:#64748B;font-size:15px}
.btn-icon:hover{background:#334155;color:#94A3B8}
.add-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;border:1px dashed #334155;background:none;color:#64748B;font-size:13px;cursor:pointer;width:100%;margin-top:8px;justify-content:center}
.add-btn:hover{background:#1E293B;color:#94A3B8}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.metric-card{background:#1E293B;border-radius:10px;border:1px solid #334155;padding:12px 14px}
.metric-label{font-size:11px;color:#64748B;margin-bottom:4px}
.metric-value{font-size:16px;font-weight:700;color:#F1F5F9}
.resumen-block{background:#1E293B;border:1px solid #334155;border-radius:10px;overflow:hidden;margin-bottom:12px}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:13px;border-bottom:1px solid #334155}
.resumen-row:last-child{border-bottom:none}
.resumen-row.total{font-weight:700;background:#0F172A}
.resumen-label{color:#94A3B8}
.split-bar{height:5px;border-radius:3px;background:#334155;overflow:hidden;display:flex;margin:5px 0 2px}
.split-bar-fill{height:100%}
.gp-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1E293B;border:1px solid #334155;margin-bottom:14px;font-size:12px;color:#64748B}
.gp-dot{width:8px;height:8px;border-radius:50%;background:#10B981}
.gp-dot.loading{background:#F59E0B;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.usd-card{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:20px;text-align:center;margin-bottom:14px}
.usd-amount{font-size:36px;font-weight:800;color:#F1F5F9}
.usd-label{font-size:13px;color:#64748B;margin-top:4px}
.withdrawals-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;border:1px solid #334155;margin-bottom:6px;font-size:13px}
.withdrawal-detail{font-size:11px;color:#64748B;margin-top:1px}
.disappeared{display:flex;align-items:center;gap:6px;padding:10px 12px;border-radius:8px;background:#F59E0B11;border:1px solid #F59E0B33;margin-top:10px}
.empty-state{text-align:center;padding:32px 20px;color:#64748B;font-size:13px}
.logout-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#64748B;padding:4px 8px;border-radius:6px}
.logout-btn:hover{background:#334155}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#1E293B;border-radius:14px;border:1px solid #334155;padding:20px;width:100%;max-width:340px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;color:#94A3B8;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-row{display:flex;gap:8px}
select,input[type=text],input[type=number]{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #334155;background:#0F172A;color:#F1F5F9}
.who-btns{display:flex;gap:6px}
.who-btn{flex:1;padding:8px 4px;font-size:12px;font-weight:600;border-radius:8px;border:1.5px solid #334155;cursor:pointer;background:none;color:#64748B}
.who-btn.sel-loli{border-color:#D4537E;background:#D4537E22;color:#D4537E}
.who-btn.sel-hugo{border-color:#3B82F6;background:#3B82F622;color:#60A5FA}
.who-btn.sel-shared{border-color:#10B981;background:#10B98122;color:#34D399}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:9px;border-radius:8px;border:1px solid #334155;background:none;color:#94A3B8;cursor:pointer}
.btn-save{flex:2;padding:9px;border-radius:8px;border:none;background:#3B82F6;color:#fff;cursor:pointer;font-weight:700}
.btn-save:hover{background:#2563EB}
details summary{cursor:pointer;font-size:12px;color:#64748B;padding:4px 0;margin-bottom:8px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💰</div>
    <div class="login-title">Finanzas</div>
    <div class="login-sub">Loli & Hugo</div>
    <input class="login-input" type="password" id="pin-input" maxlength="6" placeholder="••••" autocomplete="off"/>
    <button class="login-btn" onclick="tryLogin()">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">💰</span>
      <span class="top-bar-title">Finanzas · Loli & Hugo</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="month-label">mayo 2026</span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'resumen')">📊 Resumen</button>
    <button class="tab" onclick="switchTab(this,'fijos')">📅 Fijos</button>
    <button class="tab" onclick="switchTab(this,'variables')">🧾 Variables</button>
    <button class="tab" onclick="switchTab(this,'ahorros')">💵 USD</button>
  </div>

  <div class="content">
    <div id="tab-resumen"></div>
    <div id="tab-fijos" style="display:none"></div>
    <div id="tab-variables" style="display:none"></div>
    <div id="tab-ahorros" style="display:none"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Nuevo gasto</h3>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <input type="text" id="m-desc" placeholder="Ej: Supermercado, Nafta..."/>
    </div>
    <div class="form-group" id="m-rubro-group">
      <label class="form-label">Rubro</label>
      <select id="m-rubro">
        <option value="Hogar">🏠 Hogar</option>
        <option value="Alimentación">🛒 Alimentación</option>
        <option value="Salud">💊 Salud</option>
        <option value="Educación">📚 Educación</option>
        <option value="Transporte">🚗 Transporte</option>
        <option value="Entretenimiento">🎬 Entretenimiento</option>
        <option value="Ropa">👗 Ropa</option>
        <option value="Viajes">✈️ Viajes</option>
        <option value="Personal">🙋 Personal</option>
        <option value="Otro">📦 Otro</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" id="m-amount-label">Monto</label>
      <div class="form-row">
        <input type="number" id="m-amount" placeholder="0" min="0" style="width:130px"/>
        <select id="m-currency" style="width:90px">
          <option value="ARS">$ ARS</option>
          <option value="USD">U$S</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="m-who-group">
      <label class="form-label">¿De quién es?</label>
      <div class="who-btns">
        <button class="who-btn" onclick="selectWho('loli',this)">💜 Loli</button>
        <button class="who-btn" onclick="selectWho('hugo',this)">💙 Hugo</button>
        <button class="who-btn" onclick="selectWho('shared',this)">🤝 50/50</button>
      </div>
    </div>
    <div class="form-group" id="m-ahorro-type-group" style="display:none">
      <label class="form-label">Tipo</label>
      <select id="m-ahorro-type">
        <option value="deposito">Depósito</option>
        <option value="retiro">Retiro</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

<script>
var PASSWORD='3194';
var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var currentMonth=4,currentYear=2026;
var modalType='variable',selectedWho='shared';
var gpStatus='loading';
var data={};
var gpRetiros={loli:0,hugo:0};
var gpMovsDetail=[];

firebase.initializeApp({
  apiKey:"AIzaSyDhuSP_WTWI3hqf5GqgFExkptFfpqJUn50",
  authDomain:"gestion-prop.firebaseapp.com",
  databaseURL:"https://gestion-prop-default-rtdb.firebaseio.com",
  projectId:"gestion-prop"
});
var DB=firebase.database();

// LOGIN
document.getElementById('pin-input').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
function tryLogin(){
  var val=document.getElementById('pin-input').value;
  if(val===PASSWORD){
    try{sessionStorage.setItem('fin_auth','1');}catch(e){}
    showApp();
  } else {
    var err=document.getElementById('login-error');
    err.style.display='block';
    document.getElementById('pin-input').value='';
    setTimeout(function(){err.style.display='none';},2000);
  }
}
function doLogout(){
  try{sessionStorage.removeItem('fin_auth');}catch(e){}
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pin-input').value='';
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  loadData();
  loadGPRetiros();
}
try{if(sessionStorage.getItem('fin_auth')==='1')showApp();}catch(e){}

// DATA
function KEY(){return currentYear+'-'+String(currentMonth).padStart(2,'0');}
function getMonthData(){
  var k=currentYear+'-'+currentMonth;
  if(!data[k])data[k]={fijos:[],variables:[],ahorros:[]};
  return data[k];
}
function saveData(){try{localStorage.setItem('finanzas_data',JSON.stringify(data));}catch(e){}}
function loadData(){try{var d=localStorage.getItem('finanzas_data');if(d)data=JSON.parse(d);}catch(e){}render();}

// GP RETIROS
function loadGPRetiros(){
  gpStatus='loading';updateGPBanner();
  DB.ref('movs').on('value',function(snap){
    var movs=snap.exists()?snap.val():{};
    var mesKey=KEY();
    var ll=0,hh=0,detail=[];
    Object.values(movs).forEach(function(mv){
      if(!mv.fecha||!mv.fecha.startsWith(mesKey))return;
      if(mv.tipo!=='retiro')return;
      var monto=Number(mv.monto||0);
      if(mv.cuenta==='Cuenta Loli'){ll+=monto;detail.push({quien:'loli',monto:monto,nota:mv.nota||'',fecha:mv.fecha});}
      else if(mv.cuenta==='Cuenta Hugo'){hh+=monto;detail.push({quien:'hugo',monto:monto,nota:mv.nota||'',fecha:mv.fecha});}
    });
    gpRetiros={loli:ll,hugo:hh};
    gpMovsDetail=detail.sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
    gpStatus='ok';render();
  },function(){gpStatus='error';render();});
}

function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  document.getElementById('month-label').textContent=MONTHS[currentMonth]+' '+currentYear;
  loadGPRetiros();
}
function switchTab(el,name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  ['resumen','fijos','variables','ahorros'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  render();
}

// HELPERS
function fmt(n,cur){
  if(cur==='USD')return 'U$S '+Math.round(n).toLocaleString('es-AR');
  return '$ '+Math.round(n).toLocaleString('es-AR');
}
function badgeClass(who){return who==='loli'?'badge-loli':who==='hugo'?'badge-hugo':'badge-shared';}
function badgeLabel(who){return who==='loli'?'💜 Loli':who==='hugo'?'💙 Hugo':'🤝 50/50';}
function personShare(item){
  if(item.who==='loli')return{loli:item.amount,hugo:0};
  if(item.who==='hugo')return{loli:0,hugo:item.amount};
  return{loli:item.amount/2,hugo:item.amount/2};
}
function updateGPBanner(){
  var b=document.getElementById('gp-banner');if(!b)return;
  if(gpStatus==='loading')b.innerHTML='<div class="gp-dot loading"></div><span>Conectando con GestionProp...</span>';
  else if(gpStatus==='ok')b.innerHTML='<div class="gp-dot"></div><span>GestionProp conectado · retiros del mes cargados automáticamente</span>';
  else b.innerHTML='<div class="gp-dot" style="background:#EF4444"></div><span>Sin conexión con GestionProp</span>';
}

// RENDER
function render(){renderResumen();var a=document.querySelector('.tab.active');if(!a)return;var t=a.textContent;if(t.includes('Fijo'))renderFijos();else if(t.includes('Variable'))renderVariables();else if(t.includes('USD'))renderAhorros();}

function renderList(id,items,type){
  var el=document.getElementById(id);if(!el)return;
  if(!items||!items.length){el.innerHTML='<div class="empty-state">📭<br>Sin registros este mes</div>';return;}
  el.innerHTML=items.map(function(item,i){
    return '<div class="expense-row"><div><div class="expense-name">'+item.desc+'</div>'+(item.rubro?'<div class="expense-rubro">'+item.rubro+'</div>':'')+'</div><span class="badge '+badgeClass(item.who)+'">'+badgeLabel(item.who)+'</span><span class="amount">'+fmt(item.amount,item.currency||'ARS')+'</span><button class="btn-icon" onclick="removeItem(\''+type+'\','+i+')">🗑</button></div>';
  }).join('');
}

function renderFijos(){
  var el=document.getElementById('tab-fijos');if(!el)return;
  var d=getMonthData();
  el.innerHTML='<div class="section-title">Gastos fijos del mes</div><div id="fijos-list"></div><button class="add-btn" onclick="openModal(\'fijo\')">＋ Agregar gasto fijo</button>';
  renderList('fijos-list',d.fijos,'fijo');
}
function renderVariables(){
  var el=document.getElementById('tab-variables');if(!el)return;
  var d=getMonthData();
  el.innerHTML='<div class="section-title">Gastos del mes</div><div id="variables-list"></div><button class="add-btn" onclick="openModal(\'variable\')">＋ Agregar gasto</button>';
  renderList('variables-list',d.variables,'variable');
}
function renderAhorros(){
  var el=document.getElementById('tab-ahorros');if(!el)return;
  var d=getMonthData();
  var total=(d.ahorros||[]).reduce(function(s,a){return s+(a.tipo==='deposito'?a.amount:-a.amount);},0);
  el.innerHTML='<div class="usd-card"><div class="usd-label">Ahorro compartido en dólares</div><div class="usd-amount">U$S '+Math.round(total).toLocaleString('es-AR')+'</div></div><div class="section-title">Movimientos</div><div id="ahorros-list"></div><button class="add-btn" onclick="openModal(\'ahorro\')">＋ Registrar movimiento</button>';
  var listEl=document.getElementById('ahorros-list');
  if(!(d.ahorros||[]).length){listEl.innerHTML='<div class="empty-state">Sin movimientos este mes</div>';return;}
  listEl.innerHTML=(d.ahorros||[]).map(function(a,i){
    return '<div class="withdrawals-row"><div><div>'+a.desc+'</div><div class="withdrawal-detail">'+(a.tipo==='deposito'?'↑ Depósito':'↓ Retiro')+'</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;color:'+(a.tipo==='deposito'?'#34D399':'#EF4444')+'">'+(a.tipo==='deposito'?'+':'-')+' U$S '+Math.round(a.amount).toLocaleString('es-AR')+'</span><button class="btn-icon" onclick="removeItem(\'ahorro\','+i+')">🗑</button></div></div>';
  }).join('');
}

function renderResumen(){
  var el=document.getElementById('tab-resumen');if(!el)return;
  var d=getMonthData();
  var all=(d.fijos||[]).concat(d.variables||[]);
  var ll=0,hh=0;
  all.forEach(function(item){var s=personShare(item);ll+=s.loli;hh+=s.hugo;});
  var totalG=ll+hh,totalE=gpRetiros.loli+gpRetiros.hugo,queda=totalE-totalG;
  var lPct=totalG>0?(ll/totalG*100):50;

  var detalleHTML='';
  if(gpMovsDetail.length){
    detalleHTML='<details style="margin-bottom:14px"><summary>Ver detalle de retiros ('+gpMovsDetail.length+')</summary><div style="margin-top:8px">'+
    gpMovsDetail.map(function(m){return '<div class="withdrawals-row"><div><div>'+(m.nota||'Retiro')+'</div><div class="withdrawal-detail">'+m.fecha+'</div></div><span style="font-weight:700;color:'+(m.quien==='loli'?'#D4537E':'#60A5FA')+'">'+(m.quien==='loli'?'💜':'💙')+' '+fmt(m.monto)+'</span></div>';}).join('')+
    '</div></details>';
  }

  el.innerHTML=
    '<div id="gp-banner" class="gp-banner"><div class="gp-dot loading"></div><span>Conectando...</span></div>'+
    '<div class="summary-grid">'+
    '<div class="metric-card"><div class="metric-label">💜 Loli gastó</div><div class="metric-value">'+fmt(ll)+'</div></div>'+
    '<div class="metric-card"><div class="metric-label">💙 Hugo gastó</div><div class="metric-value">'+fmt(hh)+'</div></div>'+
    '<div class="metric-card"><div class="metric-label">Total gastos</div><div class="metric-value">'+fmt(totalG)+'</div></div>'+
    '</div>'+
    '<div class="section-title">Distribución</div>'+
    '<div class="resumen-block">'+
    '<div class="resumen-row"><div><span style="color:#D4537E;font-weight:700">💜 Loli</span><div class="split-bar"><div class="split-bar-fill" style="width:'+lPct.toFixed(0)+'%;background:#D4537E"></div></div><span style="font-size:11px;color:#64748B">'+lPct.toFixed(0)+'%</span></div><span style="font-weight:700;color:#D4537E">'+fmt(ll)+'</span></div>'+

// MODAL
function openModal(type){
  modalType=type;selectedWho='shared';
  document.getElementById('m-desc').value='';
  document.getElementById('m-amount').value='';
  document.getElementById('m-currency').value=type==='ahorro'?'USD':'ARS';
  document.querySelectorAll('.who-btn').forEach(function(b){b.className='who-btn';});
  var isA=type==='ahorro';
  document.getElementById('m-rubro-group').style.display=isA?'none':'';
  document.getElementById('m-who-group').style.display=isA?'none':'';
  document.getElementById('m-ahorro-type-group').style.display=isA?'':'none';
  document.getElementById('modal-title').textContent=isA?'Movimiento de ahorro':type==='fijo'?'Gasto fijo':'Gasto variable';
  document.getElementById('m-amount-label').textContent=isA?'Monto (U$S)':'Monto ($)';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){document.getElementById('m-desc').focus();},100);
}
function closeModal(){document.getElementById('modal').style.display='none';}
function selectWho(who,btn){
  selectedWho=who;
  document.querySelectorAll('.who-btn').forEach(function(b){b.className='who-btn';});
  btn.className='who-btn sel-'+who;
}
function saveItem(){
  var desc=document.getElementById('m-desc').value.trim();
  var amount=parseFloat(document.getElementById('m-amount').value);
  var currency=document.getElementById('m-currency').value;
  if(!desc||!amount||amount<=0){document.getElementById('m-desc').style.borderColor='#EF4444';setTimeout(function(){document.getElementById('m-desc').style.borderColor='';},1500);return;}
  var d=getMonthData();
  if(modalType==='ahorro'){if(!d.ahorros)d.ahorros=[];d.ahorros.push({desc:desc,amount:amount,tipo:document.getElementById('m-ahorro-type').value});}
  else if(modalType==='fijo'){if(!d.fijos)d.fijos=[];d.fijos.push({desc:desc,amount:amount,currency:currency,who:selectedWho,rubro:document.getElementById('m-rubro').value});}
  else{if(!d.variables)d.variables=[];d.variables.push({desc:desc,amount:amount,currency:currency,who:selectedWho,rubro:document.getElementById('m-rubro').value});}
  closeModal();saveData();render();
  var a=document.querySelector('.tab.active');if(a)a.click();
}
function removeItem(type,idx){
  var d=getMonthData();
  if(type==='fijo')d.fijos.splice(idx,1);
  else if(type==='variable')d.variables.splice(idx,1);
  else if(type==='ahorro')d.ahorros.splice(idx,1);
  saveData();render();
  var a=document.querySelector('.tab.active');if(a)a.click();
}
</script>
