<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0F172A"/>
<title>Formulario de Ingreso — GestiónProp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F172A;color:#F1F5F9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;padding-bottom:40px}
.header{background:linear-gradient(135deg,#1E3A5F,#2D6A9F);padding:24px 20px;text-align:center}
.header-logo{font-size:36px;margin-bottom:6px}
.header-title{font-size:20px;font-weight:800;margin-bottom:2px}
.header-sub{font-size:12px;opacity:0.8}
.container{max-width:600px;margin:0 auto;padding:20px 16px}
.card{background:#1E293B;border-radius:14px;padding:20px;border:1px solid #334155;margin-bottom:14px}
.card-title{font-size:14px;font-weight:800;color:#93C5FD;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:12px}
.lbl{color:#94A3B8;font-size:11px;font-weight:600;display:block;margin-bottom:4px}
.req{color:#EF4444}
.inp{background:#0F172A;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#F1F5F9;width:100%;outline:none;font-size:14px}
.inp:focus{border-color:#3B82F6}
.inp.error{border-color:#EF4444}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pre-loaded{background:#1E3A5F22;border:1px solid #2D6A9F44;border-radius:8px;padding:10px 12px;color:#93C5FD;font-size:13px;font-weight:600}
.pre-label{color:#64748B;font-size:10px;margin-bottom:2px}

/* Subida de fotos */
.upload-area{border:2px dashed #334155;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.upload-area:hover,.upload-area.drag{border-color:#3B82F6;background:#3B82F611}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-text{color:#94A3B8;font-size:12px}
.upload-preview{width:100%;border-radius:8px;max-height:200px;object-fit:cover;margin-top:8px}
.upload-done{border-color:#10B981;background:#10B98111}
.upload-done .upload-text{color:#10B981}

/* Acuerdo */
.acuerdo-box{background:#0F172A;border-radius:10px;padding:14px;max-height:300px;overflow-y:auto;font-size:11px;color:#CBD5E1;line-height:1.8;margin-bottom:12px;white-space:pre-wrap}
.acepta-check{display:flex;align-items:center;gap:12px;cursor:pointer;padding:14px;background:#0F172A;border-radius:10px;border:2px solid #334155;margin-bottom:10px}
.acepta-check.active{border-color:#10B981}
.check-box{width:22px;height:22px;border-radius:5px;background:transparent;border:2px solid #475569;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff;transition:all 0.2s}
.check-box.active{background:#10B981;border-color:#10B981}

/* Progreso */
.progress{display:flex;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.step-dot{width:10px;height:10px;border-radius:50%;background:#334155;transition:all 0.3s}
.step-dot.done{background:#10B981}
.step-dot.active{background:#3B82F6;transform:scale(1.3)}
.step-label{text-align:center;font-size:11px;color:#64748B;margin-bottom:16px}

/* Botones */
.btn{border-radius:8px;padding:12px 20px;font-weight:700;cursor:pointer;border:none;font-size:14px;width:100%;margin-top:8px}
.btn-p{background:#3B82F6;color:#fff}
.btn-ok{background:#10B981;color:#fff}
.btn-g{background:transparent;color:#94A3B8;border:1px solid #334155}
.btn-nav{display:flex;gap:8px;margin-top:16px}
.btn-nav .btn{margin-top:0}

/* Info boxes */
.info{background:#1E3A5F22;border-left:3px solid #3B82F6;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#93C5FD;margin-bottom:10px}
.warn{background:#F59E0B11;border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#FCD34D;margin-bottom:10px}

/* Éxito */
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:800;color:#10B981;margin-bottom:8px}
.success-sub{color:#64748B;font-size:13px;line-height:1.6}
.acuerdo-num{background:#10B98122;border:1px solid #10B98144;border-radius:10px;padding:16px;margin:16px 0;font-size:20px;font-weight:800;color:#10B981}

.err-msg{color:#EF4444;font-size:11px;margin-top:3px;display:none}
.err-msg.show{display:block}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="header">
  <div class="header-logo">🏢</div>
  <div class="header-title">GestiónProp</div>
  <div class="header-sub" id="header-sub">Formulario de ingreso de inquilinos</div>
</div>

<div class="container" id="app">
  <!-- Render dinámico -->
</div>

<script>
// FIREBASE
firebase.initializeApp({
  apiKey:"AIzaSyDhuSP_WTWI3hqf5GqgFExkptFfpqJUn50",
  authDomain:"gestion-prop.firebaseapp.com",
  databaseURL:"https://gestion-prop-default-rtdb.firebaseio.com",
  projectId:"gestion-prop"
});
var DB=firebase.database();
var ACUERDO_TEXTO=null;
// Cargar acuerdo desde Firebase (editable desde Config)
DB.ref("cfg_acuerdo").once("value",function(snap){
  var d=snap.val();
  if(d&&d.texto) ACUERDO_TEXTO=d.texto;
});
function getAcuerdoForm(){return ACUERDO_TEXTO||ACUERDO;}

// ── DATOS PRE-CARGADOS (pasan por URL) ────────────────────────────────────────
const params = new URLSearchParams(location.search);
const PRE = {
  unidad:   params.get("u") || "",
  edificio: params.get("ed") || "",
  dir:      params.get("dir") || "",
  alquiler: params.get("alq") || "",
  deposito: params.get("dep") || "",
  gastos:   params.get("gs") || "",
  ingreso:  params.get("ing") || "",
  egreso:   params.get("egr") || "",
  posesion: params.get("pos") || "",
  nom:      params.get("nom") || "",
  dni:      params.get("dni") || "",
  tel:      params.get("tel") || "",
  senia:    params.get("senia") || "0",
  saldo:    params.get("saldo") || "0",
  id_res:   params.get("id") || "",
  // Modo renovacion
  modo:       params.get("modo") || "",
  iq_key:     params.get("iq_key") || "",
  id_ac:      params.get("id_ac") || "",
  nom2:       params.get("nom2") || "",
  dni2:       params.get("dni2") || "",
  tel2:       params.get("tel2") || "",
  trabajo2:   params.get("trabajo2") || "",
  ct_emerg:   params.get("ct_emerg") || "",
  tel_emerg:  params.get("tel_emerg") || "",
};

const ES_RENOVAR = PRE.modo === "renovar";

const PASOS = 5;
let paso = 1;
let acepta = false;

const DATA = {
  // Pre-cargados
  unidad: PRE.unidad, edificio: PRE.edificio, dir: PRE.dir,
  alquiler: PRE.alquiler, deposito: PRE.deposito, gastos: PRE.gastos,
  ingreso: PRE.ingreso, egreso: PRE.egreso, posesion: PRE.posesion,
  // Inquilino 1
  nom1:"", dni1:"", tel1:"", email1:"", trabajo1:"", dom1:"",
  // Inquilino 2
  nom2:"", dni2:"", tel2:"", email2:"", trabajo2:"",
  // Emergencia
  ct_emerg:"", tel_emerg:"", rel_emerg:"",
  // Fotos
  foto_dni1f: null, foto_dni1d: null, foto_sue1: null,
  foto_dni2f: null, foto_dni2d: null, foto_sue2: null,
  // Acuerdo
  acepta: false, firma: "",
  // Obs
  obs_ingreso:"",
};

const ACUERDO = `ACUERDO DE CONVIVENCIA Y LOCACIÓN

Es indispensable para la buena convivencia respetar las normas básicas de buenas costumbres.

Dado el tamaño de los departamentos y las condiciones particulares del alquiler, se estipula que es apto para vivienda de 1 o 2 personas adultas (sin chicos y sin mascotas).

A fin de no molestar a sus vecinos rogamos no hacer reuniones de más de 3 personas, respetar horarios de descanso, orden, limpieza, etc.

Los espacios comunes son de tránsito, no de permanencia ni depósito de objetos personales (moto, bicicleta, tenders, muebles, etc.)

Asegurarse siempre de tener el departamento ventilado a fin de evitar la condensación de agua, proliferación de hongos y manchas de humedad.

RESPECTO A LOS SERVICIOS:

La basura se saca en bolsas, después de las 12hs (no dejar botellas o cajas sueltas ya que el recolector no las lleva).

Los servicios se encuentran incluidos sin costo adicional haciendo un uso racional y restringido de los mismos. Considerando para el uso de energía eléctrica lámparas de bajo consumo, heladera, TV, y algún electrodoméstico de bajo consumo (celular, tablet, etc.). Si usted se abusa sobrecargará la línea generando desperfectos. Queda terminantemente prohibido el uso de lavarropas, aire acondicionado, caloventor o cualquier artefacto que no sea categoría A o B (en caso de utilizarlo se cobrará un adicional).

Para el resto de los servicios utilizamos el mismo criterio haciendo un uso lógico del gas, agua, cloacas, wifi, etc.

El wifi es público, no pudiendo garantizarse su óptimo funcionamiento en horas pico, ni la fluidez de servicio en todos los puntos del edificio (tal vez deba salir al pasillo o algún espacio común para utilizarlo).

Cualquier desperfecto que ocasione por desidia, mal uso o negligencia; la reparación correrá por su cuenta.

Tenga en cuenta que usted vive en una sociedad donde en verano falta agua y cortan la luz, los días de lluvia colapsan las cloacas, etc. Por favor sea razonable en tales circunstancias que exceden a nuestra predisposición para buscar una solución.

RESPECTO A LA ADMINISTRACIÓN Y MANTENIMIENTO:

El alquiler se abona en efectivo del 1 al 5 de cada mes con un descuento especial por pronto pago. Si usted abona luego de esa fecha deberá abonar el valor pactado, más un 10% correspondiente al monto real del alquiler.

El depósito se devuelve cumplidos los 12 meses de alquiler, en ese momento si usted decide irse deberá informarlo y contra entrega del departamento en iguales condiciones a las que lo recibió, se le entregará el depósito. Si decide quedarse, este acuerdo seguirá en vigencia por 12 meses más y así sucesivamente.

Anualmente se abonará el valor de un mes en concepto de renovación (cargos de gestión y mantenimiento general).

El incremento del alquiler se efectuará anualmente según el IPC del periodo.

Dado que en el valor del alquiler se incluyen los servicios y estos aumentan sin aviso y en porcentajes imprevisibles nos vemos obligados a ajustar el valor de los servicios cada 4 meses (en abril, agosto y diciembre, tomamos estos meses como parámetro para poder prorratear el impacto del consumo y precio).

Administración funciona de lunes a viernes de 8 a 13 hs y de 14 a 18 hs, sábados de 8 a 12 hs. Si es una emergencia que requiere inmediata solución no dude en llamar, sino rogamos respetar los horarios. Mantenimiento funciona de lunes a viernes de 8 a 16 Hs.

Si su departamento sufre algún desperfecto deberá comunicarse con administración al 1555787641 a fin de coordinar su reparación, el personal de mantenimiento no hará ningún trabajo sin la previa directiva de administración o fuera del horario antes mencionado.`;

function fmt(n){return n?("$"+Number(n).toLocaleString("es-AR")):"—";}
function hoy(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveField(k){
  const el=document.getElementById("f-"+k);
  // Solo sobreescribir si el campo existe en el DOM (algunos son solo texto en ciertos pasos)
  if(el) DATA[k]=el.value;
}
function saveAllFields(){
  ["nom1","dni1","tel1","email1","trabajo1","trabajo_dir","trabajo_tel","trabajo_jefe",
   "nom2","dni2","tel2","email2","trabajo2","trabajo2_dir","trabajo2_tel","trabajo2_jefe",
   "ct_emerg","tel_emerg","rel_emerg","firma","obs_ingreso"].forEach(saveField);
  // Asegurar que los datos pre-cargados nunca se borren
  if(!DATA.nom1&&PRE.nom) DATA.nom1=PRE.nom;
  if(!DATA.dni1&&PRE.dni) DATA.dni1=PRE.dni;
  if(!DATA.tel1&&PRE.tel) DATA.tel1=PRE.tel;
}
function nc(){
  let n=parseInt(localStorage.getItem("gp_nc")||"1005")+1;
  localStorage.setItem("gp_nc",n);
  return String(n).padStart(6,"0");
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  // Modo renovar: flujo simplificado
  if(ES_RENOVAR){renderRenovar();return;}
  if(paso===6){renderExito();return;}
  
  // Ajustar header
  var hsub=document.getElementById("header-sub");
  if(hsub) hsub.textContent="Formulario de ingreso de inquilinos";
  
  const labels=["Acuerdo","Titular","2do Inquilino","Acuerdo","Confirmación"];
  const dots=Array.from({length:PASOS},(_,i)=>`<div class="step-dot ${i+1<paso?"done":i+1===paso?"active":""}"></div>`).join("");
  
  app.innerHTML=`
    <div class="progress">${dots}</div>
    <div class="step-label">Paso ${paso} de ${PASOS} — ${labels[paso-1]}</div>
    <div id="step-content"></div>
  `;
  
  if(paso===1) renderPaso1();
  else if(paso===2) renderPaso2();
  else if(paso===3) renderPaso3();
  else if(paso===4) renderPaso4();
  else if(paso===5) renderPaso5();
}

// PASO 1 — Datos del acuerdo (todo pre-cargado por administración)
function renderPaso1(){
  const c=document.getElementById("step-content");
  const total=Number(PRE.alquiler||0)+Number(PRE.deposito||0)+Number(PRE.gastos||0);
  const senia=Number(PRE.senia||0);
  const saldo=senia>0?(total-senia):total;
  c.innerHTML=`
  <div class="card">
    <div class="card-title">🏠 Tu acuerdo de alquiler</div>
    <div style="background:#0F172A;border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        <div><div style="color:#64748B;font-size:10px">Unidad</div><div style="color:#F1F5F9;font-weight:700">${PRE.unidad}</div></div>
        <div><div style="color:#64748B;font-size:10px">Titular</div><div style="color:#F1F5F9;font-weight:700">${PRE.nom||"—"}</div></div>
        <div><div style="color:#64748B;font-size:10px">DNI</div><div style="color:#F1F5F9">${PRE.dni||"—"}</div></div>
        <div><div style="color:#64748B;font-size:10px">Teléfono</div><div style="color:#F1F5F9">${PRE.tel||"—"}</div></div>
      </div>
    </div>
    <div style="background:#0F172A;border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="color:#06B6D4;font-size:11px;font-weight:700;margin-bottom:8px">📅 Período del acuerdo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        <div><div style="color:#64748B;font-size:10px">Inicio</div><div style="color:#F1F5F9;font-weight:700">${PRE.ingreso||"—"}</div></div>
        <div><div style="color:#64748B;font-size:10px">Fin</div><div style="color:#F1F5F9;font-weight:700">${PRE.egreso||"—"}</div></div>
        ${PRE.posesion?`<div style="grid-column:1/-1"><div style="color:#64748B;font-size:10px">Fecha de posesión</div><div style="color:#F59E0B;font-weight:700">${PRE.posesion}</div></div>`:""}
      </div>
    </div>
    <div style="background:#0F172A;border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="color:#06B6D4;font-size:11px;font-weight:700;margin-bottom:8px">💰 Detalle de pagos</div>
      <div style="font-size:12px">
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1E293B"><span style="color:#94A3B8">Alquiler mensual</span><span style="color:#F1F5F9;font-weight:600">${fmt(PRE.alquiler)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1E293B"><span style="color:#94A3B8">Depósito</span><span style="color:#F1F5F9;font-weight:600">${fmt(PRE.deposito)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1E293B"><span style="color:#94A3B8">Gastos de gestión</span><span style="color:#F1F5F9;font-weight:600">${fmt(PRE.gastos)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:2px solid #3B82F6"><span style="color:#94A3B8;font-weight:700">Total al ingreso</span><span style="color:#10B981;font-weight:700;font-size:14px">${fmt(total)}</span></div>
        ${senia>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1E293B"><span style="color:#94A3B8">Seña abonada</span><span style="color:#10B981">- ${fmt(senia)}</span></div>`:""}
        ${saldo>0?`<div style="display:flex;justify-content:space-between;padding:8px 0"><span style="color:#F59E0B;font-weight:700">Saldo a abonar al tomar posesión</span><span style="color:#F59E0B;font-weight:700;font-size:14px">${fmt(saldo)}</span></div>`:""}
      </div>
    </div>
    ${senia>0?`<div style="background:#F59E0B11;border:1px solid #F59E0B44;border-radius:8px;padding:10px;font-size:11px;color:#F59E0B;margin-bottom:12px">⚠ La seña abonada no se reintegra si no se toma posesión en la fecha acordada.</div>`:""}
    <div style="background:#10B98111;border:1px solid #10B98144;border-radius:8px;padding:10px;font-size:11px;color:#10B981">✅ Estos datos fueron cargados por el equipo de administración. Si encontrás algún error, comunicate con nosotros antes de continuar.</div>
  </div>
  <div class="btn-nav">
    <button class="btn btn-p" onclick="next1()">Siguiente →</button>
  </div>`;
}
function next1(){
  paso=2;render();
}
// PASO 2 — Datos adicionales + Documentación
function renderPaso2(){
  const c=document.getElementById("step-content");
  if(!DATA.nom1&&PRE.nom) DATA.nom1=PRE.nom;
  if(!DATA.dni1&&PRE.dni) DATA.dni1=PRE.dni;
  if(!DATA.tel1&&PRE.tel) DATA.tel1=PRE.tel;
  var o='';
  o+="<div class='card'>";
  o+="<div class='card-title'>👤 Inquilino Titular</div>";
  o+="<div style='background:#0F172A;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px'>";
  o+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:6px'>";
  o+="<div><div style='color:#64748B;font-size:10px'>Nombre</div><div style='color:#F1F5F9;font-weight:700'>"+esc(PRE.nom||DATA.nom1||"—")+"</div></div>";
  o+="<div><div style='color:#64748B;font-size:10px'>DNI</div><div style='color:#F1F5F9'>"+esc(PRE.dni||DATA.dni1||"—")+"</div></div>";
  o+="<div><div style='color:#64748B;font-size:10px'>Teléfono</div><div style='color:#F1F5F9'>"+esc(PRE.tel||DATA.tel1||"—")+"</div></div>";
  o+="</div><div style='color:#64748B;font-size:10px;margin-top:6px'>Si algún dato es incorrecto, comunicate con nosotros antes de continuar.</div></div>";
  o+="<div class='card-title' style='font-size:12px;margin-top:8px'>💼 Lugar de trabajo</div>";
  o+="<div class='field'><label class='lbl'>Empresa / Actividad</label><input class='inp' id='f-trabajo1' value='"+esc(DATA.trabajo1||"")+"' placeholder='Empresa, profesión, actividad'/></div>";
  o+="<div class='field'><label class='lbl'>Dirección del trabajo</label><input class='inp' id='f-trabajo_dir' value='"+esc(DATA.trabajo_dir||"")+"' placeholder='Calle, número, localidad'/></div>";
  o+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>";
  o+="<div class='field'><label class='lbl'>Teléfono del trabajo</label><input class='inp' id='f-trabajo_tel' value='"+esc(DATA.trabajo_tel||"")+"' placeholder='Teléfono'/></div>";
  o+="<div class='field'><label class='lbl'>Superior / Persona a cargo</label><input class='inp' id='f-trabajo_jefe' value='"+esc(DATA.trabajo_jefe||"")+"' placeholder='Nombre y apellido'/></div>";
  o+="</div>";
  o+="<div style='display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px'>";
  o+="<div class='field'><label class='lbl'>Contacto emergencia</label><input class='inp' id='f-ct_emerg' value='"+esc(DATA.ct_emerg||"")+"' placeholder='Nombre'/></div>";
  o+="<div class='field'><label class='lbl'>Teléfono emergencia</label><input class='inp' id='f-tel_emerg' value='"+esc(DATA.tel_emerg||"")+"' placeholder='11...'/></div>";
  o+="<div class='field'><label class='lbl'>Relación</label><input class='inp' id='f-rel_emerg' value='"+esc(DATA.rel_emerg||"")+"' placeholder='Madre, Padre...'/></div>";
  o+="</div></div>";
  o+="<div class='card'>";
  o+="<div class='card-title'>📸 Documentación requerida</div>";
  o+="<p style='color:#64748B;font-size:11px;margin-bottom:12px'>Tomá fotos nítidas con buena iluminación</p>";
  o+=uploadField("doc_dni_f","📋 Foto DNI frente","doc-dni-f",true);
  o+=uploadField("doc_dni_d","📋 Foto DNI dorso","doc-dni-d",true);
  o+=uploadField("doc_sueldo","💼 Recibo de sueldo","doc-sueldo",false);

// Canvas signature functions
var _canvasData = {1: null, 2: null};
function initCanvas(id, num){
  var canvas = document.getElementById(id);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  // Set canvas actual size
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#CBD5E1';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // Restore if exists
  if(_canvasData[num]){
    var img = new Image();
    img.onload = function(){ ctx.drawImage(img, 0, 0); };
    img.src = _canvasData[num];
  }
  var drawing = false, lastX = 0, lastY = 0;
  function getPos(e){
    var r = canvas.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return {x: t.clientX - r.left, y: t.clientY - r.top};
  }
  function start(e){ e.preventDefault(); drawing=true; var p=getPos(e); lastX=p.x; lastY=p.y; }
  function move(e){ e.preventDefault(); if(!drawing) return; var p=getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); lastX=p.x; lastY=p.y; }
  function stop(e){ drawing=false; _canvasData[num]=canvas.toDataURL(); }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', stop);
}
function clearCanvas(id){
  var num = id.includes('1') ? 1 : 2;
  var canvas = document.getElementById(id);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  _canvasData[num] = null;
}
function getCanvasEmpty(id){
  var canvas = document.getElementById(id);
  if(!canvas) return true;
  var ctx = canvas.getContext('2d');
  var data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  return !data.some(function(v){ return v > 0; });
}

function uploadField(key,label,inputId,req){
  return `<div class="field">
    <label class="lbl">${label}${req?' <span class="req">*</span>':''}</label>
    <div class="upload-area ${DATA[key]?'upload-done':''}" id="ua-${inputId}">
      <input type="file" accept="image/*" capture="environment" id="up-${inputId}" onchange="handleUpload('${key}','${inputId}')"/>
      <div class="upload-icon">${DATA[key]?'✅':'📷'}</div>
      <div class="upload-text">${DATA[key]?'Foto cargada — tocá para cambiar':'Tocá para sacar foto o elegir de galería'}</div>
      ${DATA[key]?`<img src="${DATA[key]}" class="upload-preview"/>`:''}
    </div>
  </div>`;
}

function comprimirImagen(file, maxW, quality, callback){
  // Comprime la imagen a maxW px de ancho máximo y calidad JPEG reducida
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
      var canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      callback(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleUpload(key,inputId){
  const input=document.getElementById("up-"+inputId);
  if(!input||!input.files[0])return;
  const area=document.getElementById("ua-"+inputId);
  // Mostrar "cargando..." mientras comprime
  if(area){area.querySelector(".upload-text").textContent="Procesando foto...";}
  // Comprimir: max 1200px ancho, calidad 0.7 (~200KB aprox)
  comprimirImagen(input.files[0], 1200, 0.70, function(dataUrl){
    DATA[key]=dataUrl;
    if(area){
      area.className="upload-area upload-done";
      area.querySelector(".upload-icon").textContent="✅";
      area.querySelector(".upload-text").textContent="Foto cargada — tocá para cambiar";
      const existing=area.querySelector(".upload-preview");
      if(existing)existing.remove();
      const img=document.createElement("img");
      img.src=dataUrl;img.className="upload-preview";
      area.appendChild(img);
    }
  });
}

  o+=(tieneDos?"<b>Es una persona diferente</b>":"<b>Hay un nuevo 2do inquilino</b>");
  o+="</label></div>";
  o+="<div id='r2-bloque' style='display:"+(tieneDos?"none":"block")+"'>";
  o+="<div class='field'><label class='lbl'>Nombre completo</label><input class='inp' id='f-nom2' value='"+esc(DATA.nom2||"")+"'/></div>";
  o+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>";
  o+="<div class='field'><label class='lbl'>DNI</label><input class='inp' id='f-dni2' value='"+esc(DATA.dni2||"")+"'/></div>";
  o+="<div class='field'><label class='lbl'>Teléfono</label><input class='inp' type='tel' id='f-tel2' value='"+esc(DATA.tel2||"")+"'/></div>";
  o+="<div class='field'><label class='lbl'>Trabajo</label><input class='inp' id='f-trabajo2' value='"+esc(DATA.trabajo2||"")+"'/></div>";
  o+="</div>";
  o+=uploadField("foto_sue2","📸 Recibo sueldo 2do inquilino","sue2-ren",false);
  o+="</div></div>";
  o+="<div class='btn-nav'>";
  o+="<button class='btn btn-g' onclick='_pasoRenovar=1;renderRenovar()'>← Atrás</button>";
  o+="<button class='btn btn-p' onclick='_nextRen2()'>Siguiente →</button>";
  o+="</div>";
  c.innerHTML=o;
  initUploads(["sue2-ren"]);
}

function _togRen2(){
  var mismo=document.getElementById("r2-mismo")&&document.getElementById("r2-mismo").checked;
  var bloque=document.getElementById("r2-bloque");
  if(bloque) bloque.style.display=mismo?"none":"block";
}

function _nextRen2(){
  var mismo=document.getElementById("r2-mismo")&&document.getElementById("r2-mismo").checked;
  if(mismo){
    // Mantener datos existentes
    DATA.nom2=PRE.nom2||"";DATA.dni2=PRE.dni2||"";DATA.tel2=PRE.tel2||"";DATA.trabajo2=PRE.trabajo2||"";
  } else {
    var n=document.getElementById("f-nom2");if(n)DATA.nom2=n.value.trim();
    var d=document.getElementById("f-dni2");if(d)DATA.dni2=d.value.trim();
    var t=document.getElementById("f-tel2");if(t)DATA.tel2=t.value.trim();
    var tr=document.getElementById("f-trabajo2");if(tr)DATA.trabajo2=tr.value.trim();
  }
  _pasoRenovar=3;renderRenovar();
}

function renderRenovarPaso3(){
  var c=document.getElementById("step-content");
  var o="<div class='card'>";
  o+="<div class='card-title'>🆘 Contacto de emergencia</div>";
  o+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>";
  o+="<div class='field'><label class='lbl'>Nombre</label><input class='inp' id='f-ct_emerg' value='"+esc(DATA.ct_emerg||PRE.ct_emerg||"")+"' placeholder='Nombre y apellido'/></div>";
  o+="<div class='field'><label class='lbl'>Teléfono</label><input class='inp' id='f-tel_emerg' value='"+esc(DATA.tel_emerg||PRE.tel_emerg||"")+"' placeholder='11...'/></div>";
  o+="<div class='field'><label class='lbl'>Relación</label><input class='inp' id='f-rel_emerg' value='"+esc(DATA.rel_emerg||"")+"' placeholder='Madre, Padre, Pareja...'/></div>";
  o+="</div></div>";
  o+="<div class='btn-nav'>";
  o+="<button class='btn btn-g' onclick='_pasoRenovar=2;renderRenovar()'>← Atrás</button>";
  o+="<button class='btn btn-p' onclick='_nextRen3()'>Siguiente →</button>";
  o+="</div>";
  c.innerHTML=o;
}

function _nextRen3(){
  var ct=document.getElementById("f-ct_emerg");if(ct)DATA.ct_emerg=ct.value.trim();
  var tel=document.getElementById("f-tel_emerg");if(tel)DATA.tel_emerg=tel.value.trim();
  var rel=document.getElementById("f-rel_emerg");if(rel)DATA.rel_emerg=rel.value.trim();
  _pasoRenovar=4;renderRenovar();
}

function renderRenovarPaso4(){
  var c=document.getElementById("step-content");
  var o="<div class='card'>";
  o+="<div class='card-title'>📜 Acuerdo de Convivencia y Renovación</div>";
  o+="<div class='acuerdo-box'>"+esc(getAcuerdoForm())+"</div>";
  o+="<div class='acepta-check' id='acepta-row' onclick='toggleAcepta()'>";
  o+="<div class='check-box' id='acepta-box'></div>";
  o+="<span style='color:#94A3B8;font-size:13px;font-weight:600'>Leí y acepto los términos del acuerdo de convivencia y renovación</span>";
  o+="</div>";
  o+="<div class='field' style='margin-top:12px'>";
  o+="<label class='lbl'>Firma del titular — "+esc(PRE.nom)+"</label>";
  o+="<div style='background:#0F172A;border-radius:8px;border:1px solid #334155;margin-bottom:6px'>";
  o+="<canvas id='canvas-firma1' width='600' height='140' style='width:100%;height:140px;border-radius:8px;touch-action:none;cursor:crosshair;display:block'></canvas>";
  o+="</div>";
  o+="<div style='display:flex;gap:8px;margin-bottom:12px'>";
  o+="<button class='btn btn-g' style='font-size:11px;padding:4px 10px' onclick='clearCanvas(\"canvas-firma1\")'>🗑 Borrar firma</button>";
  o+="<span style='color:#64748B;font-size:11px;align-self:center'>Firmá con el dedo o el mouse</span>";
  o+="</div></div></div>";
  o+="<div class='btn-nav'>";
  o+="<button class='btn btn-g' onclick='_pasoRenovar=3;renderRenovar()'>← Atrás</button>";
  o+="<button class='btn btn-p' onclick='_nextRen4()'>Siguiente →</button>";
  o+="</div>";
  c.innerHTML=o;
  setTimeout(function(){initCanvas('canvas-firma1',1);},50);
}

function _nextRen4(){
  if(!acepta){alert("Debés aceptar el acuerdo para continuar");return;}
  if(getCanvasEmpty('canvas-firma1')){alert("La firma es obligatoria");return;}
  DATA.firma=_canvasData[1]||"";
  guardarRenovar();
}

function guardarRenovar(){
  var registro={
    estado:"renovar_pendiente",
    fecha_envio:hoy(),
    modo:"renovar",
    iq_key:PRE.iq_key,
    id_ac:PRE.id_ac,
    unidad:PRE.unidad,
    nombre:PRE.nom,
    // Datos actualizados
    trabajo1:DATA.trabajo1||"",
    trabajo_dir:DATA.trabajo_dir||"",
    trabajo_tel:DATA.trabajo_tel||"",
    trabajo_jefe:DATA.trabajo_jefe||"",
    nom2:DATA.nom2||"",
    dni2:DATA.dni2||"",
    tel2:DATA.tel2||"",
    trabajo2:DATA.trabajo2||"",
    ct_emerg:DATA.ct_emerg||"",
    tel_emerg:DATA.tel_emerg||"",
    rel_emerg:DATA.rel_emerg||"",
    doc_sueldo:DATA.doc_sueldo||null,
    foto_sue2:DATA.foto_sue2||null,
    firma:DATA.firma||"",
    fecha_firma:hoy(),
  };
  DB.ref("forms").push(registro,function(err){
    if(!err) console.log("Renovar guardado OK");
  });
  _pasoRenovar=5;renderRenovar();
}

function renderExitoRenovar(){
  const app=document.getElementById("app");
  app.innerHTML=`
  <div class='card'>
    <div class='success-screen'>
      <div class='success-icon'>✅</div>
      <div class='success-title'>¡Renovación registrada!</div>
      <div class='success-sub'>Tus datos y firma fueron enviados a la administración.<br>La renovación quedará confirmada a la brevedad.</div>
      <div style='background:#06B6D422;border:1px solid #06B6D444;border-radius:10px;padding:16px;margin:16px 0;font-size:14px;color:#06B6D4;font-weight:700'>
        ${PRE.unidad} — Renovación enviada
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
