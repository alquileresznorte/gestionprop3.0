function ls(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lw(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function fmt(n){return "$"+Number(n||0).toLocaleString("es-AR");}
function fusd(n,tc){return tc>0?"U$S "+Math.round(n/tc):"--";}
function hoy(){return new Date().toISOString().split("T")[0];}
function mes(){return new Date().toISOString().slice(0,7);}
function fecDisp(s){
  // Convert YYYY-MM-DD to DD/MM/YY for display
  if(!s||s.length<10)return s||"--";
  var p=s.split("-");
  return p[2]+"/"+p[1]+"/"+p[0].slice(2);
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var _nc=ls("gp_nc",2000);
function nid(){_nc++;lw("gp_nc",_nc);return String(_nc).padStart(6,"0");}
function G(id){return document.getElementById(id);}
function uds(){var r=[];Object.keys(ED).forEach(function(c){for(var i=1;i<=ED[c].u;i++)r.push(c+"-"+i);});return r;}
function pA(c){return c&&c.pagos?Object.values(c.pagos):[];}
function pT(c){
  // Para cobros USD: sumar en USD; para pesos: sumar en pesos
  if(c&&c.moneda==="USD"){
    return pA(c).reduce(function(s,p){return s+Number(p.usd||0);},0);
  }
  return pA(c).reduce(function(s,p){return s+p.monto;},0);
}

// Base CF - never modified directly, overrides stored separately
var CF_BASE = CF.map(function(c){return Object.assign({},c);});

function getCF(){
  // Start from base, apply overrides from Firebase
  var result = CF_BASE.map(function(c){return Object.assign({},c);});
  var overrides = oA(DATA.cfg).filter(function(x){return x.tipo==="cf_override";});
  overrides.forEach(function(x){
    if(x.activo===false){
      // Mark as inactive
      result = result.filter(function(c){return c.id!==x.cfid;});
    } else {
      result.forEach(function(c,i){if(c.id===x.cfid){result[i]=Object.assign({},c,x);}});
    }
  });
  // Add custom costs (costo_extra) - deduplicated by _key
  var extras = oA(DATA.cfg).filter(function(x){return (x.tipo==="otro_gasto"||x.tipo==="costo_extra"||x.tipo==="costo_fijo_extra")&&x.activo!==false;});
  extras.forEach(function(x){
    var already = result.filter(function(c){return c.id===x._key;}).length;
    if(!already) result.push({id:x._key,d:x.desc,pv:x.pv||"",e:x.ed||"General",c:x.cat||"Otro",ct:x.cta_num||"",dv:x.dv||15,monto_cfg:x.monto||0});
  });
  return result;
}

function startDB(){
  // Load any saved password changes from Firebase
  DB.ref("usuarios").once("value",function(snap){
    if(snap.exists()){
      var overrides=snap.val();
      USUARIOS.forEach(function(u){
        if(overrides[u.u]&&overrides[u.u].clave){
          u.p=overrides[u.u].clave;
        }
      });
    }
  });
  DKEYS.forEach(function(k){
    DB.ref(k).on("value",function(s){
      DATA[k]=s.exists()?s.val():{};
      if(k==="cst") setTimeout(autoLimpiarDupCst,500);
      render();
    });
  });
}

function autoLimpiarDupCst(){
  var cstA=oA(DATA.cst);
  var seen={},toDelete=[];
  cstA.forEach(function(c){
    var key=(c.mes||"")+"__"+(c.desc||"").trim().toLowerCase();
    if(seen[key]){
      // Delete the one without data
      if(Number(c.monto||0)===0&&!c.pagado) toDelete.push(c._key);
      else if(Number((DATA.cst[seen[key]]||{}).monto||0)===0&&!(DATA.cst[seen[key]]||{}).pagado){
        toDelete.push(seen[key]);seen[key]=c._key;
      }
    } else seen[key]=c._key;
  });
  if(toDelete.length){
    var ups={};
    toDelete.forEach(function(k){ups["cst/"+k]=null;});
    DB.ref("/").update(ups);
  }
}
function stopDB(){DKEYS.forEach(function(k){DB.ref(k).off();});}

}

var DRIVE_CLIENT_ID = "581104673030-lmalfgruief3qgltd235j00huv00dp7t.apps.googleusercontent.com";
var DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
var _driveToken = null;
var _driveTokenExpiry = 0;

function driveGetToken(callback){
  var now = Date.now();
  if(_driveToken && now < _driveTokenExpiry){callback(_driveToken);return;}
  // Request new token
  google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: function(response){
      if(response.error){alert("Error de autenticacion con Google: "+response.error);return;}
      _driveToken = response.access_token;
      _driveTokenExpiry = Date.now() + (response.expires_in - 60) * 1000;
      callback(_driveToken);
    }
  }).requestAccessToken();
}

function driveFindOrCreateFolder(token, name, parentId, callback){
  var query = "name='"+name+"' and mimeType='application/vnd.google-apps.folder' and trashed=false"+(parentId?" and '"+parentId+"' in parents":"");
  fetch("https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent(query)+"&fields=files(id,name)", {
    headers:{Authorization:"Bearer "+token}
  }).then(function(r){return r.json();}).then(function(data){
    if(data.files && data.files.length > 0){
      callback(null, data.files[0].id);
    } else {
      // Create folder
      var meta = {name:name, mimeType:"application/vnd.google-apps.folder"};
      if(parentId) meta.parents = [parentId];
      fetch("https://www.googleapis.com/drive/v3/files", {
        method:"POST",
        headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
        body:JSON.stringify(meta)
      }).then(function(r){return r.json();}).then(function(d){
        callback(null, d.id);
      }).catch(function(e){callback(e);});
    }
  }).catch(function(e){callback(e);});
}

function driveGetFolderPath(token, inq, callback){
  // Estructura: GestionProp / Edificio / Depto / ID_contrato
  var cod = (inq.unidad||"").split("-")[0];
  var depto = inq.unidad||"";
  var idac = inq.id_ac||"sin-id";
  driveFindOrCreateFolder(token, "GestionProp", null, function(e1, rootId){
    if(e1){callback(e1);return;}
    driveFindOrCreateFolder(token, cod, rootId, function(e2, edId){
      if(e2){callback(e2);return;}
      driveFindOrCreateFolder(token, depto, edId, function(e3, depId){
        if(e3){callback(e3);return;}
        driveFindOrCreateFolder(token, idac, depId, function(e4, contId){
          if(e4){callback(e4);return;}
          callback(null, contId);
        });
      });
    });
  });
}

function driveListFiles(token, folderId, callback){
  fetch("https://www.googleapis.com/drive/v3/files?q='"+folderId+"' in parents and trashed=false&fields=files(id,name,mimeType,thumbnailLink,webViewLink,createdTime)&orderBy=createdTime", {
    headers:{Authorization:"Bearer "+token}
  }).then(function(r){return r.json();}).then(function(data){
    callback(null, data.files||[]);
  }).catch(function(e){callback(e);});
}

function driveUploadFile(token, folderId, file, callback){
  var metadata = {name:file.name, parents:[folderId]};
  var formData = new FormData();
  formData.append("metadata", new Blob([JSON.stringify(metadata)], {type:"application/json"}));
  formData.append("file", file);
  fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink,thumbnailLink", {
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:formData
  }).then(function(r){return r.json();}).then(function(d){
    callback(null, d);
  }).catch(function(e){callback(e);});
}

function driveDeleteFile(token, fileId, callback){
  fetch("https://www.googleapis.com/drive/v3/files/"+fileId, {
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  }).then(function(){callback(null);}).catch(function(e){callback(e);});
}

function driveSubirArchivos(){
  var input = G("drive-file-input"); if(!input) return;
  var files = Array.from(input.files); if(!files.length) return;
  var status = G("drive-upload-status");
  if(status) status.textContent = "Subiendo "+files.length+" archivo(s)...";
  var token = window._driveToken;
  var folderId = window._driveFolderId;
  var subidos = 0;
  files.forEach(function(file){
    driveUploadFile(token, folderId, file, function(err, result){
      if(err){
        if(status) status.textContent = "Error al subir "+file.name;
        return;
      }
      subidos++;
      if(subidos === files.length){
        if(status) status.textContent = subidos+" archivo(s) subido(s)";
        // Recargar la lista
        var inqData = oA(DATA.iq).filter(function(i){return i.id_ac === (result.name||"") || true;})[0];
        // Refresh modal
        setTimeout(function(){
          driveListFiles(token, folderId, function(e2, newFiles){
            // Find current inq from modal title
            var allIq = oA(DATA.iq);
            var modalInq = allIq.filter(function(i){return window._driveFolderId;})[0]||{};
            renderDriveModal(token, folderId, window._driveInq||{});
          });
        }, 500);
      }
    });
  });
}

    .sort(function(a,b){return (a.fecha||"").localeCompare(b.fecha||"");});
  var reg=Object.assign({},i,{
    estado:"baja",
    fecha_egreso_real:G("egr-f").value,
    motivo_egreso:G("egr-m").value,
    obs_egreso:G("egr-o").value,
    fecha_cierre:hoy(),
    historial_eventos:eventos.map(function(ev){return ev.fecha+": "+ev.texto;}).join(" | ")
  });
  DB.ref("hist").push(reg);
  DB.ref("iq/"+key).remove();
  // Clean up eventos from cfg
  eventos.forEach(function(ev){DB.ref("cfg/"+ev._key).remove();});
  closeModal();closeModal();
  alert("Acuerdo cerrado. "+i.unidad+" quedo libre. Historial de "+eventos.length+" eventos guardado.");
  go("acuerdos");
}

  var upd={alquiler:alq,ingreso:ing||DATA.iq[key].ingreso,egreso:egr||DATA.iq[key].egreso,ultimo_aj:ing||hoy()};
  DB.ref("iq/"+key).update(upd);
  // Register gastos as partial payments in cobranzas if > 0
  if(gs>0){

    for(var c=0;c<cuotas;c++){

    }
  }
  closeModal();closeModal();
  alert("Renovacion registrada. Nuevo alquiler: "+fmt(alq)+(gs>0?" - Gastos "+fmt(gs)+" en "+cuotas+" cuota"+(cuotas>1?"s":""):""));

      if(G("na-ing"))G("na-ing").value=r.fecha_ingreso||hoy();
      // Pre-cargar seña como pago a cuenta
      if(r.senia&&r.senia>0&&G("na-pc")){
        G("na-pc").value=r.senia;
      }
      if(r.pago_posesion&&r.pago_posesion>0&&G("na-pos-monto")){
        G("na-pos-monto").value=r.pago_posesion;
      }
      if(r.cta_posesion&&G("na-pos-cta")){
        G("na-pos-cta").value=r.cta_posesion;
      }
      actualizarResumenNA();
    }
  },150);
}

function saveNA(){
  var u=G("na-u").value,n=G("na-n").value,d=G("na-d").value||"PENDIENTE";
  if(!u||!n){alert("Unidad y nombre son obligatorios");return;}
  // Verificar que no haya contrato activo para esa unidad
  var deptoActivo=oA(DATA.iq).filter(function(i){return i.unidad===u&&i.estado==="activo";}).length>0;
  if(deptoActivo){
    alert("El depto "+u+" ya tiene un contrato activo. Solo puede haber uno por departamento.");return;
  }
  // Deshabilitar botón para evitar doble click
  var btnCrear=document.querySelector("button[onclick='saveNA()']");
  if(btnCrear){
    if(btnCrear.disabled){alert("Ya se esta creando el contrato, por favor espera.");return;}
    btnCrear.disabled=true;btnCrear.textContent="Creando...";btnCrear.style.opacity="0.5";
  }
  // Guardar key de reserva localmente ANTES de cualquier operacion async
  var resKeyLocal=window._resConvertKey||null;
  var vigente=G("na-vigente")&&G("na-vigente").checked;
  var hist=oA(DATA.hist).filter(function(h){return h.dni===d;});
  if(hist.length>0&&!confirm("Este DNI tiene historial previo. Motivo: "+(hist[0].motivo_egreso||"--")+". Continuas?")){
    if(btnCrear){btnCrear.disabled=false;btnCrear.textContent="Crear Acuerdo";btnCrear.style.opacity="1";}
    return;
  }

  var id=nid();
  var moneda=(G("na-moneda")||{value:"ARS"}).value||"ARS";
  var alqUSD=Number((G("na-alq-usd")||{value:0}).value||0);
  var alq=moneda==="USD"?0:Number(G("na-alq").value||0);
  // Para USD guardamos 0 en alquiler (pesos) y alquiler_usd en USD
  var ing=G("na-ing").value;
  var mesInicio=ing?ing.slice(0,7):mes();

  var getMesN=function(start,nn){
    var yr=parseInt(start.slice(0,4)),mo=parseInt(start.slice(5,7))+nn;
    while(mo>12){mo-=12;yr++;}return yr+"-"+String(mo).padStart(2,"0");
  };

  if(vigente){
    // CONTRATO VIGENTE - save with historical data, generate current month cobro
    var depInfo=Number((G("na-dep-info")||{value:0}).value||0);
    var gsInfo=Number((G("na-gs-info")||{value:0}).value||0);
    var deudaMes=G("na-deuda-mes")?G("na-deuda-mes").value:"";
    var deudaMonto=Number((G("na-deuda-monto")||{value:0}).value||0);

    DB.ref("iq").push({
      id_ac:id,unidad:u,estado:"activo",nombre:n,dni:d,
      tel:G("na-t").value,email:G("na-e").value,
      ct_emerg:G("na-ce").value,tel_emerg:G("na-te").value,
      alquiler:alq,alquiler_usd:moneda==="USD"?alqUSD:0,moneda:moneda,
      deposito:depInfo,gastos:gsInfo,
      pago_cuenta:0,ingreso:ing,egreso:G("na-egr").value,
      ultimo_aj:ing,obs_ingreso:G("na-obs").value,obs_egreso:"",
      fecha_reg:hoy(),tipo_carga:"vigente"
    });

    // Check if cobro already exists for this unit this month
    var cobExistente=oA(DATA.cob).filter(function(c){return c.unidad===u&&c.mes===mes();});
    var montoCobro=moneda==="USD"?alqUSD:alq;
    if(cobExistente.length>0){
      var upsCob={id_ac:id,inq:n,monto_total:montoCobro};
      if(moneda==="USD") upsCob.moneda="USD";
      DB.ref("cob/"+cobExistente[0]._key).update(upsCob);
    } else if(montoCobro>0){
      var nuevoCob={id_ac:id,unidad:u,inq:n,mes:mes(),
        monto_total:montoCobro,sal_ant:0,estado:"pendiente",pagos:{},concepto:"Alquiler"};
      if(moneda==="USD") nuevoCob.moneda="USD";
      DB.ref("cob").push(nuevoCob);
    }
    // Generate debt from previous month if any
    if(deudaMes&&deudaMonto>0){
      // Check if debt cobro already exists
      var deudaExistente=oA(DATA.cob).filter(function(c){return c.unidad===u&&c.mes===deudaMes;});
      if(deudaExistente.length>0){
        // Update existing with correct data
        DB.ref("cob/"+deudaExistente[0]._key).update({id_ac:id,inq:n,monto_total:deudaMonto,concepto:"Saldo pendiente "+deudaMes});
      } else {
        DB.ref("cob").push({id_ac:id,unidad:u,inq:n,mes:deudaMes,
          monto_total:deudaMonto,sal_ant:0,estado:"pendiente",pagos:{},
          concepto:"Saldo pendiente "+deudaMes});
      }
    }
    closeModal();
    var msg="Contrato vigente cargado. ";
    if(cobExistente.length>0) msg+="Cobranza de "+mes()+" actualizada. ";
    else msg+="Alquiler de "+mes()+" generado. ";
    if(deudaMonto>0) msg+="Deuda de "+deudaMes+": "+fmt(deudaMonto)+" registrada.";
    alert(msg);

  } else {
    // CONTRATO NUEVO - full flow
    var dep=Number(G("na-dep").value||0);
    var gs=Number(G("na-gs").value||0);
    var desc=Number(G("na-desc-gs").value||0);
    var gsNeto=Math.max(0,gs-desc);
    var pc=Number(G("na-pc").value||0);
    var posMonto=Number((G("na-pos-monto")||{value:0}).value||0);
    var posCta=(G("na-pos-cta")||{value:"Efectivo"}).value||"Efectivo";
    var pcCta=(G("na-pc-cta")||{value:"Efectivo"}).value||"Efectivo";
    var pcFecha=ing||hoy();
    var cuotasDep=parseInt((G("na-cuotas-dep").value||"1").charAt(0))||1;
    var cuotasGs=parseInt((G("na-cuotas-gs").value||"1").charAt(0))||1;
    var pcRestante=pc;

    // Guardar inquilino
    DB.ref("iq").push({
      id_ac:id,unidad:u,estado:"activo",nombre:n,dni:d,
      tel:G("na-t").value,email:G("na-e").value,
      ct_emerg:G("na-ce").value,tel_emerg:G("na-te").value,
      alquiler:alq,alquiler_usd:moneda==="USD"?alqUSD:0,moneda:moneda,
      deposito:dep,gastos:gs,gastos_neto:gsNeto,
      descuento_gs:desc,pago_cuenta:pc,total_ingreso:alq+dep+gsNeto,
      ingreso:ing,egreso:G("na-egr").value,
      ultimo_aj:ing,obs_ingreso:G("na-obs").value,obs_egreso:"",fecha_reg:hoy()
    });

    // Aplicar pago a cuenta a las cobranzas
    var _pcAplicar=function(monto){
      if(pcRestante<=0)return{monto:monto,pagos:{},estado:"pendiente"};
      var aplicado=Math.min(pcRestante,monto);pcRestante-=aplicado;
      var pagos={};pagos[Date.now()+Math.random()]={fecha:pcFecha,monto:aplicado,cuenta:pcCta,concepto:"Pago a cuenta"};
      return{monto:monto,pagos:pagos,estado:aplicado>=monto?"pagado":"parcial"};
    };

    if(alq>0){var ca=_pcAplicar(alq);DB.ref("cob").push({id_ac:id,unidad:u,inq:n,mes:mesInicio,monto_total:ca.monto,sal_ant:0,estado:ca.estado,pagos:ca.pagos,concepto:"Alquiler"});}
    if(dep>0){var cuotaDep=Math.round(dep/cuotasDep);for(var cd=0;cd<cuotasDep;cd++){var cad=cd===0?_pcAplicar(cuotaDep):{monto:cuotaDep,pagos:{},estado:"pendiente"};DB.ref("cob").push({id_ac:id,unidad:u,inq:n,mes:getMesN(mesInicio,cd),monto_total:cad.monto,sal_ant:0,estado:cad.estado,pagos:cad.pagos,concepto:"Deposito cuota "+(cd+1)+"/"+cuotasDep});}}
    if(gsNeto>0){var cuotaGs=Math.round(gsNeto/cuotasGs);for(var cg=0;cg<cuotasGs;cg++){var cag=cg===0?_pcAplicar(cuotaGs):{monto:cuotaGs,pagos:{},estado:"pendiente"};DB.ref("cob").push({id_ac:id,unidad:u,inq:n,mes:getMesN(mesInicio,cg),monto_total:cag.monto,sal_ant:0,estado:cag.estado,pagos:cag.pagos,concepto:"Gastos de gestion"+(cuotasGs>1?" cuota "+(cg+1)+"/"+cuotasGs:"")+(desc>0?" (c/desc. "+fmt(desc)+")":"")});}}

    // Registrar pago a cuenta en caja
    if(pc>0){
      DB.ref("aj").push({fecha:pcFecha,tipo:"ingreso",sub:"Pago a cuenta ingreso",
        cuenta:pcCta,concepto:"Pago a cuenta #"+id+" - "+n+" - "+u,monto:pc,auto:true});
    }

    // Registrar pago al tomar posesion en caja
    if(posMonto>0){
      var _socioMapP={"MP Loli":"Cuenta Loli","Visa BBVA Loli":"Cuenta Loli","Master BBVA Loli":"Cuenta Loli",
        "MP Hugo":"Cuenta Hugo","Visa Galicia Hugo":"Cuenta Hugo","Master BBVA Hugo":"Cuenta Hugo","Visa BBVA Hugo":"Cuenta Hugo"};
      if(CTAS_SOCIOS.indexOf(posCta)>=0){
        DB.ref("movs").push({fecha:ing||hoy(),mes:(ing||hoy()).slice(0,7),tipo:"aporte",
          cuenta:_socioMapP[posCta]||"Cuenta Loli",cuenta_caja:posCta,monto:posMonto,
          nota:"Pago posesion #"+id+" - "+n+" - "+u});
      } else {
        DB.ref("aj").push({fecha:ing||hoy(),tipo:"ingreso",sub:"Pago posesion",
          cuenta:posCta,concepto:"Pago al tomar posesion #"+id+" - "+n+" - "+u,
          monto:posMonto,auto:true});
      }
    }

    // Cerrar modal, mostrar mensaje, marcar reserva convertida
    closeModal();
    var msg="Acuerdo #"+id+" creado. ";
    if(alq>0)msg+="Alquiler "+fmt(alq)+". ";
    if(pc>0)msg+="Pago a cuenta: "+fmt(pc)+". ";
    if(posMonto>0)msg+="Pago posesion: "+fmt(posMonto)+".";
    alert(msg);
    if(resKeyLocal){
      DB.ref("res/"+resKeyLocal).update({estado:"convertida",id_acuerdo:id,fecha_conversion:hoy()});
    }
    window._resConvert=null;
    window._resConvertKey=null;
    setTimeout(rAcuerdos,400);
  }
}

    o+="<div style='color:#64748B;font-size:10px'>Ingreso: "+(i.ingreso||"--")+" - Egreso: "+(i.fecha_egreso_real||i.egreso||"--")+"</div>";

    return;
  }

  var CE={pagado:"#10B981",parcial:"#F59E0B",pendiente:"#EF4444"};

    var pg=pT(c),tot=c.monto_total+Number(c.sal_ant||0);
    var cod=(c.unidad||"").split("-")[0],ec=COL[cod]||"#64748B";

function genCob(){
  var iqA=oA(DATA.iq).filter(function(i){return i.estado==="activo";});
  var ya=oA(DATA.cob).filter(function(c){return c.mes===_cobMes;}).map(function(c){return c.unidad;});
  var ns=iqA.filter(function(i){return !ya.includes(i.unidad);});
  if(!ns.length){alert("Todas las unidades activas ya tienen cobranza este mes");return;}
  var yr=parseInt(_cobMes.split("-")[0]),mo=parseInt(_cobMes.split("-")[1]);
  var mPrev=mo===1?(yr-1)+"-12":yr+"-"+String(mo-1).padStart(2,"0");
  var cobP=oA(DATA.cob).filter(function(c){return c.mes===mPrev;});
  ns.forEach(function(i){
    var prev=cobP.filter(function(c){return c.unidad===i.unidad;})[0];
    var sal=0;if(prev){var pg=pT(prev),tot=prev.monto_total+Number(prev.sal_ant||0);if(pg<tot)sal=tot-pg;}
    var esUSD=i.moneda==="USD"&&Number(i.alquiler_usd||0)>0;
    if(esUSD){
      // Cobro en dolares: monto_total en USD, moneda="USD"
      DB.ref("cob").push({id_ac:i.id_ac||"",unidad:i.unidad,inq:i.nombre,mes:_cobMes,
        monto_total:Number(i.alquiler_usd),moneda:"USD",pagos:{},sal_ant:sal,
        estado:sal>0?"parcial":"pendiente",concepto:"Alquiler USD"});
    } else {
      var extra=aplicarAdicionales(i.unidad,i.alquiler,_cobMes);
      var totalMes=i.alquiler+extra;
      var concepto=extra>0?"Alquiler + adicionales ("+fmt(extra)+" extra)":"";
      DB.ref("cob").push({id_ac:i.id_ac||"",unidad:i.unidad,inq:i.nombre,mes:_cobMes,monto_total:totalMes,pagos:{},sal_ant:sal,estado:sal>0?"parcial":"pendiente",concepto_extra:concepto});
    }
  });
  setTimeout(rCob,600);
}

function regPago(ckey){
  var c=DATA.cob[ckey],ts=Date.now(),ups={};
  var esUSD=c.moneda==="USD";
  var fecha=G("p-f").value,cta1=G("p-c").value;
  var m,usd_monto=0,tc_usado=0;

  if(esUSD){
    usd_monto=Number((G("p-usd")||{value:0}).value||0);
    tc_usado=Number((G("p-tc")||{value:0}).value||0);
    if(!usd_monto||!tc_usado){alert("Ingresa monto en U$S y tipo de cambio");return;}
    m=Math.round(usd_monto*tc_usado); // pesos
  } else {
    m=Number(G("p-m").value);
    if(!m){alert("Ingresa el monto");return;}
  }

  ups["cob/"+ckey+"/pagos/"+ts]={fecha:fecha,monto:m,cuenta:cta1,
    concepto:"Alquiler "+c.unidad+(esUSD?" (U$S"+usd_monto+" x $"+tc_usado+")":""),
    usd:esUSD?usd_monto:0,tc:esUSD?tc_usado:0};

  if(G("p-d").checked){
    var m2=Number((G("p-m2")||{value:0}).value||0),cta2=(G("p-c2")||{value:""}).value;
    if(m2) ups["cob/"+ckey+"/pagos/"+(ts+1)]={fecha:fecha,monto:m2,cuenta:cta2,concepto:"Alquiler "+c.unidad};
  }

  var allP=Object.assign({},c.pagos||{});Object.keys(ups).forEach(function(k){allP[k.split("/").pop()]=ups[k];});
  // Para USD: comparar en USD; para pesos: comparar en pesos
  var tot,total;
  if(esUSD){
    tot=Object.values(allP).reduce(function(s,p){return s+(p.usd||0);},0);
    total=c.monto_total; // en USD
  } else {
    tot=Object.values(allP).reduce(function(s,p){return s+p.monto;},0);
    total=c.monto_total;
  }
  ups["cob/"+ckey+"/estado"]=tot>=total?"pagado":tot>0?"parcial":"pendiente";
  DB.ref("/").update(ups);

  var iq=oA(DATA.iq).filter(function(i){return i.unidad===c.unidad&&i.estado==="activo";})[0];
  var montoWA=esUSD?"U$S"+usd_monto:fmt(m);
  if(iq&&iq.tel&&confirm("Enviar confirmacion por WhatsApp a "+iq.nombre.split(",")[0]+"?")){
    window.open("https://wa.me/"+iq.tel+"?text="+encodeURIComponent("Hola "+iq.nombre.split(",")[0].trim()+"! Recibimos tu pago de "+montoWA+" para el alquiler de "+c.mes.replace("-","/")+". Gracias! Adm: 1555787641"),"_blank");
  }
  closeModal();setTimeout(rCob,400);
}

function saveCosto(ckey){
  var m=Number(G("ec-m").value||0);
  var f=G("ec-f").value;
  var checkboxPagado=G("ec-p").checked;
  var pm=Number((G("ec-pm")||{value:0}).value||0);
  var pc=(G("ec-pc")||{value:"Efectivo"}).value;
  // Fecha de pago: siempre usar el campo ec-fp
  var fechaPago=G("ec-fp")?(G("ec-fp").value||hoy()):hoy();
  var c=DATA.cst[ckey];
  var pagosExist=c&&c.pagos?Object.values(c.pagos):[];
  var totalYaPagado=pagosExist.reduce(function(s,x){return s+Number(x.monto||0);},0);
  var ups={};
  ups["cst/"+ckey+"/monto"]=m;
  ups["cst/"+ckey+"/nro_fact"]=f;
  ups["cst/"+ckey+"/fec_venc"]=(G("ec-v")||{value:""}).value;
  ups["cst/"+ckey+"/cuenta"]=pc;
  ups["cst/"+ckey+"/fecha_pago"]=fechaPago;
  if(G("ec-obs")) ups["cst/"+ckey+"/obs"]=G("ec-obs").value||"";
  // Registrar pago parcial si se ingreso monto
  if(pm>0){
    var ts=Date.now();
    ups["cst/"+ckey+"/pagos/"+ts]={fecha:fechaPago,monto:pm,cuenta:pc};
    totalYaPagado+=pm;
  }
  // Si checkbox marcado sin pagos previos, registrar monto total con fecha correcta
  if(checkboxPagado&&totalYaPagado===0&&m>0){
    var ts2=Date.now()+1;
    ups["cst/"+ckey+"/pagos/"+ts2]={fecha:fechaPago,monto:m,cuenta:pc};
    totalYaPagado=m;
  }
  ups["cst/"+ckey+"/pagado"]=totalYaPagado>=m||(checkboxPagado&&totalYaPagado>0);
  DB.ref("/").update(ups);
  _editC=null;setTimeout(rCostos,400);
}

function rAlertas(){
  var h=new Date(),dia=h.getDate(),m=mes();
  var iqA=oA(DATA.iq).filter(function(i){return i.estado==="activo";});
  var cobA=oA(DATA.cob).filter(function(c){return c.mes===m;});
  var evA=oA(DATA.ev); // agenda events
  
  // Load sent status from localStorage
  var sent=JSON.parse(localStorage.getItem("gp_als_sent_"+m)||"{}");
  
  var grupos={mora:[],pronto:[],ajuste:[],renovacion:[],agenda:[],morosos:[],servicios:[]};
  
  var cr=getCfgRec();
  iqA.forEach(function(inq){
    var c=cobA.filter(function(x){return x.unidad===inq.unidad;})[0];
    var pg=c?pT(c):0,alq=inq.alquiler,ok=pg>=alq,nom=inq.nombre.split(",")[0].trim();
    var descPct=cr.desc_pronto;
    var descMonto=Math.round(alq*(1-descPct/100));
    var key=inq.unidad;

    // Pronto pago dias 1-4
    if(dia>=1&&dia<=4&&!ok){
      grupos.pronto.push({key:key+"_pronto",u:inq.unidad,nom:inq.nombre,tel:inq.tel,
        msg:"Hola "+nom+"! Recordatorio alquiler "+m.replace("-","/")+". Con descuento pronto pago ("+descPct+"%, hasta dia 5): "+fmt(descMonto)+". Sin descuento: "+fmt(alq)+". Adm: 1555787641"});
    }
    // Pago tardio dia 5-9
    if(dia>=5&&dia<cr.dias_mora&&!ok){
      var recPct=cr.rec_d5;
      var recMonto=recPct>0?Math.round(alq*(1+recPct/100)):alq;
      var recTxt=recPct>0?" (recargo "+recPct+"%: "+fmt(recMonto)+")":"";
      grupos.morosos.push({key:key+"_tard",u:inq.unidad,nom:inq.nombre,tel:inq.tel,
        msg:"Hola "+nom+"! Tu alquiler de "+m.replace("-","/")+": "+fmt(alq)+" vencio el dia 5"+recTxt+". Adm: 1555787641"});
    }
    // Mora dia 10+
    if(dia>=cr.dias_mora&&!ok){
      var atraso=dia-cr.dias_mora;
      var recPct2=dia>=20?cr.rec_d20:cr.rec_d10;
      var recMonto2=Math.round(alq*(1+recPct2/100));
      grupos.mora.push({key:key+"_mora",u:inq.unidad,nom:inq.nombre,tel:inq.tel,
        msg:"Hola "+nom+". Tu alquiler de "+m.replace("-","/")+" esta en mora ("+atraso+" dia"+(atraso!==1?"s":"")+" de atraso). Total con recargo "+recPct2+"%: "+fmt(recMonto2)+". Adm: 1555787641"});
    }
    // Renovacion proximos 30 dias
    if(inq.egreso){
      var d=Math.round((new Date(inq.egreso)-h)/86400000);
      if(d>=0&&d<=30){
        grupos.renovacion.push({key:key+"_ren",u:inq.unidad,nom:inq.nombre,tel:inq.tel,
          msg:"Hola "+nom+"! Tu contrato vence el "+fecDisp(inq.egreso)+" (en "+d+" dia"+(d!==1?"s":"")+"). Contactanos para gestionar la renovacion. Adm: 1555787641"});
      }
    }
    // Ajuste cuatrimestral
    var mesN=h.getMonth()+1,diaN=h.getDate();
    var esPreAj=(mesN===3||mesN===7||mesN===11)&&diaN>=16;
    var esMesAj=(mesN===4||mesN===8||mesN===12)&&diaN<=15;
    if(esPreAj||esMesAj){
      var nv=inq.nuevo_alq||Math.round(inq.alquiler*1.12);
      var mesesAj={4:"Abril",8:"Agosto",12:"Diciembre"};
      var mesAjN=esMesAj?mesesAj[mesN]:mesesAj[mesN===3?4:mesN===7?8:12];
      grupos.ajuste.push({key:key+"_aj",u:inq.unidad,nom:inq.nombre,tel:inq.tel,
        msg:"Hola "+nom+"! Ajuste cuatrimestral "+mesAjN+": "+fmt(inq.alquiler)+" → "+fmt(nv)+". Aplica desde el dia 1. Adm: 1555787641"});
    }
  });
  
  // Alertas de servicios/costos proximos a vencer
  var cr2=getCfgRec();
  var diasAviso=cr2.dias_aviso_costo;
  var hoyDate=new Date(h.getFullYear(),h.getMonth(),h.getDate());
  oA(DATA.cst).forEach(function(c){
    if(c.pagado||!c.fec_venc) return;
    var venc=new Date(c.fec_venc+"T00:00:00");
    var diffDias=Math.round((venc-hoyDate)/86400000);
    if(diffDias>=0&&diffDias<=diasAviso){
      var label=diffDias===0?"HOY":diffDias===1?"manana":"en "+diffDias+" dias";
      grupos.servicios.push({
        key:"svc_"+c._key,
        u:c.ed||"General",
        nom:esc(c.desc||""),
        tel:"",
        msg:"Servicio a vencer "+label+": "+esc(c.desc||"")+" — "+fmt(c.monto||0)+" (vence "+fecDisp(c.fec_venc)+")"
      });
    }
    // Vencido sin pagar
    if(diffDias<0){
      grupos.servicios.push({
        key:"svc_venc_"+c._key,
        u:c.ed||"General",
        nom:esc(c.desc||"")+" ⚠ VENCIDO",
        tel:"",
        msg:"Servicio VENCIDO: "+esc(c.desc||"")+" — "+fmt(c.monto||0)+" (vencio "+fecDisp(c.fec_venc)+")"
      });
    }
  });

  // Agenda events for today and next 7 days
  var hoy7=new Date(h); hoy7.setDate(hoy7.getDate()+7);
  var hoyStr=hoy();
  evA.filter(function(ev){return ev.fecha>=hoyStr&&ev.fecha<=hoy7.toISOString().split("T")[0];})
    .sort(function(a,b){return a.fecha.localeCompare(b.fecha);})
    .forEach(function(ev){
      grupos.agenda.push({key:"ev_"+ev._key,u:ev.unidad||"",nom:ev.nombre||ev.titulo,tel:ev.tel||"",
        fecha:ev.fecha,tipo:ev.tipo,titulo:ev.titulo,
        msg:ev.tel?"Hola "+esc(ev.nombre||"")+"! Recordatorio: "+ev.titulo+" el "+ev.fecha+(ev.unidad?" en "+ev.unidad:"")+". Adm: 1555787641":""});
    });
  
  window._als_grupos=grupos;
  window._als_sent=sent;
  
  var total=Object.values(grupos).reduce(function(s,g){return s+g.length;},0);
  var pendientes=Object.values(grupos).reduce(function(s,g){return s+g.filter(function(a){return !sent[a.key];}).length;},0);
  
  var o="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px'>";
  o+="<div><h2 style='font-size:20px;font-weight:800'>Alertas</h2>";
  o+="<p style='color:#64748B;font-size:11px'>Dia "+dia+" — "+pendientes+" pendientes de "+total+" total</p></div>";
  o+="<div style='display:flex;gap:6px;flex-wrap:wrap'><button class='btn bp bsm' onclick='openEv()'>+ Recordatorio</button><button class='btn bsm' style='background:#06B6D4;color:#000' onclick='verRenovacionesMes()'>Renovaciones</button><button class='btn bg bsm' onclick='limpiarOk()'>Limpiar OK</button></div></div>";
  
  // Render each group
  var grupos_config=[
    {id:"mora",label:"Mora (dia 10+)",color:"#EF4444"},
    {id:"morosos",label:"Pago tardio (dia 5-9)",color:"#F97316"},
    {id:"pronto",label:"Pronto pago (dia 1-4)",color:"#10B981"},
    {id:"ajuste",label:"Ajuste cuatrimestral",color:"#8B5CF6"},
    {id:"renovacion",label:"Renovacion de contrato",color:"#06B6D4"},
    {id:"agenda",label:"Agenda proximos 7 dias",color:"#3B82F6"},
    {id:"servicios",label:"Servicios/costos por vencer",color:"#F59E0B"}
  ];

// Helper: get cumulative balance for an account up to a date (inclusive)
function saldoAcumulado(cta, hastaFecha, hastaM){
  // All payments in this account up to date
  var ing=0,egr=0;
  oA(DATA.cob).forEach(function(c){
    pA(c).forEach(function(p){
      if(p.cuenta===cta&&p.fecha<=hastaFecha) ing+=p.monto;
    });
  });
  oA(DATA.aj).forEach(function(a){
    if(a.cuenta===cta&&a.fecha<=hastaFecha){
      if(a.tipo==="ingreso") ing+=Number(a.monto||0);
      else egr+=Number(a.monto||0);
    }
  });
  oA(DATA.cst).forEach(function(c){
    if(c.pagos&&Object.keys(c.pagos).length>0){
      // Pagos individuales: usar fecha real de cada pago
      Object.values(c.pagos).forEach(function(pg){
        if(pg.cuenta===cta&&pg.fecha&&pg.fecha<=hastaFecha) egr+=Number(pg.monto||0);
      });
    } else if(c.pagado&&c.cuenta===cta){
      // Sin pagos individuales: SOLO usar fecha_pago (no fec_venc como fallback)
      // Si no tiene fecha_pago, no se puede saber cuándo se pagó - no incluir
      var fp=c.fecha_pago||"";
      if(fp&&fp<=hastaFecha) egr+=Number(c.monto||0);
    }
  });
  // Subtract withdrawals, add deposits (movs)
  oA(DATA.movs).forEach(function(mv){
    if(mv.fecha<=hastaFecha){
      // Solo usar cuenta_caja explícita - NO asumir Efectivo si no está definida
      var ctaCajaDelMov=mv.cuenta_caja||"";
      if(ctaCajaDelMov&&ctaCajaDelMov===cta){
        if(mv.tipo==="retiro") egr+=Number(mv.monto||0);
        else ing+=Number(mv.monto||0);
      }
    }
  });
  return ing-egr;
}

  var movsM=oA(DATA.movs).filter(function(mv){return mv.fecha&&mv.fecha.startsWith(m);});
  var subcM=oA(DATA.subc).filter(function(s){return s.fecha&&s.fecha.startsWith(m);});
  var cierreM=oA(DATA.cierres).filter(function(c){return c.mes===m;})[0];

        +ajM.filter(function(a){return a.tipo==="ingreso"&&!a.auto;}).reduce(function(s,a){return s+Number(a.monto||0);},0);

        +ajM.filter(function(a){return a.tipo==="egreso"&&!a.auto;}).reduce(function(s,a){return s+Number(a.monto||0);},0);
  var util=iM-eM;

  if(_cajaV==="dia"){

      pA(c).filter(function(p){return p.fecha===_cajaF;}).forEach(function(p){
        // Si el pago fue en cuenta de socio (MP Loli, MP Hugo, etc), va a columna Socios

        });
      });
    });
    // Costos - agrupar pagos del mismo costo en una sola fila por dia
    oA(DATA.cst).forEach(function(c){
      if(c.pagos&&Object.keys(c.pagos).length>0){
        // Agrupar pagos del dia por cuenta

        // Sumar por cuenta

        });
        Object.keys(porCuenta).forEach(function(ct){

        }
      }
    });
    // Ajustes manuales
    ajM.filter(function(a){return a.fecha===_cajaF&&!a.auto;}).forEach(function(a){
      var clasifLabel={"error":"[ERROR]","gs_corriente":"[Gs.corriente]","gs_extraordinario":"[Gs.ext.]","inversion":"[Inversion]","ingreso_venta":"[Venta]"}[a.clasificacion||a.sub]||"";

    // Aportes y retiros de socios

    // fondoTotal = sum of ALL accounts at start of day
    var fondoTotal=["Efectivo","Bco Loli","Bco Hugo","MP Loli","MP Hugo","Visa Galicia Hugo","Master BBVA Hugo","Visa BBVA Hugo","Visa BBVA Loli","Master BBVA Loli"].reduce(function(s,cta){return s+saldoAcumulado(cta,ayerStr,m);},0);

function guardarTC(){

function cerrarMes(){
  if(!confirm("Cerrar el mes "+_cajaMes+"? Esta accion es definitiva."))return;
  // Ask for exchange rate if not set
  var tcActual=Number(localStorage.getItem("gp_tc_"+_cajaMes)||0);
  if(!tcActual){
    var tcInput=prompt("Ingresa el tipo de cambio USD promedio del mes "+_cajaMes+" (ej: 1250):");
    if(tcInput&&Number(tcInput)>0){
      localStorage.setItem("gp_tc_"+_cajaMes,tcInput);
    }
  }
  var m=_cajaMes;
  var cobM=oA(DATA.cob).filter(function(c){return c.mes===m;});
  var cstM=oA(DATA.cst).filter(function(c){return c.mes===m&&c.pagado;});
  var ajM=oA(DATA.aj).filter(function(a){return a.fecha&&a.fecha.startsWith(m)&&!a.auto;});
  var iM=cobM.reduce(function(s,c){return s+pT(c);},0)+ajM.filter(function(a){return a.tipo==="ingreso";}).reduce(function(s,a){return s+Number(a.monto||0);},0);
  var eM=cstM.reduce(function(s,c){return s+Number(c.monto||0);},0)+ajM.filter(function(a){return a.tipo==="egreso";}).reduce(function(s,a){return s+Number(a.monto||0);},0);
  var tc=Number(localStorage.getItem("gp_tc_"+m)||0);
  // Save saldos por cuenta at month end
  var saldosCuenta={};
  CTAS.forEach(function(cta){saldosCuenta[cta]=saldoAcumulado(cta,m+"-31",m);});
  DB.ref("cierres").push({mes:m,fecha:hoy(),ingresos:iM,egresos:eM,utilidad:iM-eM,tc:tc,cerradoPor:USER.n,saldos:saldosCuenta});
  alert("Mes "+m+" cerrado. Utilidad: "+fmt(iM-eM));
  setTimeout(rCaja,300);
}

function openSubc(){
  var m=_cajaMes;

  var cobM2=oA(DATA.cob).filter(function(c){return c.mes===m;});
  var cstM2=oA(DATA.cst).filter(function(c){return c.mes===m&&c.pagado;});
  var ajM2=oA(DATA.aj).filter(function(a){return a.fecha&&a.fecha.startsWith(m)&&!a.auto;});

  var saldosDia={};
  CTAS.forEach(function(cta){
    var salIni=saldoAcumulado(cta,ayerStr,m);
    var ingHoy=cobM2.reduce(function(s,c){return s+pA(c).filter(function(p){return p.fecha===_cajaF&&p.cuenta===cta;}).reduce(function(a,p){return a+p.monto;},0);},0)
              +ajM2.filter(function(a){return a.fecha===_cajaF&&a.tipo==="ingreso"&&a.cuenta===cta;}).reduce(function(s,a){return s+Number(a.monto||0);},0);
    var egrHoy=cstM2.filter(function(c){return c.fec_venc===_cajaF&&c.cuenta===cta;}).reduce(function(s,c){return s+Number(c.monto||0);},0)
              +ajM2.filter(function(a){return a.fecha===_cajaF&&a.tipo==="egreso"&&a.cuenta===cta;}).reduce(function(s,a){return s+Number(a.monto||0);},0);
    saldosDia[cta]=salIni+ingHoy-egrHoy;
  });

  var o="<div class='wbx' style='margin-bottom:12px'>Al confirmar, la caja del dia <b>"+_cajaF+"</b> queda cerrada por <b>"+USER.n+"</b>. No se puede modificar.</div>";

  o+="</tbody></table>";
  o+="<div style='display:flex;justify-content:flex-end;gap:7px'>";
  o+="<button class='btn bg bsm' onclick='closeModal()'>Cancelar</button>";
  o+="<button class='btn bok' onclick='saveSubc(false)'>Confirmar cierre</button>";
  o+="<button class='btn bp' onclick='saveSubc(true)'>Confirmar y enviar WA</button>";
  o+="</div>";
  openModal("Cierre de caja — "+fecDisp(_cajaF),o,true);

function saveSubc(sendWA){
  var saldos={},ups={};
  CTAS.forEach(function(cta){
    var sistema=saldoAcumulado(cta,_cajaF,_cajaMes);
    var inp=G("sc-"+cta.replace(/ /g,"-"));
    var real=inp&&inp.value.trim()?Number(inp.value):sistema; // if empty, no difference
    var dif=real-sistema;
    saldos[cta]={sistema:sistema,real:real,dif:dif};
    // Register difference as adjustment only if non-zero
    if(dif!==0){
      var nk=DB.ref("aj").push().key;
      ups["aj/"+nk]={fecha:_cajaF,tipo:dif>0?"ingreso":"egreso",sub:"Diferencia de caja",
        cuenta:cta,concepto:"Diferencia subcierre "+_cajaF,monto:Math.abs(dif),auto:true};
    }
  });
  var sk=DB.ref("subc").push().key;
  ups["subc/"+sk]={fecha:_cajaF,cerradoPor:USER.n,saldos:saldos};
  DB.ref("/").update(ups);
  closeModal();
  if(sendWA){
    // Build WA summary message

function rStats(){
  var iqA=oA(DATA.iq),histA=oA(DATA.hist);
  var act=iqA.filter(function(i){return i.estado==="activo";});
  var totU=Object.values(ED).reduce(function(s,e){return s+e.u;},0);
  var cieA=oA(DATA.cierres).sort(function(a,b){return(b.mes||"").localeCompare(a.mes||"");});

  // Current month
  var m=mes(),tcVal=Number(localStorage.getItem("gp_tc_"+m)||0);
  var cobM=oA(DATA.cob).filter(function(c){return c.mes===m;});
  var cstM=oA(DATA.cst).filter(function(c){return c.mes===m&&c.pagado;});
  var ajM=oA(DATA.aj).filter(function(a){return a.fecha&&a.fecha.startsWith(m)&&!a.auto;});
  var iM=cobM.reduce(function(s,c){return s+pT(c);},0)+ajM.filter(function(a){return a.tipo==="ingreso";}).reduce(function(s,a){return s+Number(a.monto||0);},0);
  var eM=cstM.reduce(function(s,c){return s+Number(c.monto||0);},0)+ajM.filter(function(a){return a.tipo==="egreso";}).reduce(function(s,a){return s+Number(a.monto||0);},0);
  var util=iM-eM;

  var o="<h2 style='font-size:20px;font-weight:800;margin-bottom:12px'>Estadisticas</h2>";

  // Summary cards
  o+="<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px'>";
  o+=sc("GP","Ocupacion",act.length+"/"+totU,(totU?Math.round((act.length/totU)*100):0)+"%","");
  o+=sc("R","Rotacion",histA.length,"historico","#F59E0B");
  o+=sc("$","Renta/mes",fmt(act.reduce(function(s,i){return s+i.alquiler;},0)),"potencial","#10B981");
  o+=sc("C","Cobrado",fmt(iM),"este mes","#10B981");
  o+=sc("X","Costos",fmt(eM),"este mes","#EF4444");
  o+=sc("=","Resultado",fmt(util),"",util>=0?"#10B981":"#EF4444");
  if(tcVal>0) o+=sc("$","USD",fusd(util,tcVal),"","#06B6D4");
  o+="</div>";

  // Por edificio
  // Stats per building with current month
  o+="<div class='card' style='margin-bottom:10px;overflow-x:auto'>";
  o+="<h3 style='font-size:13px;font-weight:700;margin-bottom:8px'>Ingresos por Edificio — "+m+(tcVal>0?" (USD: 1=$"+tcVal+")":"")+"</h3>";
  o+="<table class='tbl'><thead><tr><th>Edif.</th><th>Ocup.</th><th>Renta pot.</th><th>Cobrado</th><th>Costos</th><th>Resultado</th><th>USD</th></tr></thead><tbody>";
  Object.keys(ED).forEach(function(cod){
    var inqEd=act.filter(function(i){return i.unidad&&i.unidad.startsWith(cod+"-");});
    var rentaPot=inqEd.reduce(function(s,i){return s+i.alquiler;},0);
    var cobEd=cobM.filter(function(c){return c.unidad&&c.unidad.startsWith(cod+"-");}).reduce(function(s,c){return s+pT(c);},0);
    var cstEd=cstM.filter(function(c){return c.ed===cod;}).reduce(function(s,c){return s+Number(c.monto||0);},0);
    var resEd=cobEd-cstEd;
    o+="<tr><td>"+bdg(cod,COL[cod]||"#64748B")+"</td>";
    o+="<td>"+inqEd.length+"/"+ED[cod].u+"</td>";
    o+="<td style='color:#94A3B8'>"+fmt(rentaPot)+"</td>";
    o+="<td style='color:#10B981'>"+fmt(cobEd)+"</td>";
    o+="<td style='color:#EF4444'>"+fmt(cstEd)+"</td>";
    o+="<td style='color:"+(resEd>=0?"#10B981":"#EF4444")+";font-weight:700'>"+fmt(resEd)+"</td>";
    o+="<td style='color:#06B6D4'>"+(tcVal>0?fusd(resEd,tcVal):"--")+"</td></tr>";
  });
  o+="</tbody></table></div>";

  // Historial de cierres
  // Top departments by rent
  if(act.length){
    o+="<div class='card' style='margin-bottom:10px;overflow-x:auto'>";
    o+="<h3 style='font-size:13px;font-weight:700;margin-bottom:8px'>Por Departamento — alquiler actual</h3>";
    o+="<table class='tbl'><thead><tr><th>Depto</th><th>Inquilino</th><th>Alquiler</th><th>USD</th><th>Vence</th></tr></thead><tbody>";
    act.sort(function(a,b){return b.alquiler-a.alquiler;}).forEach(function(i){
      var d=i.egreso?Math.round((new Date(i.egreso)-new Date())/86400000):-1;
      o+="<tr><td>"+bdg(i.unidad,COL[i.unidad.split('-')[0]]||'#64748B')+"</td>";
      o+="<td style='font-size:11px'>"+esc(i.nombre.split(',')[0])+"</td>";
      o+="<td style='color:#10B981;font-weight:600'>"+fmt(i.alquiler)+"</td>";
      o+="<td style='color:#06B6D4'>"+(tcVal>0?fusd(i.alquiler,tcVal):"--")+"</td>";
      o+="<td style='color:"+(d>=0&&d<=30?"#F59E0B":"#64748B")+";font-size:10px'>"+(i.egreso||"--")+"</td></tr>";
    });
    o+="</tbody></table></div>";
  }

  // Costos variables del mes (eventuales de caja)
  var cstVar=cstM.filter(function(c){return c.tipo==="eventual_caja";});
  if(cstVar.length){
    o+="<div class='card' style='margin-bottom:10px;overflow-x:auto;border-left:3px solid #F59E0B'>";
    o+="<h3 style='font-size:13px;font-weight:700;margin-bottom:8px'>Costos variables del mes — "+m+"</h3>";
    o+="<p style='color:#64748B;font-size:11px;margin-bottom:8px'>Gastos eventuales registrados desde caja. No forman parte de los costos fijos.</p>";

    // Agrupar por categoria
    var varPorCat={};
    cstVar.forEach(function(c){
      var cat=c.cat||"Otro";
      if(!varPorCat[cat]) varPorCat[cat]={total:0,items:[]};
      varPorCat[cat].total+=Number(c.monto||0);
      varPorCat[cat].items.push(c);
    });
    var totalVar=cstVar.reduce(function(s,c){return s+Number(c.monto||0);},0);

    o+="<table class='tbl'><thead><tr><th>Categoria</th><th>Descripcion</th><th>Edificio</th><th>Fecha</th><th>Monto</th></tr></thead><tbody>";
    cstVar.sort(function(a,b){return(a.cat||"").localeCompare(b.cat||"");}).forEach(function(c){
      var cc=CATC[c.cat]||"#64748B";
      o+="<tr>";
      o+="<td>"+bdg(c.cat||"Otro",cc)+"</td>";
      o+="<td style='font-size:12px'>"+esc(c.desc||"")+"</td>";
      o+="<td style='color:#64748B;font-size:11px'>"+esc(c.ed||"General")+"</td>";
      o+="<td style='color:#64748B;font-size:11px'>"+fecDisp(c.fecha_pago||c.fec_venc||"")+"</td>";
      o+="<td style='color:#EF4444;font-weight:700'>"+fmt(c.monto||0)+"</td>";
      o+="</tr>";
    });
    o+="<tr style='border-top:2px solid #334155;font-weight:700'><td colspan='4'>Total costos variables</td><td style='color:#EF4444'>"+fmt(totalVar)+"</td></tr>";
    o+="</tbody></table>";

    // Resumen por categoria
    o+="<div style='margin-top:10px;display:flex;flex-wrap:wrap;gap:8px'>";
    Object.keys(varPorCat).forEach(function(cat){
      var cc=CATC[cat]||"#64748B";
      o+="<div style='background:"+cc+"22;border:1px solid "+cc+"44;border-radius:8px;padding:6px 10px'>";
      o+="<div style='color:"+cc+";font-size:10px;font-weight:700'>"+cat+"</div>";
      o+="<div style='color:#F1F5F9;font-size:12px;font-weight:700'>"+fmt(varPorCat[cat].total)+"</div>";
      o+="<div style='color:#64748B;font-size:10px'>"+varPorCat[cat].items.length+" item"+(varPorCat[cat].items.length!==1?"s":"")+"</div>";
      o+="</div>";
    });
    o+="</div>";
    o+="</div>";
  }

  if(cieA.length){
    o+="<div class='card' style='overflow-x:auto'>";
    o+="<h3 style='font-size:13px;font-weight:700;margin-bottom:8px'>Historial de Resultados Mensuales</h3>";
    o+="<table class='tbl'><thead><tr><th>Mes</th><th>Ingresos</th><th>Egresos</th><th>Resultado</th><th>USD</th><th>x Socio</th></tr></thead><tbody>";
    cieA.forEach(function(c){
      var u=c.utilidad||0;
      o+="<tr><td style='font-weight:600'>"+c.mes+"</td>";
      o+="<td style='color:#10B981'>"+fmt(c.ingresos||0)+"</td>";
      o+="<td style='color:#EF4444'>"+fmt(c.egresos||0)+"</td>";
      o+="<td style='color:"+(u>=0?"#10B981":"#EF4444")+";font-weight:700'>"+fmt(u)+"</td>";
      o+="<td style='color:#06B6D4'>"+(c.tc>0?fusd(u,c.tc):"--")+"</td>";
      o+="<td style='color:#8B5CF6'>"+(u>0?fmt(u/2):"--")+"</td></tr>";
    });
    o+="</tbody></table></div>";
  }

  G("main").innerHTML=o;
}

var _cfgTab = "propiedades"; // propiedades | costos | ingresos

function rConfig(){
  if(USER.r!=="admin"){G("main").innerHTML="<p style='color:#EF4444;padding:20px'>Solo el administrador puede acceder.</p>";return;}

  var tabs = [["propiedades","Propiedades"],["costos","Costos"],["ingresos","Ingresos extras"],["categorias","Categorias"],["usuarios","Usuarios"],["recargos","% Recargos"],["acuerdo","📄 Acuerdo"],["limpieza","🗑 Limpieza"]];
  var o = "<h2 style='font-size:20px;font-weight:800;margin-bottom:12px'>Configuracion</h2>";
  o += "<div style='display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap'>";
  tabs.forEach(function(t){
    var cls="btn bsm "+(_cfgTab===t[0]?"bp":"bg");
    var btn=document.createElement("button");
    btn.className=cls;
    btn.textContent=t[1];
    btn.dataset.tab=t[0];
    o += "<button class='"+cls+"' data-cfgtab='"+t[0]+"'>"+t[1]+"</button>";
  });
  o += "</div><div id='cfg-body'></div>";
  G("main").innerHTML = o;
  G("main").addEventListener("click",function(e){var b=e.target.closest("[data-cfgtab]");if(b){_cfgTab=b.dataset.cfgtab;rConfig();}},true);

  if(_cfgTab==="propiedades") renderCfgProp();
  else if(_cfgTab==="costos") renderCfgCostos();
  else if(_cfgTab==="ingresos") renderCfgIngresos();
  else if(_cfgTab==="categorias") renderCfgCats();
  else if(_cfgTab==="recargos") renderCfgRecargos();
  else if(_cfgTab==="acuerdo") renderCfgAcuerdo();
  else if(_cfgTab==="limpieza") renderCfgLimpieza();
  else if(_cfgTab==="usuarios") renderCfgUsuarios();
}

// ── TAB COSTOS ────────────────────────────────────────────────────────────────
function renderCfgCostos(){
  var el=G("cfg-body"); if(!el) return;
  var costosExtra=oA(DATA.cfg).filter(function(x){return x.tipo==="otro_gasto"||x.tipo==="costo_extra"||x.tipo==="costo_fijo_extra";});
  var cfActual=getCF();
  var cats=[]; cfActual.forEach(function(c){if(!cats.includes(c.c))cats.push(c.c);}); cats.push("Otro");

  // Group costs by category
  var grupos={};
  cfActual.filter(function(c){return !c.id.startsWith("ce_")&&!oA(DATA.cfg).filter(function(x){return x.tipo==="costo_extra";}).map(function(x){return x._key;}).includes(c.id);}).forEach(function(c){if(!grupos[c.c])grupos[c.c]=[];grupos[c.c].push(c);});

  var o="<div class='card' style='margin-bottom:10px'>";
  o+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'>";
  o+="<h3 style='font-size:13px;font-weight:700'>Costos fijos del sistema ("+CF.length+" items)</h3></div>";
  o+="<p style='color:#64748B;font-size:11px;margin-bottom:8px'>Estos costos se generan automaticamente cada mes. Para agregar o quitar servicios usa el boton de abajo.</p>";
  Object.keys(grupos).forEach(function(cat){
    var cc=CATC[cat]||"#64748B";

// ── AJUSTE CUATRIMESTRAL (Abril, Agosto, Diciembre) ──────────────────────────
function openAjusteCuat(){
  var iqA=oA(DATA.iq).filter(function(i){return i.estado==="activo";});
  if(!iqA.length){alert("No hay acuerdos activos");return;}
  var hoy_mes=new Date().getMonth()+1;
  var prox=hoy_mes<4?"Abril":hoy_mes<8?"Agosto":hoy_mes<12?"Diciembre":"Abril";
  var o="<p style='color:#94A3B8;font-size:12px;margin-bottom:4px'>Ajuste cuatrimestral (<b style='color:#8B5CF6'>"+prox+"</b>) — modificacion discrecional por inquilino.</p>";
  o+="<p style='color:#64748B;font-size:11px;margin-bottom:10px'>Ingresa el nuevo valor para cada uno. Deja igual los que no cambian. El sistema enviara alertas WA 15 dias antes desde la seccion Alertas.</p>";
  o+="<div style='overflow-x:auto'><table class='tbl'><thead><tr><th>Unidad</th><th>Inquilino</th><th>Alquiler actual</th><th>Nuevo valor $ (editable)</th><th>Diferencia</th></tr></thead><tbody id='aj-tbody'></tbody></table></div>";
  o+="<div style='display:flex;gap:8px;margin:10px 0;flex-wrap:wrap'>";
  o+="<div class='fld' style='margin:0;flex:1'><label class='lbl'>Aplicar % a todos</label><div style='display:flex;gap:5px'><input class='inp' type='number' id='aj-pct' placeholder='ej: 15' style='max-width:90px'/><button class='btn bg bsm' onclick='aplicarPct()'>Aplicar %</button></div></div>";
  o+="</div>";
  o+="<div style='display:flex;justify-content:flex-end;gap:7px;margin-top:12px'><button class='btn bg bsm' onclick='closeModal()'>Cancelar</button><button class='btn bok bsm' onclick='saveAjusteCuat()'>Guardar Ajuste</button></div>";
  openModal("Ajuste Cuatrimestral",o,true);
  // Populate table
  setTimeout(function(){
    var tbody=G("aj-tbody"); if(!tbody) return;
    iqA.sort(function(a,b){return a.unidad.localeCompare(b.unidad);}).forEach(function(i){
      var tr=document.createElement("tr");
      tr.innerHTML="<td style='font-weight:600'>"+i.unidad+"</td><td style='font-size:11px'>"+esc(i.nombre.split(",")[0])+"</td><td style='color:#10B981'>"+fmt(i.alquiler)+"</td><td><input class='inp' type='number' id='ajv-"+i._key+"' value='"+i.alquiler+"' style='padding:4px 8px;font-size:12px'/></td><td id='ajd-"+i._key+"' style='color:#94A3B8;font-size:11px'>--</td>";
      tbody.appendChild(tr);
      G("ajv-"+i._key).oninput=function(){
        var nuevo=Number(this.value||0);
        var dif=nuevo-i.alquiler;
        var pct=i.alquiler>0?Math.round((dif/i.alquiler)*100):0;
        var el=G("ajd-"+i._key);
        if(el)el.innerHTML="<span style='color:"+(dif>0?"#10B981":dif<0?"#EF4444":"#64748B")+"'>"+(dif>0?"+":"")+fmt(dif)+" ("+pct+"%)</span>";
      };
    });
    window._iqAjuste=iqA;
  },50);
}
window.aplicarPct=function(){
  var pct=Number(G("aj-pct").value||0); if(!pct) return;
  (window._iqAjuste||[]).forEach(function(i){
    var inp=G("ajv-"+i._key); if(!inp) return;
    var nuevo=Math.round(i.alquiler*(1+pct/100));
    inp.value=nuevo;
    inp.dispatchEvent(new Event("input"));
  });
};
function saveAjusteCuat(){
  var iqA=oA(DATA.iq).filter(function(i){return i.estado==="activo";});
  var cambios=0;
  iqA.forEach(function(i){
    var inp=G("ajv-"+i._key); if(!inp) return;
    var nuevo=Number(inp.value||0);
    if(nuevo>0&&nuevo!==i.alquiler){
      DB.ref("iq/"+i._key).update({alquiler:nuevo,nuevo_alq:nuevo});
      cambios++;
    }
  });
  closeModal();
  alert("Ajuste guardado en "+cambios+" unidades. Desde Alertas podes enviar el aviso a cada inquilino 15 dias antes.");
}

function saveRenovar(key){
  var i=DATA.iq[key];
  var alq=Number(G("rv-alq").value||0);
  var gs=Number(G("rv-gs").value||0);
  var cuotas=G("rv-cuotas").value.includes("2")?2:1;
  var ini=G("rv-ini").value;
  var egr=G("rv-egr").value;
  if(!alq){alert("El alquiler es obligatorio");return;}
  // Keep ingreso original, only update egreso and alquiler
  var upd={alquiler:alq,egreso:egr||i.egreso};
  // Do NOT change i.ingreso - it stays as original entry date
  DB.ref("iq/"+key).update(upd);
  // Register gastos as cobranza entries
  if(gs>0){
    var montoCuota=Math.round(gs/cuotas);
    var yr=parseInt(mes().split("-")[0]),mo=parseInt(mes().split("-")[1]);
    for(var c=0;c<cuotas;c++){
      var moc=mo+c; var yrc=yr;
      if(moc>12){moc=moc-12;yrc++;}
      var mesC=yrc+"-"+String(moc).padStart(2,"0");
      DB.ref("cob").push({
        id_ac:i.id_ac||"",unidad:i.unidad,inq:i.nombre,
        mes:mesC,monto_total:montoCuota,sal_ant:0,estado:"pendiente",pagos:{},
        concepto:"Gastos renovacion cuota "+(c+1)+"/"+cuotas
      });
    }
  }
  closeModal();closeModal();
  alert("Renovacion registrada! Nuevo alquiler: "+fmt(alq)+(gs>0?". Gastos "+fmt(gs)+" en "+cuotas+" cuota"+(cuotas>1?"s":""):".")+". Fecha de ingreso original sin cambios.");
}

function saveAdicional(key){
  var i=DATA.iq[key];
  var con=G("adl-con").value; if(!con){alert("El concepto es obligatorio");return;}
  var tipo=G("adl-tipo").value;
  var val=Number(G("adl-val").value||0); if(!val){alert("El valor es obligatorio");return;}
  var monto=tipo==="pct"?Math.round(i.alquiler*(val/100)):val;
  var desde=G("adl-desde").value||mes();
  var hasta=G("adl-hasta").value||"";
  DB.ref("cfg").push({
    tipo:"adicional_iq",unidad:i.unidad,id_ac:i.id_ac||"",
    concepto:con,tipo_calculo:tipo,valor:val,monto:monto,
    desde:desde,hasta:hasta,activo:true,fecha_alta:hoy()
  });
  // If current month is in range, add to cobranza
  var m=mes();
  if(m>=desde&&(!hasta||m<=hasta)){
    var cobActual=oA(DATA.cob).filter(function(c){return c.mes===m&&c.unidad===i.unidad;})[0];
    if(cobActual){
      DB.ref("cob/"+cobActual._key+"/monto_total").set(cobActual.monto_total+monto);
    }
  }
  closeModal();closeModal();
  alert("Adicional registrado: "+fmt(monto)+"/mes por "+con+(tipo==="pct"?" ("+val+"% del alquiler)":"")+(hasta?" hasta "+hasta:"")+". Aplica desde "+desde+".");
}
function quitarAdicional(key){
  if(!confirm("Quitar este adicional?"))return;
  DB.ref("cfg/"+key).update({activo:false,fecha_baja:hoy()});
  closeModal();
  setTimeout(function(){go("acuerdos");},300);
}

// Apply additionals when generating cobranzas
function aplicarAdicionales(unidad, montoBase, mesC){
  var m=mesC||mes();
  var adicionales=oA(DATA.cfg).filter(function(x){
    return x.tipo==="adicional_iq"&&x.unidad===unidad&&x.activo!==false&&
      m>=x.desde&&(!x.hasta||m<=x.hasta);
  });
  var extra=adicionales.reduce(function(s,a){return s+a.monto;},0);
  return extra;
}

  var monto=Number(G("dd-monto").value||0);
  if(!monto){alert("Ingresa el monto");return;}
  if(!confirm("Registrar devolucion de "+fmt(monto)+" del deposito de "+i.nombre+"?"))return;
  // Register as egreso in aj (caja)
  DB.ref("aj").push({
    fecha:G("dd-fecha").value,tipo:"egreso",sub:"Devolucion deposito",
    cuenta:G("dd-cta").value,concepto:"Devolucion deposito - "+i.unidad+" - "+i.nombre,
    monto:monto,obs:G("dd-obs").value
  });
  // Register evento in historial
  DB.ref("cfg").push({
    tipo:"evento_iq",id_ac:i.id_ac,unidad:i.unidad,
    texto:"Devolucion de deposito: "+fmt(monto)+" desde "+G("dd-cta").value+". "+G("dd-obs").value,
    fecha:G("dd-fecha").value,usuario:USER.n,fecha_ts:Date.now()
  });
  // Update inquilino deposito
  DB.ref("iq/"+key).update({deposito_devuelto:monto,fecha_dev_dep:G("dd-fecha").value});
  closeModal();closeModal();
  alert("Devolucion de "+fmt(monto)+" registrada en Caja y en el historial del inquilino.");
}

function openEditPagos(ckey){
  var c=DATA.cob[ckey]; if(!c) return;

  var o="<p style='color:#94A3B8;font-size:12px;margin-bottom:10px'>"+c.unidad+" - "+esc(c.inq)+" - "+esc(c.concepto||"Alquiler")+"</p>";
  o+="<div id='ep-list'>";
  pagos.forEach(function(p,idx){

    var pki=kpush(ckey+"__"+pk);
    o+="<div style='background:#0F172A;border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center'>";
    o+="<div style='font-size:12px'>";

    o+="<div style='color:#64748B;font-size:10px'>"+esc(p.fecha)+" - "+esc(p.cuenta)+"</div>";

    o+="<button class='btn bx bsm' data-delpago='"+pki+"'>Borrar</button>";
    o+="</div>";
  });
  o+="</div>";
  o+="<div style='display:flex;justify-content:flex-end;gap:7px;margin-top:10px'>";
  o+="<button class='btn bg bsm' onclick='closeModal()'>Cerrar</button></div>";
  openModal("Editar pagos - "+c.unidad,o);
  var md=MODS[MODS.length-1];
  md.onclick=function(e){
    var dp=e.target.closest("[data-delpago]");
    if(dp){
      var raw=kget(parseInt(dp.dataset.delpago));
      var parts=raw.split("__");
      var ck=parts[0],pk=parts[1];
      if(confirm("Borrar este pago?"))deletePago(ck,pk);
    }
    if(e.target.classList.contains("ov"))closeModal();
  };

function deletePago(ckey,pagoKey){
  var c=DATA.cob[ckey]; if(!c) return;
  var ups={};
  ups["cob/"+ckey+"/pagos/"+pagoKey]=null;
  // Recalculate state
  var pagosRestantes=Object.assign({},c.pagos||{});
  delete pagosRestantes[pagoKey];
  var tot=c.monto_total+Number(c.sal_ant||0);
  var pg=Object.values(pagosRestantes).reduce(function(s,p){return s+p.monto;},0);
  ups["cob/"+ckey+"/estado"]=pg>=tot?"pagado":pg>0?"parcial":"pendiente";
  DB.ref("/").update(ups);
  closeModal();
  alert("Pago eliminado.");
  setTimeout(rCob,300);
}

function saveGastoAjuste(){
  if(window._gaTab==="ajuste"){
    // Tomar clasificacion del select antes de llamar saveAj
    saveAj(); return;
  }
  // Gasto
  var desc=G("gc-desc").value.trim();
  var monto=Number(G("gc-monto").value||0);
  var cta=G("gc-cta").value||"Efectivo";
  if(!desc){alert("La descripcion es obligatoria");return;}
  if(!monto){alert("El monto es obligatorio");return;}

  var esCuentaSocio=CTAS_SOCIOS.indexOf(cta)>=0;
  // Mapear cuenta socio a Cuenta Loli/Hugo
  var socioMap={"MP Loli":"Cuenta Loli","Visa BBVA Loli":"Cuenta Loli","Master BBVA Loli":"Cuenta Loli",
    "MP Hugo":"Cuenta Hugo","Visa Galicia Hugo":"Cuenta Hugo","Master BBVA Hugo":"Cuenta Hugo","Visa BBVA Hugo":"Cuenta Hugo"};

  if(esCuentaSocio){
    // Registrar como aporte en movs (Cta Socios)
    var socio=socioMap[cta]||"Cuenta Loli";
    DB.ref("movs").push({
      fecha:_cajaF,mes:_cajaF.slice(0,7),
      tipo:"aporte",cuenta:socio,cuenta_caja:cta,
      monto:monto,nota:desc
    });
  } else {
    // Registrar como costo eventual en caja
    DB.ref("cst").push({
      cfid:"ev_"+Date.now(),desc:desc,pv:"",
      ed:G("gc-ed")?G("gc-ed").value||"General":"General",
      cat:G("gc-cat")?G("gc-cat").value||"Otro":"Otro",
      mes:_cajaF.slice(0,7),monto:monto,
      nro_fact:G("gc-fact")?G("gc-fact").value||"":"",
      fec_venc:_cajaF,pagado:true,
      cuenta:cta,fecha_pago:_cajaF,tipo:"eventual_caja"
    });
  }
  closeModal();
  setTimeout(rCaja,400);
}

function saveAhorro(){

  DB.ref("aho").push({fecha:f,mes:m,usd:usd,tc:tc,pesos:pesos,cuenta:cta});

  alert("Compra registrada: U$S "+usd.toLocaleString()+" = "+fmt(pesos)+". Sale de "+cta+".");
}

function enviarCajaWA(){
  // Build message like the Excel sheet
  var m=_cajaMes;
  var cobM2=oA(DATA.cob).filter(function(c){return c.mes===m;});
  var cstM2=oA(DATA.cst).filter(function(c){return c.mes===m&&c.pagado;});
  var ajM2=oA(DATA.aj).filter(function(a){return a.fecha&&a.fecha.startsWith(m)&&!a.auto;});

  var lines=["Caja del dia "+_cajaF];
  var totIng=0,totEgr=0;

  cobM2.forEach(function(c){
    pA(c).filter(function(p){return p.fecha===_cajaF;}).forEach(function(p){
      lines.push((c.unidad||"")+" "+c.inq.split(",")[0]+": +"+fmt(p.monto)+" ("+p.cuenta+")");
      totIng+=p.monto;
    });
  });
  cstM2.filter(function(c){return c.fec_venc===_cajaF;}).forEach(function(c){
    lines.push(c.desc+": -"+fmt(c.monto)+" ("+c.cuenta+")");
    totEgr+=Number(c.monto||0);
  });
  ajM2.filter(function(a){return a.fecha===_cajaF;}).forEach(function(a){
    lines.push(a.concepto+": "+(a.tipo==="ingreso"?"+":"-")+fmt(a.monto)+" ("+a.cuenta+")");
    if(a.tipo==="ingreso") totIng+=Number(a.monto||0);
    else totEgr+=Number(a.monto||0);
  });

  lines.push("─────────────────");
  lines.push("Total ingresado: "+fmt(totIng));
  lines.push("Total egresado: -"+fmt(totEgr));
  lines.push("Resultado del dia: "+fmt(totIng-totEgr));

  var msg=lines.join("\n");
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}

function buscarAjEspecifico(){

function limpiarDuplicadosCostos(){
  if(!confirm("Limpiar costos duplicados del mes seleccionado?"))return;
  var mesSel=G("limp-mes-cst")?G("limp-mes-cst").value:mes();
  var cstMes=oA(DATA.cst).filter(function(c){return c.mes===mesSel;});
  var ups={};
  // Agrupar por cfid y descripcion, conservar el primero, borrar el resto
  var vistos={};
  cstMes.forEach(function(c){
    var key=c.cfid||(c.desc||"").trim().toLowerCase();
    if(vistos[key]){
      // Duplicado — borrar
      ups["cst/"+c._key]=null;
    } else {
      vistos[key]=true;
      // Tambien limpiar pagos duplicados dentro del costo
      if(c.pagos){
        var fechasVistas={};
        Object.entries(c.pagos).forEach(function(entry){
          var pk=entry[0],pg=entry[1];
          var fecha=pg.fecha||"";
          if(fechasVistas[fecha]){
            ups["cst/"+c._key+"/pagos/"+pk]=null;
          } else {
            fechasVistas[fecha]=true;
          }
        });
      }
    }
  });
  if(!Object.keys(ups).length){alert("No se encontraron duplicados en "+mesSel+".");return;}
  DB.ref("/").update(ups,function(){
    alert("Listo! Se eliminaron "+Object.keys(ups).length+" registros duplicados.");
    setTimeout(rConfig,300);
  });
}

  var stockFecha=(DATA.cfg_aho||{}).stock_fecha||"";
  o+="<div class='card' style='margin-bottom:14px;border-left:3px solid #06B6D4'>";
  o+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>";
  o+="<div><h3 style='font-size:14px;font-weight:700;color:#06B6D4'>Fondo de Ahorro USD</h3>";
  o+="<p style='color:#64748B;font-size:11px;margin-top:2px'>Compras acumuladas: <b style='color:#06B6D4'>U$S "+totalUSDRegistrado.toLocaleString()+"</b></p>";
  if(stockManual>0) o+="<p style='color:#10B981;font-size:12px;margin-top:2px'>Stock actual declarado: <b>U$S "+stockManual.toLocaleString()+"</b>"+(stockFecha?" al "+fecDisp(stockFecha):"")+"</p>";
  o+="</div>";
  o+="<button class='btn bp bsm' onclick='openStockUSD()'>✎ Actualizar stock</button></div>";
  if(ahoTodos.length){
    o+="<table class='tbl'><thead><tr><th>Fecha</th><th>USD</th><th>TC</th><th>Pesos</th><th>Cuenta</th></tr></thead><tbody>";
    ahoTodos.forEach(function(a){
      o+="<tr><td style='color:#64748B;font-size:11px'>"+fecDisp(a.fecha||"")+"</td>";
      o+="<td style='color:#06B6D4;font-weight:700'>U$S "+Number(a.usd||0).toLocaleString()+"</td>";
      o+="<td style='color:#94A3B8'>$"+Number(a.tc||0).toLocaleString()+"</td>";
      o+="<td style='color:#F59E0B'>"+fmt(a.pesos||0)+"</td>";
      o+="<td style='color:#64748B;font-size:11px'>"+esc(a.cuenta||"")+"</td></tr>";
    });
    o+="</tbody></table>";
  } else {
    o+="<p style='color:#64748B;font-size:12px'>Sin compras registradas aun</p>";
  }
  o+="</div>";

  // Panel de Inversiones
  var invTodos=oA(DATA.inv||{}).sort(function(a,b){return(a.fecha||"").localeCompare(b.fecha||"");});
  o+="<div class='card' style='margin-bottom:14px;border-left:3px solid #F59E0B'>";
  o+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>";
  o+="<div><h3 style='font-size:14px;font-weight:700;color:#F59E0B'>Inversiones</h3>";
  o+="<p style='color:#64748B;font-size:11px;margin-top:2px'>Activos dolarizados al TC de compra</p></div>";
  o+="<button class='btn bsm' style='background:#F59E0B;color:#000' onclick='openNuevaInversion()'>+ Nueva</button></div>";
  if(invTodos.length){
    var totalInvUSD=invTodos.filter(function(i){return !i.vendido;}).reduce(function(s,i){return s+Number(i.usd||0);},0);
    o+="<p style='color:#F59E0B;font-size:12px;font-weight:700;margin-bottom:8px'>Stock activo: U$S "+totalInvUSD.toLocaleString()+"</p>";
    o+="<table class='tbl'><thead><tr><th>Activo</th><th>Fecha</th><th>Pesos</th><th>U$S compra</th><th>Estado</th><th></th></tr></thead><tbody>";
    invTodos.forEach(function(inv){
      var usdCompra=Number(inv.usd||0);
      var vendido=!!inv.vendido;
      var ganStr="";
      if(vendido&&inv.usd_venta){
        var diff=Number(inv.usd_venta)-usdCompra;
        ganStr=diff>=0?"<span style='color:#10B981'>+U$S "+diff.toFixed(0)+"</span>":"<span style='color:#EF4444'>U$S "+diff.toFixed(0)+"</span>";
      }
      var btnVender="";
      if(!vendido){
        btnVender="<button class='btn bsm' style='background:#EF444422;color:#EF4444;font-size:10px' data-invkey='"+inv._key+"' onclick='openVenderInversion(this.dataset.invkey)'>Vender</button>";
      }
      o+="<tr>";
      o+="<td style='font-weight:600'>"+esc(inv.desc||"")+"</td>";
      o+="<td style='color:#64748B;font-size:11px'>"+fecDisp(inv.fecha||"")+"</td>";
      o+="<td style='color:#F59E0B'>"+fmt(inv.pesos||0)+"</td>";
      o+="<td style='color:#06B6D4;font-weight:700'>U$S "+usdCompra.toLocaleString()+"</td>";
      o+="<td>"+(vendido?"<span style='color:#64748B;font-size:11px'>Vendido "+fecDisp(inv.fecha_venta||"")+"<br>"+ganStr+"</span>":"<span style='color:#10B981;font-size:11px'>Activo</span>")+"</td>";
      o+="<td>"+btnVender+"</td>";
      o+="</tr>";
    });
    o+="</tbody></table>";
  } else {
    o+="<p style='color:#64748B;font-size:12px'>Sin inversiones registradas aun</p>";
  }
  o+="</div>";

  o+=socioTable("Loli",movLoli,totLoli,"#EC4899");
  o+=socioTable("Hugo",movHugo,totHugo,"#3B82F6");
  G("main").innerHTML=o;
}

function openNuevaInversion(){
  var o="<p style='color:#64748B;font-size:12px;margin-bottom:12px'>Registra el activo con su valor en pesos y TC del dia. La caja no se afecta — el egreso ya debe estar registrado por separado.</p>";
  o+="<div class='g2'>";
  o+=fld("inv-desc","Descripcion (ej: Moto Honda)","","text");
  o+=fld("inv-f","Fecha de compra",hoy(),"date");
  o+=fld("inv-pesos","Valor total en pesos $","","number");
  o+=fld("inv-tc","TC al momento de compra","","number");
  o+="</div>";
  o+="<div id='inv-preview' style='background:#0F172A;border-radius:8px;padding:8px;font-size:12px;color:#94A3B8;margin:8px 0'>Ingresa pesos y TC para ver el valor en USD</div>";
  o+="<div style='display:flex;justify-content:flex-end;gap:7px;margin-top:12px'><button class='btn bg bsm' onclick='closeModal()'>Cancelar</button><button class='btn bok bsm' onclick='saveNuevaInversion()'>Guardar</button></div>";
  openModal("Nueva Inversion",o);
  setTimeout(function(){
    ["inv-pesos","inv-tc"].forEach(function(id){
      var el=G(id);if(el)el.oninput=function(){
        var p=Number((G("inv-pesos")||{value:0}).value||0);
        var tc=Number((G("inv-tc")||{value:0}).value||0);
        var t=G("inv-preview");
        if(t&&p>0&&tc>0) t.innerHTML="Valor dolarizado: <b style='color:#F59E0B'>U$S "+Math.round(p/tc).toLocaleString()+"</b> ("+fmt(p)+" / $"+tc.toLocaleString()+")";
      };
    });
  },100);
}

function saveNuevaInversion(){
  var desc=G("inv-desc").value.trim();
  var f=G("inv-f").value;
  var pesos=Number(G("inv-pesos").value||0);
  var tc=Number(G("inv-tc").value||0);
  if(!desc){alert("Ingresa una descripcion");return;}
  if(!f){alert("Ingresa la fecha");return;}
  if(!pesos||!tc){alert("Ingresa el valor en pesos y el TC");return;}
  var usd=Math.round(pesos/tc);
  DB.ref("inv").push({desc:desc,fecha:f,pesos:pesos,tc:tc,usd:usd,vendido:false});
  closeModal();
  setTimeout(rCtaCte,400);
}

function openVenderInversion(key){
  var inv=(DATA.inv||{})[key];if(!inv)return;
  var o="<p style='color:#94A3B8;font-size:12px;margin-bottom:12px'>Activo: <b>"+esc(inv.desc)+"</b> — Compra: <b style='color:#06B6D4'>U$S "+Number(inv.usd).toLocaleString()+"</b></p>";
  o+="<div class='g2'>";
  o+=fld("vnd-f","Fecha de venta",hoy(),"date");
  o+=fld("vnd-pesos","Precio de venta en pesos $","","number");
  o+=fld("vnd-tc","TC al momento de venta","","number");
  o+="</div>";
  o+="<div id='vnd-preview' style='background:#0F172A;border-radius:8px;padding:8px;font-size:12px;color:#94A3B8;margin:8px 0'>Ingresa pesos y TC para ver resultado</div>";
  o+="<div style='display:flex;justify-content:flex-end;gap:7px;margin-top:12px'><button class='btn bg bsm' onclick='closeModal()'>Cancelar</button><button class='btn bok bsm' data-invkey='"+key+"' onclick='saveVentaInversion(this.dataset.invkey)'>Registrar venta</button></div>";
  openModal("Registrar venta — "+esc(inv.desc),o);
  setTimeout(function(){
    ["vnd-pesos","vnd-tc"].forEach(function(id){
      var el=G(id);if(el)el.oninput=function(){
        var p=Number((G("vnd-pesos")||{value:0}).value||0);
        var tc=Number((G("vnd-tc")||{value:0}).value||0);
        var t=G("vnd-preview");
        if(t&&p>0&&tc>0){
          var usdVenta=Math.round(p/tc);
          var diff=usdVenta-Number(inv.usd);
          var color=diff>=0?"#10B981":"#EF4444";
          var signo=diff>=0?"+":"";
          t.innerHTML="Valor venta: <b style='color:#06B6D4'>U$S "+usdVenta.toLocaleString()+"</b> — Resultado: <b style='color:"+color+"'>"+signo+"U$S "+diff.toLocaleString()+"</b>";
        }
      };
    });
  },100);
}

function saveVentaInversion(key){
  var f=G("vnd-f").value;
  var pesos=Number(G("vnd-pesos").value||0);
  var tc=Number(G("vnd-tc").value||0);
  if(!f){alert("Ingresa la fecha");return;}
  if(!pesos||!tc){alert("Ingresa el precio de venta y el TC");return;}
  var usdVenta=Math.round(pesos/tc);
  DB.ref("inv/"+key).update({vendido:true,fecha_venta:f,pesos_venta:pesos,tc_venta:tc,usd_venta:usdVenta});
  closeModal();
  setTimeout(rCtaCte,400);
}

function openStockUSD(){
  var actual=Number((DATA.cfg_aho||{}).stock_usd||0);
  var o="<p style='color:#64748B;font-size:12px;margin-bottom:12px'>Ingresa el stock real de dolares que tienen hoy. Esto no afecta la caja, es solo para llevar el control del ahorro.</p>";
  o+="<div class='g2'>";
  o+=fld("su-usd","Stock actual U$S",actual||"","number");
  o+=fld("su-f","Fecha",hoy(),"date");
  o+="</div>";
  o+="<div style='display:flex;justify-content:flex-end;gap:7px;margin-top:12px'><button class='btn bg bsm' onclick='closeModal()'>Cancelar</button><button class='btn bok bsm' onclick='saveStockUSD()'>Guardar</button></div>";
  openModal("Actualizar stock de dolares",o);
}

function saveStockUSD(){
  var usd=Number(G("su-usd").value||0);
  var f=G("su-f").value;
  if(!f){alert("Ingresa la fecha");return;}
  DB.ref("cfg_aho").update({stock_usd:usd,stock_fecha:f});
  closeModal();
  setTimeout(rCtaCte,400);
}

render();
</script>
</body>
</html>
