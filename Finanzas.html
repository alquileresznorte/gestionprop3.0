<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Finanzas L&H</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F172A;color:#F1F5F9;font-family:"Segoe UI",system-ui,sans-serif;font-size:14px;min-height:100vh}
input,select,button{font-family:inherit;font-size:14px}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lbox{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:32px;width:280px;text-align:center}
.lbox .ico{font-size:42px;margin-bottom:8px}
.lbox h2{font-size:20px;font-weight:800;margin-bottom:2px}
.lbox p{font-size:12px;color:#64748B;margin-bottom:20px}
.lbox input{width:100%;padding:12px;font-size:22px;letter-spacing:8px;text-align:center;border-radius:10px;border:1px solid #334155;background:#0F172A;color:#fff;margin-bottom:10px}
.lbox button{width:100%;padding:10px;border-radius:10px;border:none;background:#3B82F6;color:#fff;font-weight:700;cursor:pointer}
.lerr{color:#F87171;font-size:12px;margin-top:6px;display:none}
#app{display:none}
.bar{background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;position:sticky;top:0;z-index:10}
.bar-l{display:flex;align-items:center;gap:8px}
.bar h1{font-size:15px;font-weight:800}
.dot{width:7px;height:7px;border-radius:50%;background:#10B981}
.dot.spin{background:#F59E0B;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mnav{display:flex;align-items:center;gap:2px}
.mnav button{background:none;border:none;color:#94A3B8;font-size:20px;cursor:pointer;padding:2px 8px;border-radius:6px}
.mnav button:hover{background:#334155}
.mnav span{font-size:13px;font-weight:600;color:#F1F5F9;min-width:80px;text-align:center}
.out{background:none;border:none;color:#64748B;font-size:11px;cursor:pointer;padding:4px 8px;border-radius:6px}
.out:hover{background:#334155}
.tabs{display:flex;background:#1E293B;border-bottom:1px solid #334155;overflow-x:auto;padding:0 10px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 14px;font-size:12px;font-weight:600;color:#64748B;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.tab.on{color:#3B82F6;border-bottom-color:#3B82F6}
.badge{background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:4px}
.pg{padding:14px;max-width:700px;margin:0 auto}
.card{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:8px}
.card.ok{border-color:#10B98150}
.card.alert{border-color:#F59E0B50}
.card.dim{opacity:.5}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:3px}
.tit{font-size:13px;font-weight:700}
.sub{font-size:11px;color:#64748B;display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.tag{font-size:11px;padding:1px 7px;border-radius:20px;background:#334155;color:#94A3B8}
.tl{background:#E879A020;color:#E879A0}
.th{background:#60A5FA20;color:#60A5FA}
.ts{background:#34D39920;color:#34D399}
.tu{background:#22D3EE20;color:#22D3EE}
.tw{background:#F59E0B20;color:#F59E0B}
.tg{background:#10B98120;color:#10B981}
.pos{color:#34D399;font-weight:700}
.neg{color:#F87171;font-weight:700}
.neu{color:#F59E0B;font-weight:700}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.pill{padding:3px 9px;font-size:11px;border-radius:20px;border:1px solid #334155;background:none;color:#64748B;cursor:pointer}
.pill:hover{background:#334155;color:#F1F5F9}
.pill.on{border-color:#3B82F6;background:#3B82F620;color:#60A5FA}
.wpill{padding:3px 9px;font-size:11px;border-radius:20px;border:1px solid #334155;background:none;color:#64748B;cursor:pointer}
.wpill.wl{border-color:#E879A0;background:#E879A020;color:#E879A0}
.wpill.wh{border-color:#60A5FA;background:#60A5FA20;color:#60A5FA}
.wpill.ws{border-color:#34D399;background:#34D39920;color:#34D399}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:14px}
.metric{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:12px}
.metric .lbl{font-size:11px;color:#64748B;margin-bottom:3px}
.metric .val{font-size:18px;font-weight:800}
.tbl{background:#1E293B;border:1px solid #334155;border-radius:10px;overflow:hidden;margin-bottom:12px}
.trow{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid #334155;font-size:13px}
.trow:last-child{border-bottom:none}
.trow.tot{font-weight:700;background:#0A1628}
.tlbl{color:#94A3B8}
.btn{padding:7px 14px;border-radius:8px;border:none;background:#3B82F6;color:#fff;font-weight:700;cursor:pointer;font-size:12px}
.btn:hover{background:#2563EB}
.btn-del{padding:3px 9px;border-radius:6px;border:none;background:#EF444420;color:#F87171;cursor:pointer;font-size:11px}
.btn-sm{padding:3px 9px;border-radius:6px;border:1px solid #334155;background:none;color:#64748B;cursor:pointer;font-size:11px}
.btn-sm:hover{background:#334155;color:#F1F5F9}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid #334155;background:none;cursor:pointer;font-size:12px;color:#fff;flex-shrink:0}
.chk.on{background:#10B981;border-color:#10B981}
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748B;margin:14px 0 8px}
.empty{text-align:center;padding:30px;color:#64748B;font-size:13px}
.divider{height:1px;background:#334155;margin:14px 0}
.big{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:24px;text-align:center;margin-bottom:14px}
.big .num{font-size:40px;font-weight:900}
.big .lbl{font-size:12px;color:#64748B;margin-top:6px}
.info{background:#3B82F610;border:1px solid #3B82F630;border-radius:8px;padding:10px 12px;font-size:12px;color:#93C5FD;margin-bottom:10px}
.warn-box{background:#F59E0B10;border:1px solid #F59E0B30;border-radius:8px;padding:10px 12px;font-size:12px;color:#FCD34D;margin-bottom:10px}
.pct-inp{width:54px;padding:3px 6px;font-size:11px;border-radius:6px;border:1px solid #334155;background:#0F172A;color:#F1F5F9}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:22px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px}
.fg{margin-bottom:11px}
.fl{font-size:10px;font-weight:700;color:#94A3B8;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=number],input[type=password],select{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #334155;background:#0F172A;color:#F1F5F9}
.fr{display:flex;gap:8px}
.who-row{display:flex;gap:6px}
.who-btn{flex:1;padding:7px 4px;font-size:12px;font-weight:600;border-radius:8px;border:1.5px solid #334155;cursor:pointer;background:none;color:#64748B}
.who-btn.wl{border-color:#E879A0;background:#E879A020;color:#E879A0}
.who-btn.wh{border-color:#60A5FA;background:#60A5FA20;color:#60A5FA}
.who-btn.ws{border-color:#34D399;background:#34D39920;color:#34D399}
.mact{display:flex;gap:8px;margin-top:14px}
.mok{flex:2;padding:10px;border-radius:8px;border:none;background:#3B82F6;color:#fff;cursor:pointer;font-weight:700}
.mok:hover{background:#2563EB}
.mcan{flex:1;padding:10px;border-radius:8px;border:1px solid #334155;background:none;color:#94A3B8;cursor:pointer}
.banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1E293B;border:1px solid #334155;margin-bottom:10px;font-size:12px;color:#64748B}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bdot.ok{background:#10B981}
.bdot.ld{background:#F59E0B;animation:blink 1s infinite}
/* TJ card */
.tj-card{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:12px}
.tj-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="ico">💰</div>
    <h2>Finanzas</h2>
    <p>Loli &amp; Hugo</p>
    <input type="password" id="pin" maxlength="6" placeholder="••••" autocomplete="off"/>
    <button onclick="doLogin()">Entrar</button>
    <div class="lerr" id="lerr">Clave incorrecta</div>
  </div>
</div>

<div id="app">
  <div class="bar">
    <div class="bar-l">
      <span>💰</span>
      <h1>Finanzas L&amp;H</h1>
      <span class="dot" id="dot"></span>
    </div>
    <div class="bar-l">
      <div class="mnav">
        <button onclick="shiftM(-1)">‹</button>
        <span id="mlbl"></span>
        <button onclick="shiftM(1)">›</button>
      </div>
      <button class="out" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goTab(this,'pendientes')">📥 Pendientes<span class="badge" id="badge-pend" style="display:none">0</span></button>
    <button class="tab" onclick="goTab(this,'gastos')">💸 Gastos</button>
    <button class="tab" onclick="goTab(this,'fijos')">📅 Fijos</button>
    <button class="tab" onclick="goTab(this,'tarjetas')">💳 Tarjetas/MP</button>
    <button class="tab" onclick="goTab(this,'resumen')">📊 Resumen</button>
    <button class="tab" onclick="goTab(this,'capital')">🏦 Capital</button>
  </div>
  <div class="pg">
    <div id="p-pendientes"></div>
    <div id="p-gastos"    style="display:none"></div>
    <div id="p-fijos"     style="display:none"></div>
    <div id="p-tarjetas"  style="display:none"></div>
    <div id="p-resumen"   style="display:none"></div>
    <div id="p-capital"   style="display:none"></div>
  </div>
</div>

<!-- MODAL GASTO -->
<div class="ov" id="m-g" style="display:none" onclick="if(event.target===this)cM('m-g')">
<div class="modal">
  <h3 id="mg-h">Nuevo gasto</h3>
  <div class="fg"><label class="fl">Descripcion *</label><input type="text" id="mg-desc" placeholder="Supermercado, Farmacia..."/></div>
  <div class="fg"><label class="fl">Categoria</label><select id="mg-cat"></select></div>
  <div class="fg"><label class="fl">Monto *</label>
    <div class="fr"><input type="number" id="mg-monto" placeholder="0" style="width:120px"/><select id="mg-cur" style="width:80px"><option value="ARS">$ ARS</option><option value="USD">U$S</option></select></div>
  </div>
  <div class="fg"><label class="fl">Medio de pago</label><select id="mg-med"></select></div>
  <div class="fg"><label class="fl">Es de</label>
    <div class="who-row">
      <button class="who-btn" onclick="pw('g',this,'loli')">💜 Loli</button>
      <button class="who-btn" onclick="pw('g',this,'hugo')">💙 Hugo</button>
      <button class="who-btn" onclick="pw('g',this,'shared')">🤝 Familia</button>
    </div>
  </div>
  <div class="fg" id="mg-pr" style="display:none">
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#64748B">
      % Loli:<input class="pct-inp" type="number" id="mg-pct" value="50" min="1" max="99" oninput="document.getElementById('mg-ph').textContent=100-this.value"/>
      % Hugo:<span id="mg-ph">50</span>
    </div>
  </div>
  <div class="fg"><label class="fl">Obs</label><input type="text" id="mg-obs" placeholder="Opcional"/></div>
  <div class="mact"><button class="mcan" onclick="cM('m-g')">Cancelar</button><button class="mok" onclick="saveG()">Guardar</button></div>
</div></div>

<!-- MODAL FIJO -->
<div class="ov" id="m-f" style="display:none" onclick="if(event.target===this)cM('m-f')">
<div class="modal">
  <h3 id="mf-h">Gasto fijo</h3>
  <div class="fg"><label class="fl">Nombre *</label><input type="text" id="mf-nom" placeholder="Swiss Medical, Colegio..."/></div>
  <div class="fg"><label class="fl">Categoria</label><select id="mf-cat"></select></div>
  <div class="fg"><label class="fl">Monto estimado (opcional)</label>
    <div class="fr"><input type="number" id="mf-monto" placeholder="0" style="width:120px"/><select id="mf-cur" style="width:80px"><option value="ARS">$ ARS</option><option value="USD">U$S</option></select></div>
  </div>
  <div class="fg"><label class="fl">Medio de pago</label><select id="mf-med"></select></div>
  <div class="fg"><label class="fl">Es de</label>
    <div class="who-row">
      <button class="who-btn" onclick="pw('f',this,'loli')">💜 Loli</button>
      <button class="who-btn" onclick="pw('f',this,'hugo')">💙 Hugo</button>
      <button class="who-btn" onclick="pw('f',this,'shared')">🤝 Familia</button>
    </div>
  </div>
  <div class="fg" id="mf-pr" style="display:none">
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#64748B">
      % Loli:<input class="pct-inp" type="number" id="mf-pct" value="50" min="1" max="99" oninput="document.getElementById('mf-ph').textContent=100-this.value"/>
      % Hugo:<span id="mf-ph">50</span>
    </div>
  </div>
  <div class="fg"><label class="fl">Dia de vencimiento</label><input type="number" id="mf-dia" placeholder="10" min="1" max="31" style="width:80px"/></div>
  <div class="mact"><button class="mcan" onclick="cM('m-f')">Cancelar</button><button class="mok" onclick="saveF()">Guardar</button></div>
</div></div>

<!-- MODAL CAPITAL -->
<div class="ov" id="m-cap" style="display:none" onclick="if(event.target===this)cM('m-cap')">
<div class="modal">
  <h3>Agregar activo</h3>
  <div class="fg"><label class="fl">Descripcion *</label><input type="text" id="ca-desc" placeholder="Dolares, Moto..."/></div>
  <div class="fg"><label class="fl">Tipo</label>
    <select id="ca-tipo"><option value="usd">💵 Dolares</option><option value="inv">🏗 Inversion/Bien</option><option value="otro">📦 Otro</option></select>
  </div>
  <div class="fg"><label class="fl">Valor U$S</label><input type="number" id="ca-usd" placeholder="0"/></div>
  <div class="fg"><label class="fl">Valor $ (opcional)</label><input type="number" id="ca-ars" placeholder="0"/></div>
  <div class="fg"><label class="fl">Fecha</label><input type="text" id="ca-fec"/></div>
  <div class="fg"><label class="fl">Obs</label><input type="text" id="ca-obs" placeholder="Opcional"/></div>
  <div class="mact"><button class="mcan" onclick="cM('m-cap')">Cancelar</button><button class="mok" onclick="saveCap()">Guardar</button></div>
</div></div>

<script>
var PWD='3194';
var MNS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
var MNL=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var MEDIOS=['Efectivo','MP Loli','MP Hugo','Visa BBVA Loli','Master BBVA Loli','Visa BBVA Hugo','Master BBVA Hugo','Transf. Loli','Transf. Hugo'];
var TJS=['Visa BBVA Loli','Master BBVA Loli','Visa BBVA Hugo','Master BBVA Hugo'];
var MPS=['MP Loli','MP Hugo'];
// Medios que son cuentas personales (no empresa)
var CTAS_PERS=['MP Loli','MP Hugo','Visa BBVA Loli','Master BBVA Loli','Visa BBVA Hugo','Master BBVA Hugo'];
// Para la pantalla de tarjetas/MP
var MEDIOS_TJ_MP=['Visa BBVA Loli','Master BBVA Loli','Visa BBVA Hugo','Master BBVA Hugo','MP Loli','MP Hugo'];

var CATS=[
  {id:'salud',e:'🏥',n:'Salud'},
  {id:'edu',e:'📚',n:'Educacion'},
  {id:'hogar',e:'🏠',n:'Hogar/Expensas'},
  {id:'serv',e:'🔧',n:'Servicios'},
  {id:'super',e:'🛒',n:'Supermercado'},
  {id:'pers',e:'💸',n:'Gasto personal'},
  {id:'ropa',e:'👗',n:'Ropa'},
  {id:'viaje',e:'✈️',n:'Viaje'},
  {id:'auto',e:'🚗',n:'Auto/Transporte'},
  {id:'ent',e:'🎬',n:'Entretenimiento'},
  {id:'usd',e:'💵',n:'Compra dolares'},
  {id:'devol',e:'🔄',n:'Devolucion'},
  {id:'pagoTJ',e:'💳',n:'Pago TJ/MP'},
  {id:'otro',e:'📦',n:'Otro'}
];

var cM=new Date().getMonth(),cY=new Date().getFullYear();
var gpSt='loading',gpMovs=[];
var FD={fijos:{},pagados:{},gastos:{},capital:{},ovs:{},aho:{},inv:{},cfg_aho:{}};
var DB,_who={g:'shared',f:'shared'};

firebase.initializeApp({
  apiKey:'AIzaSyDhuSP_WTWI3hqf5GqgFExkptFfpqJUn50',
  authDomain:'gestion-prop.firebaseapp.com',
  databaseURL:'https://gestion-prop-default-rtdb.firebaseio.com',
  projectId:'gestion-prop'
});
DB=firebase.database();

function spin(on){var d=document.getElementById('dot');if(d)d.className='dot'+(on?' spin':'');}
function fbSet(p,v){spin(true);DB.ref(p).set(v,function(){spin(false);});}
function fbRm(p){spin(true);DB.ref(p).remove(function(){spin(false);});}
function fbPush(p,v){spin(true);return DB.ref(p).push(v,function(){spin(false);}).key;}

function loadAll(){
  var done={},keys=['movs','aho','inv','cfg_aho','fin_fijos','fin_pagados','fin_gastos','fin_capital','fin_ovs'];
  keys.forEach(function(k){done[k]=false;});
  function chk(){if(Object.values(done).every(Boolean)){gpSt='ok';render();updateBadge();}}
  function mk(k,fn){DB.ref(k).on('value',function(s){fn(s);done[k]=true;chk();},function(){done[k]=true;chk();});}
  mk('movs',function(s){gpMovs=s.exists()?Object.values(s.val()):[];});
  mk('aho',function(s){FD.aho=s.exists()?s.val():{};});
  mk('inv',function(s){FD.inv=s.exists()?s.val():{};});
  mk('cfg_aho',function(s){FD.cfg_aho=s.exists()?s.val():{};});
  mk('fin_fijos',function(s){FD.fijos=s.exists()?s.val():{};});
  mk('fin_pagados',function(s){FD.pagados=s.exists()?s.val():{};});
  mk('fin_gastos',function(s){FD.gastos=s.exists()?s.val():{};});
  mk('fin_capital',function(s){FD.capital=s.exists()?s.val():{};});
  mk('fin_ovs',function(s){FD.ovs=s.exists()?s.val():{};});
}

document.getElementById('pin').onkeydown=function(e){if(e.key==='Enter')doLogin();};
function doLogin(){
  if(document.getElementById('pin').value===PWD){
    try{sessionStorage.setItem('fa','1');}catch(e){}
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    updateMlbl();loadAll();
  } else {
    var el=document.getElementById('lerr');el.style.display='block';
    document.getElementById('pin').value='';
    setTimeout(function(){el.style.display='none';},2000);
  }
}
function doLogout(){
  try{sessionStorage.removeItem('fa');}catch(e){}
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pin').value='';
}
try{if(sessionStorage.getItem('fa')==='1'){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  updateMlbl();loadAll();
}}catch(e){}

// HELPERS
function KEY(){return cY+'-'+String(cM).padStart(2,'0');}
function p$(n){return '$'+Math.round(n).toLocaleString('es-AR');}
function pU(n){return 'U$S '+Math.round(n).toLocaleString('es-AR');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getCat(id){return CATS.find(function(c){return c.id===id;})||{e:'📦',n:'Otro'};}
function getFijos(){return FD.fijos?Object.values(FD.fijos):[];}
function getGastos(){return FD.gastos&&FD.gastos[KEY()]?Object.values(FD.gastos[KEY()]):[]; }
function getPag(){return(FD.pagados&&FD.pagados[KEY()])||{};}
function getCapital(){return FD.capital?Object.values(FD.capital):[];}
function isPag(id){return !!(getPag()[id]);}
function daysTo(d){if(!d)return 999;return Math.round((new Date(cY,cM,+d)-new Date())/86400000);}
function isTJ(m){return TJS.indexOf(m)>=0;}
function isMP(m){return MPS.indexOf(m)>=0;}
function isCtaPers(m){return CTAS_PERS.indexOf(m)>=0;}

// GP movement logic
// - tipo=retiro → siempre ingreso
// - cuenta_caja=cuenta personal (MP/TJ) → ingreso (plata que entro a cuenta personal)
// - tipo=aporte + cuenta empresa → egreso (pusiste plata en la empresa)
function gpIsIncome(mv){
  return mv.tipo==='retiro'||isCtaPers(mv.cuenta_caja||'');
}
function gpLabel(mv){
  if(isCtaPers(mv.cuenta_caja||''))return mv.nota||'Cobro en '+(mv.cuenta_caja||'MP');
  return(mv.tipo==='retiro'?'Retiro':'Aporte')+' — '+(mv.nota||'');
}
function mvId(mv){
  var s=(mv.fecha||'')+'|'+(mv.nota||'')+'|'+(mv.monto||'')+'|'+(mv.tipo||'');
  var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return 'gp'+(h>>>0).toString(36);
}
function getOv(mid){return(FD.ovs&&FD.ovs[KEY()]&&FD.ovs[KEY()][mid])||{cat:'',who:'',pct:50,obs:'',done:false};}
function saveOv(mid,ov){fbSet('fin_ovs/'+KEY()+'/'+mid,ov);}

function split(who,pct,amt){
  if(who==='loli')return{l:amt,h:0};
  if(who==='hugo')return{l:0,h:amt};
  var p=(+pct||50)/100;return{l:amt*p,h:amt*(1-p)};
}
function wBadge(who,pct){
  if(who==='loli')return'<span class="tag tl">💜 Loli</span>';
  if(who==='hugo')return'<span class="tag th">💙 Hugo</span>';
  return'<span class="tag ts">🤝 '+(pct||50)+'/'+(100-(pct||50))+'</span>';
}

// Get GP movs for month
function getMovs(){
  var k=KEY();
  return gpMovs.filter(function(mv){
    if(!mv.fecha||!mv.fecha.startsWith(k))return false;
    return mv.cuenta==='Cuenta Loli'||mv.cuenta==='Cuenta Hugo';
  }).sort(function(a,b){return(a.fecha||'').localeCompare(b.fecha||'');});
}

// Pending = movs not yet categorized (done=false)
function getPending(){
  return getMovs().filter(function(mv){
    var ov=getOv(mvId(mv));
    return !ov.done&&!ov.deleted;
  });
}

function updateBadge(){
  var pend=getPending().length;
  var b=document.getElementById('badge-pend');
  if(!b)return;
  b.style.display=pend>0?'':'none';
  b.textContent=pend;
}

// NAV
function updateMlbl(){document.getElementById('mlbl').textContent=MNS[cM]+' '+cY;}
function shiftM(d){
  cM+=d;
  if(cM>11){cM=0;cY++;}
  if(cM<0){cM=11;cY--;}
  updateMlbl();render();updateBadge();
}
function goTab(el,name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  ['pendientes','gastos','fijos','tarjetas','resumen','capital'].forEach(function(t){
    document.getElementById('p-'+t).style.display=t===name?'':'none';
  });
  render();
}
function curTab(){
  var a=document.querySelector('.tab.on');if(!a)return'pendientes';
  var t=a.textContent;
  if(t.includes('Pend'))return'pendientes';
  if(t.includes('Gasto'))return'gastos';
  if(t.includes('Fijo'))return'fijos';
  if(t.includes('Tarj'))return'tarjetas';
  if(t.includes('Resum'))return'resumen';
  if(t.includes('Capital'))return'capital';
  return'pendientes';
}
function render(){
  var t=curTab();
  if(t==='pendientes')rPend();
  else if(t==='gastos')rGastos();
  else if(t==='fijos')rFijos();
  else if(t==='tarjetas')rTarjetas();
  else if(t==='resumen')rResumen();
  else if(t==='capital')rCapital();
}

// ── PENDIENTES (bandeja de entrada de movimientos GP) ─────────────────────────
function rPend(){
  var el=document.getElementById('p-pendientes');
  var movs=getMovs();
  var ok=gpSt==='ok';

  var html='<div class="banner"><div class="bdot '+(ok?'ok':'ld')+'"></div>';
  html+='<span>'+(ok?'GestionProp — '+movs.length+' movimientos en '+MNL[cM]:'Conectando...')+'</span></div>';

  var pend=movs.filter(function(mv){var ov=getOv(mvId(mv));return !ov.done&&!ov.deleted;});
  var done=movs.filter(function(mv){var ov=getOv(mvId(mv));return ov.done&&!ov.deleted;});
  var deleted=movs.filter(function(mv){return getOv(mvId(mv)).deleted;});

  if(!pend.length&&!done.length){
    el.innerHTML=html+'<div class="empty">Sin movimientos de socios en '+MNL[cM]+'.</div>';
    return;
  }

  if(pend.length){
    html+='<div class="warn-box">📥 '+pend.length+' movimiento'+(pend.length>1?'s':'')+' sin clasificar. Categorizalos y asignalos para que aparezcan en el Resumen.</div>';
    html+='<div class="sec">Sin clasificar ('+pend.length+')</div>';
    pend.forEach(function(mv){html+=renderMov(mv,false);});
  }

  if(done.length){
    html+='<div class="sec">Clasificados ('+done.length+') — ya aparecen en Resumen</div>';
    done.forEach(function(mv){html+=renderMov(mv,true);});
  }

  if(deleted.length){
    html+='<div class="sec">Descartados ('+deleted.length+')</div>';
    deleted.forEach(function(mv){
      var mid=mvId(mv);
      html+='<div class="card dim" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
      html+='<div class="col"><div class="tit" style="font-size:12px">'+esc(gpLabel(mv))+'</div>';
      html+='<div class="sub"><span class="tag">'+esc(mv.fecha||'')+'</span></div></div>';
      html+='<button class="btn-sm" onclick="restoreMov(\"'+mid+'\")">Restaurar</button>';
      html+='</div>';
    });
  }

  el.innerHTML=html;
}

function restoreMov(mid){
  var ov=getOv(mid);ov.deleted=false;ov.done=false;ov.cat='';ov.who='';
  saveOv(mid,ov);updateBadge();rPend();
}

function renderMov(mv,isDone){
  var mid=mvId(mv);
  var ov=getOv(mid);
  var isInc=gpIsIncome(mv);
  var lbl=gpLabel(mv);
  var cat=ov.cat?getCat(ov.cat):null;
  var who=ov.who||(mv.cuenta==='Cuenta Loli'?'loli':'hugo');
  var quien=mv.cuenta==='Cuenta Loli'?'loli':'hugo';

  var h='<div class="card'+(isDone?' ok dim':'')+'" style="margin-bottom:10px">';
  h+='<div class="row" style="margin-bottom:8px">';
  h+='<div class="col" style="flex:1">';
  h+='<div class="tit">'+esc(lbl)+'</div>';
  h+='<div class="sub">';
  h+='<span class="tag">'+esc(mv.fecha||'')+'</span>';
  if(mv.cuenta_caja)h+='<span class="tag">'+esc(mv.cuenta_caja)+'</span>';
  if(cat)h+='<span class="tag tu">'+cat.e+' '+cat.n+'</span>';
  if(isDone)h+=wBadge(ov.who||quien,ov.pct);
  h+='</div></div>';
  h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">';
  h+='<span class="'+(isInc?'pos':'neu')+'">'+(isInc?'+':'-')+p$(+mv.monto)+'</span>';
  if(isDone){
    h+='<button class="btn-sm" onclick="undoMov(\''+mid+'\')">Reclasificar</button>';
  }
  h+='</div></div>';

  if(!isDone){
    // Categoria
    h+='<div style="font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;margin-bottom:5px">¿A que corresponde?</div>';
    h+='<div class="pills">';
    CATS.forEach(function(c){
      h+='<button class="pill'+(ov.cat===c.id?' on':'')+'" data-mid="'+mid+'" data-cat="'+c.id+'" onclick="setCat(this)">'+c.e+' '+c.n+'</button>';
    });
    h+='</div>';

    // Para quien
    h+='<div style="font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;margin:6px 0 5px">¿De quien es?</div>';
    h+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px">';
    h+='<button class="wpill'+(who==='loli'?' wl':'')+'" data-mid="'+mid+'" data-who="loli" onclick="setWho(this)">💜 Loli</button>';
    h+='<button class="wpill'+(who==='hugo'?' wh':'')+'" data-mid="'+mid+'" data-who="hugo" onclick="setWho(this)">💙 Hugo</button>';
    h+='<button class="wpill'+(who==='shared'?' ws':'')+'" data-mid="'+mid+'" data-who="shared" onclick="setWho(this)">🤝 Familia</button>';
    if(who==='shared'){
      h+='<span style="font-size:11px;color:#64748B">% Loli:</span>';
      h+='<input class="pct-inp" type="number" min="1" max="99" value="'+(ov.pct||50)+'" data-mid="'+mid+'" onchange="setPct(this)"/>';
    }
    h+='</div>';

    // Obs
    h+='<input type="text" placeholder="Observacion..." value="'+esc(ov.obs||'')+'" data-mid="'+mid+'" onchange="setObs(this)" style="width:100%;padding:5px 8px;font-size:12px;border-radius:6px;border:1px solid #334155;background:#0F172A;color:#F1F5F9;margin-bottom:8px"/>';

    // Confirm button
    if(ov.cat){
      h+='<button class="btn" style="width:100%" onclick="confirmMov(\''+mid+'\',\''+quien+'\')">✓ Clasificar y mover al Resumen</button>';
    }
  }

  h+='</div>';
  return h;
}

function setCat(btn){
  var mid=btn.dataset.mid,catId=btn.dataset.cat;
  var ov=getOv(mid);
  ov.cat=ov.cat===catId?'':catId;
  saveOv(mid,ov);rPend();
}
function setWho(btn){
  var mid=btn.dataset.mid,who=btn.dataset.who;
  var ov=getOv(mid);ov.who=who;saveOv(mid,ov);rPend();
}
function setPct(inp){
  var ov=getOv(inp.dataset.mid);ov.pct=+inp.value||50;saveOv(inp.dataset.mid,ov);
}
function setObs(inp){
  var ov=getOv(inp.dataset.mid);ov.obs=inp.value;saveOv(inp.dataset.mid,ov);
}
function confirmMov(mid,quien){
  var ov=getOv(mid);
  if(!ov.who)ov.who=quien;
  ov.done=true;
  saveOv(mid,ov);
  updateBadge();
  rPend();
}
function undoMov(mid){
  var ov=getOv(mid);ov.done=false;saveOv(mid,ov);updateBadge();rPend();
}

// ── GASTOS ────────────────────────────────────────────────────────────────────
function rGastos(){
  var el=document.getElementById('p-gastos');
  var gs=getGastos();
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';

  html+='<button class="btn" onclick="openG()">+ Agregar</button></div>';
  if(!gs.length){html+='<div class="empty">Sin gastos en '+MNL[cM]+'.</div>';el.innerHTML=html;return;}

  var dir=gs.filter(function(g){return !isTJ(g.medio)&&!isMP(g.medio);});
  var tj=gs.filter(function(g){return isTJ(g.medio)||isMP(g.medio);});

  function rowG(g){
    var cat=getCat(g.cat);
    var r='<div class="card"><div class="row">';

    r+='<div class="sub"><span class="tag">'+cat.e+' '+cat.n+'</span>';
    if(g.medio)r+='<span class="tag'+(isTJ(g.medio)||isMP(g.medio)?' tu':'')+'">'+(isTJ(g.medio)?'💳 ':isMP(g.medio)?'📱 ':'')+esc(g.medio)+'</span>';
    if(g.obs)r+='<span class="tag">'+esc(g.obs)+'</span>';
    r+='</div></div>';
    r+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
    r+=wBadge(g.who,g.pct);
    r+='<span class="neg">-'+(g.cur==='USD'?pU(g.monto):p$(g.monto))+'</span>';
    r+='<button class="btn-del" onclick="delG(\''+g._key+'\')">✕</button>';

  if(dir.length){

function delG(key){if(!confirm('Borrar gasto?'))return;fbRm('fin_gastos/'+KEY()+'/'+key);}

// ── FIJOS ─────────────────────────────────────────────────────────────────────
function rFijos(){
  var el=document.getElementById('p-fijos');
  var fijos=getFijos();
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html+='<div class="sec" style="margin:0">Gastos fijos</div>';
  html+='<button class="btn" onclick="openF()">+ Nuevo</button></div>';
  html+='<div class="info">Los gastos fijos se repiten cada mes. Marca ✓ cuando lo pagas. La marca se resetea sola el mes siguiente.</div>';
  if(!fijos.length){html+='<div class="empty">Sin gastos fijos.</div>';el.innerHTML=html;return;}

  var pend=fijos.filter(function(f){return !isPag(f.id);}).sort(function(a,b){return(+a.dia||99)-(+b.dia||99);});
  var pag=fijos.filter(function(f){return isPag(f.id);});

  function rowF(f){
    var p=isPag(f.id);var d=daysTo(f.dia);var cat=getCat(f.cat);
    var cls='card'+(p?' dim':f.dia&&d<0?' alert':f.dia&&d<=7?' alert':'');
    var r='<div class="'+cls+'"><div class="row">';
    r+='<div style="display:flex;align-items:center;gap:10px;flex:1">';
    r+='<button class="chk'+(p?' on':'')+'" onclick="togPag(\''+f.id+'\')">'+(p?'✓':'')+'</button>';
    r+='<div class="col"><div class="tit">'+esc(f.nom)+'</div>';
    r+='<div class="sub"><span class="tag">'+cat.e+' '+cat.n+'</span>';
    if(f.dia)r+='<span class="tag">Dia '+f.dia+(p?'':d<0?' ⚠ VENC':d===0?' HOY':d<=7?' en '+d+'d':'')+'</span>';
    if(f.medio)r+='<span class="tag'+(isTJ(f.medio)||isMP(f.medio)?' tu':'')+'">'+(isTJ(f.medio)?'💳 ':isMP(f.medio)?'📱 ':'')+esc(f.medio)+'</span>';
    r+='</div></div></div>';
    r+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
    r+=wBadge(f.who,f.pct);
    if(f.monto>0)r+='<span class="neg">'+p$(f.monto)+'</span>';
    r+='<div style="display:flex;gap:4px;margin-top:4px">';
    r+='<button class="btn-sm" onclick="openF(\''+f.id+'\')">Editar</button>';
    r+='<button class="btn-del" onclick="delF(\''+f.id+'\')">✕</button></div>';
    r+='</div></div></div>';
    return r;
  }
  if(pend.length){html+='<div class="sec">Pendientes ('+pend.length+')</div>';pend.forEach(function(f){html+=rowF(f);});}
  if(pag.length){html+='<div class="sec">Pagados ('+pag.length+')</div>';pag.forEach(function(f){html+=rowF(f);});}
  el.innerHTML=html;
}
function togPag(id){
  var p=getPag();var path='fin_pagados/'+KEY()+'/'+id;
  if(p[id])fbRm(path);else fbSet(path,{f:new Date().toISOString().split('T')[0]});
}
function delF(id){if(!confirm('Borrar fijo?'))return;fbRm('fin_fijos/'+id);}

// ── TARJETAS / MP ─────────────────────────────────────────────────────────────
// Para cada medio (TJ o MP):
// A = Aportes a empresa pagados con ese medio (vienen de GP, son gastos empresa que pasaron por cuenta personal)
// B = Gastos personales cargados en Finanzas con ese medio
// C = Pago real = retiro de GP identificado como pago de ese resumen (el mov categorizado como "pago TJ/MP")
// Diferencia = C - (A+B) → debería ser pequeña (impuestos, gastos bancarios)
function rTarjetas(){
  var el=document.getElementById('p-tarjetas');
  var movs=getMovs();
  var gs=getGastos();
  var html='<div class="sec">Tarjetas y MP — '+MNL[cM]+'</div>';
  html+='<div class="info">Para cada tarjeta/MP: suma los gastos de empresa que pasaron por ahi (aportes en GP) + tus gastos personales. El pago real es el retiro que hiciste para pagar el resumen. La diferencia deberia ser minima (impuestos y cargos bancarios).</div>';

  MEDIOS_TJ_MP.forEach(function(medio){
    var icono=isTJ(medio)?'💳':'📱';
    var owner=medio.includes('Loli')?'loli':'hugo';

    // A: aportes a empresa hechos con este medio (vienen de GP)
    var aportesGP=movs.filter(function(mv){
      return mv.cuenta_caja===medio && mv.tipo==='aporte';
    });
    var totAportesGP=aportesGP.reduce(function(s,mv){return s+(+mv.monto||0);},0);

    // B: gastos personales cargados con este medio
    var gastosPerso=gs.filter(function(g){return g.medio===medio&&g.cur==='ARS';});
    var totGastosPerso=gastosPerso.reduce(function(s,g){return s+(+g.monto||0);},0);

    var totalEstimado=totAportesGP+totGastosPerso;

    // C: pago real = movimientos categorizados que tienen cat='pagoTJ' y medio = este
    // Buscamos retiros de GP donde la nota menciona el pago de esta TJ/MP
    // Lo identificamos por la categorización del usuario en ovs
    var pagoReal=0;
    movs.forEach(function(mv){
      var mid=mvId(mv);var ov=getOv(mid);
      if(ov.done&&ov.cat==='pagoTJ'&&ov.medioPago===medio){
        pagoReal+=+mv.monto||0;
      }
    });

    var diff=pagoReal-totalEstimado;
    var hasData=totAportesGP>0||totGastosPerso>0||pagoReal>0;
    if(!hasData)return; // No mostrar si no hay nada

    html+='<div class="tj-card">';
    html+='<div class="tj-title"><span>'+icono+' '+medio+'</span>';
    html+=wBadge(owner,50);
    html+='</div>';
    html+='<div class="tbl">';
    html+='<div class="trow"><span class="tlbl">Gastos empresa (aportes GP con este medio)</span><span class="neg">'+p$(totAportesGP)+'</span></div>';
    html+='<div class="trow"><span class="tlbl">Gastos personales cargados</span><span class="neg">'+p$(totGastosPerso)+'</span></div>';
    html+='<div class="trow tot"><span class="tlbl">Total estimado</span><span class="neg">'+p$(totalEstimado)+'</span></div>';
    if(pagoReal>0){
      html+='<div class="trow"><span class="tlbl">Pago real (retiro GP)</span><span class="pos">'+p$(pagoReal)+'</span></div>';
      html+='<div class="trow tot" style="background:#0A1628"><span class="tlbl">Diferencia (impuestos/cargos)</span><span class="'+(Math.abs(diff)<totalEstimado*0.05?'pos':'neg')+'">'+p$(diff)+'</span></div>';
    } else {
      html+='<div class="trow"><span class="tlbl" style="color:#F59E0B">⚠ Falta marcar el pago real</span><span class="tlbl">Categorizá el retiro de GP como "Pago TJ/MP" en Pendientes</span></div>';
    }
    html+='</div>';
    if(aportesGP.length){
      html+='<div class="sec" style="margin-top:10px">Gastos empresa via GP</div>';
      aportesGP.forEach(function(mv){
        html+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #334155;font-size:12px">';
        html+='<span style="color:#64748B">'+esc(mv.fecha||'')+' — '+esc(mv.nota||'')+'</span>';
        html+='<span class="neg">'+p$(+mv.monto)+'</span></div>';
      });
    }
    if(gastosPerso.length){
      html+='<div class="sec" style="margin-top:10px">Gastos personales</div>';
      gastosPerso.forEach(function(g){
        html+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #334155;font-size:12px">';
        html+='<span style="color:#64748B">'+esc(g.desc)+'</span>';
        html+='<span class="neg">'+p$(+g.monto)+'</span></div>';
      });
    }
    html+='</div>';
  });

  // Si no se mostro ninguna
  if(html.indexOf('tj-card')===-1){
    html+='<div class="empty">Sin movimientos con tarjeta o MP este mes.<br>Cuando haya aportes via tarjeta en GP o gastos personales cargados, aparecen aca.</div>';
  }

  // Agregar categoria especial para pago TJ en pendientes
  html+='<div class="divider"></div>';
  html+='<div class="info">Para registrar el pago real del resumen: andá a <strong>Pendientes</strong>, buscá el retiro de GP que usaste para pagar, seleccioná categoria <strong>💳 Pago TJ/MP</strong> y en observacion escribi el nombre de la tarjeta.</div>';

  el.innerHTML=html;
}

// ── RESUMEN ───────────────────────────────────────────────────────────────────
function rResumen(){
  var el=document.getElementById('p-resumen');
  var movs=getMovs().filter(function(m){return getOv(mvId(m)).done;});
  var gs=getGastos();
  var fijos=getFijos();

  // Ingresos/egresos de GP (solo clasificados)
  var lRet=0,lAp=0,hRet=0,hAp=0;
  movs.forEach(function(m){
    var ov=getOv(mvId(m));
    var inc=gpIsIncome(m);
    var amt=+m.monto;
    // Aportes via cuenta personal son ingresos
    if(m.cuenta==='Cuenta Loli'){if(inc)lRet+=amt;else lAp+=amt;}
    else{if(inc)hRet+=amt;else hAp+=amt;}
  });
  var lNet=lRet-lAp,hNet=hRet-hAp;

  // Gastos directos (no TJ ni MP - ya clasificados via movs)
  var lGV=0,hGV=0;
  gs.filter(function(g){return!isTJ(g.medio)&&!isMP(g.medio)&&g.cur==='ARS';}).forEach(function(g){
    var s=split(g.who,g.pct,+g.monto);lGV+=s.l;hGV+=s.h;
  });
  // Gastos con TJ/MP personales
  gs.filter(function(g){return(isTJ(g.medio)||isMP(g.medio))&&g.cur==='ARS';}).forEach(function(g){
    var s=split(g.who,g.pct,+g.monto);lGV+=s.l;hGV+=s.h;
  });

  // Fijos pagados
  var lGF=0,hGF=0;
  fijos.filter(function(f){return isPag(f.id)&&f.monto>0;}).forEach(function(f){
    var s=split(f.who,f.pct,+f.monto);lGF+=s.l;hGF+=s.h;
  });

  var lGasto=lGV+lGF,hGasto=hGV+hGF;
  var lSaldo=lNet-lGasto,hSaldo=hNet-hGasto;

  // Por categoria (movimientos clasificados)
  var porCat={};
  movs.forEach(function(m){
    var ov=getOv(mvId(m));if(!ov.cat)return;
    var s=split(ov.who||(m.cuenta==='Cuenta Loli'?'loli':'hugo'),ov.pct,+m.monto);
    if(!porCat[ov.cat])porCat[ov.cat]=0;
    porCat[ov.cat]+=s.l+s.h;
  });
  gs.forEach(function(g){
    if(!g.cat||g.cur!=='ARS')return;
    if(!porCat[g.cat])porCat[g.cat]=0;
    porCat[g.cat]+=+g.monto;
  });

  var sinClasif=getPending().length;

  var html='<div class="sec">'+MNL[cM]+' '+cY+'</div>';
  if(sinClasif>0){
    html+='<div class="warn-box" style="cursor:pointer" onclick="document.querySelectorAll(\'.tab\')[0].click()">⚠ '+sinClasif+' movimiento'+(sinClasif>1?'s':'')+' sin clasificar no estan incluidos. Ir a Pendientes →</div>';
  }

  html+='<div class="mgrid">';
  html+='<div class="metric"><div class="lbl">💜 Loli ingreso neto</div><div class="val pos">'+p$(lNet)+'</div></div>';
  html+='<div class="metric"><div class="lbl">💜 Loli gastos</div><div class="val neg">-'+p$(lGasto)+'</div></div>';
  html+='<div class="metric"><div class="lbl">💜 Loli queda</div><div class="val '+(lSaldo>=0?'pos':'neg')+'">'+p$(lSaldo)+'</div></div>';
  html+='<div class="metric"><div class="lbl">💙 Hugo ingreso neto</div><div class="val pos">'+p$(hNet)+'</div></div>';
  html+='<div class="metric"><div class="lbl">💙 Hugo gastos</div><div class="val neg">-'+p$(hGasto)+'</div></div>';
  html+='<div class="metric"><div class="lbl">💙 Hugo queda</div><div class="val '+(hSaldo>=0?'pos':'neg')+'">'+p$(hSaldo)+'</div></div>';
  html+='</div>';

  html+='<div class="sec">Detalle</div><div class="tbl">';
  html+='<div class="trow"><span class="tlbl">💜 Retiros de empresa</span><span class="pos">'+p$(lRet)+'</span></div>';
  if(lAp)html+='<div class="trow"><span class="tlbl">💜 Aportes a empresa</span><span class="neu">-'+p$(lAp)+'</span></div>';
  if(lGV)html+='<div class="trow"><span class="tlbl">💜 Gastos personales</span><span class="neg">-'+p$(lGV)+'</span></div>';
  if(lGF)html+='<div class="trow"><span class="tlbl">💜 Fijos pagados</span><span class="neg">-'+p$(lGF)+'</span></div>';
  html+='<div class="trow tot"><span class="tlbl">💜 Loli saldo</span><span class="'+(lSaldo>=0?'pos':'neg')+'">'+p$(lSaldo)+'</span></div>';
  html+='<div class="trow"><span class="tlbl">💙 Retiros de empresa</span><span class="pos">'+p$(hRet)+'</span></div>';
  if(hAp)html+='<div class="trow"><span class="tlbl">💙 Aportes a empresa</span><span class="neu">-'+p$(hAp)+'</span></div>';
  if(hGV)html+='<div class="trow"><span class="tlbl">💙 Gastos personales</span><span class="neg">-'+p$(hGV)+'</span></div>';
  if(hGF)html+='<div class="trow"><span class="tlbl">💙 Fijos pagados</span><span class="neg">-'+p$(hGF)+'</span></div>';
  html+='<div class="trow tot"><span class="tlbl">💙 Hugo saldo</span><span class="'+(hSaldo>=0?'pos':'neg')+'">'+p$(hSaldo)+'</span></div>';
  html+='<div class="trow tot" style="background:#0A1628"><span class="tlbl">📊 Total neto</span><span class="'+(lSaldo+hSaldo>=0?'pos':'neg')+'">'+p$(lSaldo+hSaldo)+'</span></div>';
  html+='</div>';

  var catKeys=Object.keys(porCat);
  if(catKeys.length){
    html+='<div class="sec">Por categoria</div><div class="tbl">';
    catKeys.sort(function(a,b){return porCat[b]-porCat[a];}).forEach(function(cid){
      var c=getCat(cid);
      html+='<div class="trow"><span class="tlbl">'+c.e+' '+c.n+'</span><span style="font-weight:700">'+p$(porCat[cid])+'</span></div>';
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

// ── CAPITAL ───────────────────────────────────────────────────────────────────
function rCapital(){
  var el=document.getElementById('p-capital');
  var ahoList=FD.aho?Object.values(FD.aho):[];
  var stock=(FD.cfg_aho&&FD.cfg_aho.stock_usd)?+FD.cfg_aho.stock_usd:0;
  var usdGP=stock>0?stock:ahoList.reduce(function(s,a){return s+(+a.usd||0);},0);
  var invList=FD.inv?Object.values(FD.inv):[];
  var invAct=invList.filter(function(i){return !i.vendido;});
  var invGP=invAct.reduce(function(s,i){return s+(+i.usd||0);},0);
  var caps=getCapital();
  var capAct=caps.filter(function(c){return !c.vendido;});
  var capUSD=capAct.reduce(function(s,c){return s+(+c.usd||0);},0);
  var capARS=capAct.reduce(function(s,c){return s+(+c.ars||0);},0);
  var totalUSD=usdGP+invGP+capUSD;

  var html='<div class="big"><div class="lbl">Capital total</div>';
  html+='<div class="num" style="color:#22D3EE">'+pU(totalUSD)+'</div>';
  if(capARS>0)html+='<div class="lbl" style="margin-top:6px">+ '+p$(capARS)+' en pesos</div>';
  html+='</div>';

  html+='<div class="sec">💵 Dolares GP ('+pU(usdGP)+')</div>';
  html+='<div class="card">';
  if(ahoList.length){
    ahoList.sort(function(a,b){return(a.fecha||'').localeCompare(b.fecha||'');}).forEach(function(a){
      html+='<div class="row" style="padding:5px 0;border-bottom:1px solid #334155;font-size:12px">';
      html+='<span style="color:#64748B">'+esc(a.fecha||'')+'</span>';
      html+='<span class="tag tu">'+pU(+a.usd||0)+'</span>';
      if(a.tc)html+='<span style="color:#64748B">TC $'+Math.round(+a.tc).toLocaleString('es-AR')+'</span>';
      html+='</div>';
    });
  }else{html+='<span style="font-size:12px;color:#64748B">Sin compras en GP</span>';}
  html+='</div>';

  if(invAct.length){
    html+='<div class="sec">🏗 Inversiones GP ('+pU(invGP)+')</div>';
    invAct.forEach(function(i){
      html+='<div class="card"><div class="row"><div class="col"><div class="tit">'+esc(i.desc||'')+'</div>';
      if(i.fecha)html+='<div class="sub"><span class="tag">'+esc(i.fecha)+'</span></div>';
      html+='</div><span style="font-weight:700;color:#F59E0B">'+pU(+i.usd||0)+'</span></div></div>';
    });
  }

  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;margin-bottom:8px">';
  html+='<div class="sec" style="margin:0">Activos adicionales</div>';
  html+='<button class="btn" onclick="openCap()">+ Agregar</button></div>';

  if(capAct.length){
    capAct.forEach(function(c){
      html+='<div class="card"><div class="row">';
      html+='<div class="col"><div class="tit">'+esc(c.desc)+'</div>';
      html+='<div class="sub"><span class="tag">'+(c.tipo==='usd'?'💵 Dolares':c.tipo==='inv'?'🏗 Inversion':'📦 Otro')+'</span>';
      if(c.fecha)html+='<span class="tag">'+esc(c.fecha)+'</span>';
      if(c.obs)html+='<span class="tag">'+esc(c.obs)+'</span>';
      html+='</div></div>';
      html+='<div style="text-align:right"><div style="font-weight:700;color:#22D3EE">'+pU(+c.usd||0)+'</div>';
      if(c.ars)html+='<div style="font-size:11px;color:#64748B">'+p$(+c.ars)+'</div>';
      html+='<button class="btn-del" onclick="delCap(\''+c._key+'\')">✕</button>';
      html+='</div></div></div>';
    });
  }else{html+='<div style="font-size:12px;color:#64748B;padding:8px 0">Sin activos adicionales.</div>';}
  el.innerHTML=html;
}

// ── MODALES ───────────────────────────────────────────────────────────────────
function oM(id){document.getElementById(id).style.display='flex';}
function cM(id){document.getElementById(id).style.display='none';}
function pw(pre,btn,who){
  _who[pre]=who;
  var mid='m-'+(pre==='g'?'g':'f');
  document.querySelectorAll('#'+mid+' .who-btn').forEach(function(b){b.className='who-btn';});
  btn.className='who-btn '+(who==='loli'?'wl':who==='hugo'?'wh':'ws');
  var pr=document.getElementById('m'+pre+'-pr');
  if(pr)pr.style.display=who==='shared'?'block':'none';
}
function fillCats(sid){
  var s=document.getElementById(sid);if(!s)return;
  s.innerHTML=CATS.map(function(c){return'<option value="'+c.id+'">'+c.e+' '+c.n+'</option>';}).join('');
}
function fillMeds(sid){
  var s=document.getElementById(sid);if(!s)return;
  s.innerHTML=MEDIOS.map(function(m){return'<option value="'+m+'">'+m+'</option>';}).join('');
}

// Gasto
function openG(){
  fillCats('mg-cat');fillMeds('mg-med');
  _who.g='shared';
  document.querySelectorAll('#m-g .who-btn').forEach(function(b){b.className='who-btn';});
  document.getElementById('mg-pr').style.display='block';
  ['mg-desc','mg-monto','mg-obs'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('mg-pct').value=50;document.getElementById('mg-ph').textContent=50;
  oM('m-g');setTimeout(function(){document.getElementById('mg-desc').focus();},80);
}
function saveG(){
  var desc=document.getElementById('mg-desc').value.trim();
  var monto=parseFloat(document.getElementById('mg-monto').value);
  if(!desc||!monto||monto<=0){alert('Completa descripcion y monto');return;}
  fbPush('fin_gastos/'+KEY(),{
    desc:desc,cat:document.getElementById('mg-cat').value,
    monto:monto,cur:document.getElementById('mg-cur').value,
    medio:document.getElementById('mg-med').value,
    who:_who.g,pct:+document.getElementById('mg-pct').value||50,
    obs:document.getElementById('mg-obs').value,
    fecha:new Date().toISOString().split('T')[0]
  });
  cM('m-g');
}

// Fijo
var _feid=null;
function openF(eid){
  fillCats('mf-cat');fillMeds('mf-med');
  _who.f='shared';_feid=eid||null;
  document.querySelectorAll('#m-f .who-btn').forEach(function(b){b.className='who-btn';});
  document.getElementById('mf-pr').style.display='block';
  if(eid){
    var f=getFijos().find(function(x){return x.id===eid;});if(!f)return;
    document.getElementById('mf-h').textContent='Editar fijo';
    document.getElementById('mf-nom').value=f.nom||'';
    document.getElementById('mf-cat').value=f.cat||'otro';
    document.getElementById('mf-monto').value=f.monto||'';
    document.getElementById('mf-cur').value=f.cur||'ARS';
    document.getElementById('mf-med').value=f.medio||'Efectivo';
    document.getElementById('mf-dia').value=f.dia||'';
    document.getElementById('mf-pct').value=f.pct||50;
    document.getElementById('mf-ph').textContent=100-(f.pct||50);
    _who.f=f.who||'shared';
    document.querySelectorAll('#m-f .who-btn').forEach(function(b){
      var w=b.textContent.includes('Loli')?'loli':b.textContent.includes('Hugo')?'hugo':'shared';
      if(w===_who.f)b.className='who-btn '+(w==='loli'?'wl':w==='hugo'?'wh':'ws');
    });
    document.getElementById('mf-pr').style.display=_who.f==='shared'?'block':'none';
  }else{
    document.getElementById('mf-h').textContent='Nuevo gasto fijo';
    document.getElementById('mf-nom').value='';document.getElementById('mf-monto').value='';
    document.getElementById('mf-dia').value='';document.getElementById('mf-pct').value=50;
    document.getElementById('mf-ph').textContent=50;
  }
  oM('m-f');setTimeout(function(){document.getElementById('mf-nom').focus();},80);
}
function saveF(){
  var nom=document.getElementById('mf-nom').value.trim();
  if(!nom){alert('El nombre es obligatorio');return;}
  var id=_feid||('f'+Date.now());
  fbSet('fin_fijos/'+id,{
    id:id,nom:nom,cat:document.getElementById('mf-cat').value,
    monto:parseFloat(document.getElementById('mf-monto').value)||0,
    cur:document.getElementById('mf-cur').value,
    medio:document.getElementById('mf-med').value,
    who:_who.f,pct:+document.getElementById('mf-pct').value||50,
    dia:document.getElementById('mf-dia').value||''
  });
  cM('m-f');
}
function delF(id){if(!confirm('Borrar fijo?'))return;fbRm('fin_fijos/'+id);}

// Capital
function openCap(){
  ['ca-desc','ca-usd','ca-ars','ca-obs'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('ca-fec').value=new Date().toISOString().split('T')[0];
  oM('m-cap');setTimeout(function(){document.getElementById('ca-desc').focus();},80);
}
function saveCap(){
  var desc=document.getElementById('ca-desc').value.trim();
  if(!desc){alert('La descripcion es obligatoria');return;}
  fbPush('fin_capital',{
    desc:desc,tipo:document.getElementById('ca-tipo').value,
    usd:parseFloat(document.getElementById('ca-usd').value)||0,
    ars:parseFloat(document.getElementById('ca-ars').value)||0,
    fecha:document.getElementById('ca-fec').value,
    obs:document.getElementById('ca-obs').value,vendido:false
  });
  cM('m-cap');
}
function delCap(key){if(!confirm('Borrar activo?'))return;fbRm('fin_capital/'+key);}
</script>
