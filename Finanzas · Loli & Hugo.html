<style>

/* MODAL */

select,input[type=text],input[type=number],input[type=password],textarea{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #334155;background:#0F172A;color:#F1F5F9}

.who-btn.sel-loli{border-color:#D4537E;background:#D4537E22;color:#D4537E}
.who-btn.sel-hugo{border-color:#3B82F6;background:#3B82F622;color:#60A5FA}
.who-btn.sel-shared{border-color:#10B981;background:#10B98122;color:#34D399}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:9px;border-radius:8px;border:1px solid #334155;background:none;color:#94A3B8;cursor:pointer}
.btn-save{flex:2;padding:9px;border-radius:8px;border:none;background:#3B82F6;color:#fff;cursor:pointer;font-weight:700}
.btn-save:hover{background:#2563EB}
.btn-danger{padding:6px 12px;border-radius:8px;border:none;background:#EF444422;color:#EF4444;cursor:pointer;font-size:12px}

.gp-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1E293B;border:1px solid #334155;margin-bottom:14px;font-size:12px;color:#64748B}
.gp-dot{width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0}
.gp-dot.loading{background:#F59E0B;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty-state{text-align:center;padding:32px 20px;color:#64748B;font-size:13px}
.logout-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#64748B;padding:4px 8px;border-radius:6px}
.logout-btn:hover{background:#334155}
.tag-usd{background:#06B6D422;color:#06B6D4;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700}

details summary{cursor:pointer;font-size:12px;color:#64748B;padding:4px 0}
</style>

<body>

<div id="login-screen">
  <div class="login-card">

<!-- MODAL GASTO -->

<!-- MODAL CATEGORIA -->
<div class="modal-overlay" id="modal-cat" style="display:none" onclick="if(event.target===this)closeModal(&#39;modal-cat&#39;)">

    <h3>Nueva categoría</h3>
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" id="nc-nombre" placeholder="Ej: Educación, Hogar...">
    </div>
    <div class="form-group">

      <input type="text" id="nc-emoji" placeholder="🏠" maxlength="4" style="width:80px">

      <button class="btn-cancel" onclick="closeModal(&#39;modal-cat&#39;)">Cancelar</button>
      <button class="btn-save" onclick="saveCat()">Guardar</button>

</div>

<script>
var PASSWORD='3194';
var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var currentMonth=4,currentYear=2026;
var modalGastoType='variable';
var selectedWhoModal='shared';
var gpStatus='loading';
var gpMovs=[];
var localData={};
var DB;

// CATEGORIAS BASE
var DEFAULT_CATS=[
  {id:'personal',nombre:'Gasto personal',emoji:'💸',usd:false},
  {id:'salud',nombre:'Salud',emoji:'🏥',usd:false},
  {id:'servicio',nombre:'Servicio / Expensa',emoji:'🔧',usd:false},
  {id:'dolares',nombre:'Compra dólares',emoji:'💵',usd:true},
  {id:'inversion',nombre:'Inversión / Casa',emoji:'🏠',usd:false},
  {id:'devolucion',nombre:'Devolución a empresa',emoji:'🔄',usd:false},
  {id:'utilidad',nombre:'Retiro utilidad',emoji:'💰',usd:false},
  {id:'viaje',nombre:'Viaje',emoji:'✈️',usd:false},
  {id:'educacion',nombre:'Educación',emoji:'📚',usd:false},
  {id:'otro',nombre:'Otro',emoji:'📦',usd:false}
];

firebase.initializeApp({
  apiKey:"AIzaSyDhuSP_WTWI3hqf5GqgFExkptFfpqJUn50",
  authDomain:"gestion-prop.firebaseapp.com",
  databaseURL:"https://gestion-prop-default-rtdb.firebaseio.com",
  projectId:"gestion-prop"
});
DB=firebase.database();

// LOGIN
document.getElementById('pin-input').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
function tryLogin(){
  var val=document.getElementById('pin-input').value;
  if(val===PASSWORD){try{sessionStorage.setItem('fin_auth','1');}catch(e){}showApp();}
  else{var err=document.getElementById('login-error');err.style.display='block';document.getElementById('pin-input').value='';setTimeout(function(){err.style.display='none';},2000);}
}
function doLogout(){try{sessionStorage.removeItem('fin_auth');}catch(e){}document.getElementById('app-screen').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('pin-input').value='';}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app-screen').style.display='block';loadLocal();loadGP();}
try{if(sessionStorage.getItem('fin_auth')==='1')showApp();}catch(e){}

// LOCAL DATA
function KEY(){return currentYear+'-'+String(currentMonth).padStart(2,'0');}
function getMonthData(){var k=currentYear+'-'+currentMonth;if(!localData[k])localData[k]={fijos:[],variables:[],ahorros:[],catOverrides:{},obsMovs:{}};return localData[k];}
function saveLocal(){try{localStorage.setItem('fin_v2',JSON.stringify(localData));}catch(e){}}
function loadLocal(){try{var d=localStorage.getItem('fin_v2');if(d)localData=JSON.parse(d);}catch(e){}}
function getCats(){
  var base=DEFAULT_CATS.slice();
  var custom=(localData.customCats||[]);
  return base.concat(custom);
}

// FIREBASE GP
function loadGP(){
  gpStatus='loading';
  DB.ref('movs').on('value',function(snap){
    var all=snap.exists()?snap.val():{};
    gpMovs=Object.values(all).filter(function(mv){return mv.cuenta==='Cuenta Loli'||mv.cuenta==='Cuenta Hugo';});
    gpStatus='ok';
    render();
  },function(){gpStatus='error';render();});
}

function getMovsMes(){
  var mesKey=KEY();
  return gpMovs.filter(function(mv){return mv.fecha&&mv.fecha.startsWith(mesKey);})
    .sort(function(a,b){return (a.fecha||'').localeCompare(b.fecha||'');});
}

// NAV
function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  document.getElementById('month-label').textContent=MONTHS[currentMonth]+' '+currentYear;
  render();
}
function switchTab(el,name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  ['resumen','movimientos','fijos','variables','ahorros','config'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  render();
}

// HELPERS
function fmt(n,cur){if(cur==='USD')return 'U$S '+Math.round(n).toLocaleString('es-AR');return '$ '+Math.round(n).toLocaleString('es-AR');}
function fmtN(n){return '$ '+Math.round(n).toLocaleString('es-AR');}
function badgeWho(who){
  if(who==='loli')return '<span class="badge badge-loli">💜 Loli</span>';
  if(who==='hugo')return '<span class="badge badge-hugo">💙 Hugo</span>';
  return '<span class="badge badge-shared">🤝 50/50</span>';
}
function getCatById(id){return getCats().filter(function(c){return c.id===id;})[0]||{nombre:'Sin categoría',emoji:'📦',usd:false};}
function personShare(item){
  if(item.who==='loli')return{loli:item.amount,hugo:0};
  if(item.who==='hugo')return{loli:0,hugo:item.amount};
  return{loli:item.amount/2,hugo:item.amount/2};
}
function getMovKey(mv){return (mv.fecha||'')+'__'+(mv.concepto||mv.nota||'')+'__'+(mv.monto||0);}
function getMovOverride(mv){var d=getMonthData();var k=getMovKey(mv);return d.catOverrides&&d.catOverrides[k]?d.catOverrides[k]:{cat:'',who:mv.cuenta==='Cuenta Loli'?'loli':'hugo',pct:100,obs:''};}
function setMovOverride(mv,override){var d=getMonthData();if(!d.catOverrides)d.catOverrides={};d.catOverrides[getMovKey(mv)]=override;saveLocal();}

// RENDER PRINCIPAL
function render(){
  var active=document.querySelector('.tab.active');
  var name='resumen';
  if(active){var t=active.textContent;if(t.includes('Movim'))name='movimientos';else if(t.includes('Fijo'))name='fijos';else if(t.includes('Vari'))name='variables';else if(t.includes('USD'))name='ahorros';else if(t.includes('Config'))name='config';}
  if(name==='resumen')renderResumen();
  else if(name==='movimientos')renderMovimientos();
  else if(name==='fijos')renderFijos();
  else if(name==='variables')renderVariables();
  else if(name==='ahorros')renderAhorros();
  else if(name==='config')renderConfig();
}

// ── MOVIMIENTOS ───────────────────────────────────────────────────────────────
function renderMovimientos(){
  var el=document.getElementById('tab-movimientos');if(!el)return;
  var movs=getMovsMes();
  var cats=getCats();

  var gpBanner='<div id="gp-banner" class="gp-banner">'+(gpStatus==='loading'?'<div class="gp-dot loading"></div><span>Conectando con GestionProp...</span>':gpStatus==='ok'?'<div class="gp-dot"></div><span>GestionProp conectado · '+movs.length+' movimientos este mes</span>':'<div class="gp-dot" style="background:#EF4444"></div><span>Sin conexión</span>')+'</div>';

  if(!movs.length){el.innerHTML=gpBanner+'<div class="empty-state">📭<br>Sin movimientos este mes en GestionProp</div>';return;}

  var loliMovs=movs.filter(function(mv){return mv.cuenta==='Cuenta Loli';});
  var hugoMovs=movs.filter(function(mv){return mv.cuenta==='Cuenta Hugo';});

  function renderMovGroup(list,quien,color){
    if(!list.length)return '';
    var total=list.reduce(function(s,mv){return s+(mv.tipo==='retiro'?Number(mv.monto||0):-Number(mv.monto||0));},0);
    var html='<div class="section-title" style="color:'+color+'">'+quien+' — '+fmtN(total)+'</div>';
    list.forEach(function(mv,i){
      var monto=Number(mv.monto||0);
      var esRetiro=mv.tipo==='retiro';
      var override=getMovOverride(mv);
      var cat=override.cat?getCatById(override.cat):null;
      var movKey=getMovKey(mv);
      var movIdx=gpMovs.indexOf(mv);

      html+='<div class="mov-row" id="movrow-'+movIdx+'">';
      html+='<div class="mov-top">';
      html+='<div class="mov-concepto">'+(mv.nota||mv.concepto||'Sin concepto')+'</div>';
      html+='<div class="mov-monto" style="color:'+(esRetiro?'#F87171':'#34D399')+'">'+(esRetiro?'+':'-')+fmtN(monto)+'</div>';
      html+='</div>';
      html+='<div class="mov-meta">';
      html+='<span class="mov-fecha">'+mv.fecha+'</span>';
      html+='<span class="mov-medio">'+esc(mv.cuenta_caja||mv.medio||'')+'</span>';
      if(cat)html+='<span class="badge badge-cat">'+cat.emoji+' '+cat.nombre+'</span>';
      if(cat&&cat.usd)html+='<span class="tag-usd">→ USD</span>';
      html+='</div>';

      // Categorias
      html+='<div class="cat-row">';
      html+='<span style="font-size:11px;color:#64748B;margin-right:4px">Categoría:</span>';
      cats.forEach(function(c){
        var sel=override.cat===c.id?'sel':'';
        html+='<button class="cat-btn '+sel+'" onclick="setCat(\''+movKey+'\',\''+c.id+'\')">'+c.emoji+' '+c.nombre+'</button>';
      });
      html+='</div>';

      // Asignacion
      html+='<div class="asig-row">';
      html+='<span class="asig-label">Asignar a:</span>';
      var w=override.who||quien.toLowerCase();
      html+='<button class="asig-btn '+(w==='loli'?'sel-loli':'')+'" onclick="setWho(\''+movKey+'\',\'loli\')">💜 Loli</button>';
      html+='<button class="asig-btn '+(w==='hugo'?'sel-hugo':'')+'" onclick="setWho(\''+movKey+'\',\'hugo\')">💙 Hugo</button>';
      html+='<button class="asig-btn '+(w==='shared'?'sel-shared':'')+'" onclick="setWho(\''+movKey+'\',\'shared\')">🤝 50/50</button>';
      if(w==='loli'||w==='hugo'){
        // nada extra
      } else {
        html+='<input class="pct-input" type="number" min="1" max="100" value="'+(override.pct||50)+'" onchange="setPct(\''+movKey+'\',this.value)" style="margin-left:4px"/> <span style="font-size:11px;color:#64748B">% Loli</span>';
      }
      html+='</div>';

      // Observacion
      html+='<textarea class="obs-input" placeholder="Observación (opcional)..." rows="1" onchange="setObs(\''+movKey+'\',this.value)">'+esc(override.obs||'')+'</textarea>';
      html+='</div>';
    });
    return html;
  }

  el.innerHTML=gpBanner+
    renderMovGroup(loliMovs,'Loli','#D4537E')+
    renderMovGroup(hugoMovs,'Hugo','#60A5FA');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setCat(movKey,catId){
  var mv=findMovByKey(movKey);if(!mv)return;
  var o=getMovOverride(mv);o.cat=o.cat===catId?'':catId;setMovOverride(mv,o);renderMovimientos();}
function setWho(movKey,who){
  var mv=findMovByKey(movKey);if(!mv)return;
  var o=getMovOverride(mv);o.who=who;if(who!=='shared')o.pct=100;setMovOverride(mv,o);renderMovimientos();}
function setPct(movKey,val){
  var mv=findMovByKey(movKey);if(!mv)return;
  var o=getMovOverride(mv);o.pct=Number(val)||50;setMovOverride(mv,o);}
function setObs(movKey,val){
  var mv=findMovByKey(movKey);if(!mv)return;
  var o=getMovOverride(mv);o.obs=val;setMovOverride(mv,o);}
function findMovByKey(movKey){
  return gpMovs.filter(function(mv){return getMovKey(mv)===movKey;})[0]||null;}

// ── RESUMEN ───────────────────────────────────────────────────────────────────
function renderResumen(){
  var el=document.getElementById('tab-resumen');if(!el)return;
  var d=getMonthData();
  var movs=getMovsMes();

  // Calcular totales de movimientos GP
  var loliRetiros=0,hugoRetiros=0,loliAportes=0,hugoAportes=0;
  var loliReal=0,hugoReal=0; // después de reasignación
  var porCat={};

  movs.forEach(function(mv){
    var monto=Number(mv.monto||0);
    var override=getMovOverride(mv);
    var esRetiro=mv.tipo==='retiro';
    var quien=mv.cuenta==='Cuenta Loli'?'loli':'hugo';

    if(esRetiro){if(quien==='loli')loliRetiros+=monto;else hugoRetiros+=monto;}
    else{if(quien==='loli')loliAportes+=monto;else hugoAportes+=monto;}

    // Asignacion real
    var who=override.who||quien;
    if(esRetiro){
      if(who==='shared'){var pct=(override.pct||50)/100;loliReal+=monto*pct;hugoReal+=monto*(1-pct);}
      else if(who==='loli')loliReal+=monto;
      else hugoReal+=monto;
    }

    // Por categoria
    if(override.cat){
      if(!porCat[override.cat])porCat[override.cat]=0;
      porCat[override.cat]+=monto;
    }
  });

  // Gastos fijos y variables
  var all=(d.fijos||[]).concat(d.variables||[]);
  var loliGastos=0,hugoGastos=0;
  all.forEach(function(item){var s=personShare(item);loliGastos+=s.loli;hugoGastos+=s.hugo;});

  var totalGastos=loliGastos+hugoGastos;
  var totalEntradas=(loliRetiros+hugoRetiros)-(loliAportes+hugoAportes);
  var queda=totalEntradas-totalGastos;
  var lPct=totalGastos>0?(loliGastos/totalGastos*100):50;

  // Ahorro USD
  var totalUSD=(d.ahorros||[]).reduce(function(s,a){return s+(a.tipo==='deposito'?a.amount:-a.amount);},0);

  var html='<div id="gp-banner" class="gp-banner">'+(gpStatus==='ok'?'<div class="gp-dot"></div><span>GestionProp conectado</span>':'<div class="gp-dot loading"></div><span>Conectando...</span>')+'</div>';

  html+='<div class="summary-grid">';
  html+='<div class="metric-card"><div class="metric-label">💜 Loli retiró</div><div class="metric-value" style="color:#D4537E">'+fmtN(loliRetiros)+'</div></div>';
  html+='<div class="metric-card"><div class="metric-label">💙 Hugo retiró</div><div class="metric-value" style="color:#60A5FA">'+fmtN(hugoRetiros)+'</div></div>';
  html+='<div class="metric-card"><div class="metric-label">💜 Loli (real)</div><div class="metric-value" style="color:#D4537E">'+fmtN(loliReal)+'</div></div>';
  html+='<div class="metric-card"><div class="metric-label">💙 Hugo (real)</div><div class="metric-value" style="color:#60A5FA">'+fmtN(hugoReal)+'</div></div>';
  html+='<div class="metric-card"><div class="metric-label">💵 Ahorro USD</div><div class="metric-value" style="color:#06B6D4">U$S '+Math.round(totalUSD).toLocaleString('es-AR')+'</div></div>';
  html+='</div>';

  // Retiros GP
  html+='<div class="section-title">Movimientos GestionProp</div>';
  html+='<div class="resumen-block">';
  html+='<div class="resumen-row"><span class="resumen-label">💜 Loli retiros</span><span style="color:#F87171;font-weight:700">'+fmtN(loliRetiros)+'</span></div>';
  html+='<div class="resumen-row"><span class="resumen-label">💜 Loli aportes</span><span style="color:#34D399;font-weight:700">'+fmtN(loliAportes)+'</span></div>';
  html+='<div class="resumen-row"><span class="resumen-label">💙 Hugo retiros</span><span style="color:#F87171;font-weight:700">'+fmtN(hugoRetiros)+'</span></div>';
  html+='<div class="resumen-row"><span class="resumen-label">💙 Hugo aportes</span><span style="color:#34D399;font-weight:700">'+fmtN(hugoAportes)+'</span></div>';
  html+='</div>';

  // Gastos
  if(totalGastos>0){
    html+='<div class="section-title">Gastos cargados (fijos + variables)</div>';
    html+='<div class="resumen-block">';
    html+='<div class="resumen-row"><div><span style="color:#D4537E;font-weight:700">💜 Loli</span><div class="split-bar"><div class="split-bar-fill" style="width:'+lPct.toFixed(0)+'%;background:#D4537E"></div></div><span style="font-size:11px;color:#64748B">'+lPct.toFixed(0)+'%</span></div><span style="font-weight:700;color:#D4537E">'+fmtN(loliGastos)+'</span></div>';
    html+='<div class="resumen-row"><div><span style="color:#60A5FA;font-weight:700">💙 Hugo</span><div class="split-bar"><div class="split-bar-fill" style="width:'+(100-lPct).toFixed(0)+'%;background:#3B82F6"></div></div><span style="font-size:11px;color:#64748B">'+(100-lPct).toFixed(0)+'%</span></div><span style="font-weight:700;color:#60A5FA">'+fmtN(hugoGastos)+'</span></div>';
    html+='</div>';
  }

  // Por categoria
  var catKeys=Object.keys(porCat);
  if(catKeys.length){
    html+='<div class="section-title">Por categoría (movimientos GP)</div>';
    html+='<div class="resumen-block">';
    catKeys.forEach(function(cid){
      var c=getCatById(cid);
      html+='<div class="resumen-row"><span class="resumen-label">'+c.emoji+' '+c.nombre+'</span><span style="font-weight:700">'+fmtN(porCat[cid])+'</span></div>';
    });
    html+='</div>';
  }

  // Balance final
  html+='<div class="section-title">Balance del mes</div>';
  html+='<div class="resumen-block">';
  html+='<div class="resumen-row total"><span class="resumen-label">Total neto GP</span><span style="font-weight:700;color:'+(totalEntradas>=0?'#34D399':'#F87171')+'">'+fmtN(totalEntradas)+'</span></div>';
  if(totalGastos>0)html+='<div class="resumen-row total"><span class="resumen-label">Gastos cargados</span><span style="font-weight:700;color:#F87171">- '+fmtN(totalGastos)+'</span></div>';
  html+='<div class="resumen-row total"><span class="resumen-label">'+(queda>=0?'✅ Queda':'⚠️ Diferencia')+'</span><span style="font-weight:700;color:'+(queda>=0?'#34D399':'#F87171')+'">'+fmtN(Math.abs(queda))+'</span></div>';
  if(queda<0)html+='<div style="padding:10px 14px"><div style="display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:#F59E0B11;border:1px solid #F59E0B33"><span style="flex:1;font-weight:700;color:#F59E0B">😄 "Desapareció"</span><span style="font-weight:700;color:#F59E0B">'+fmtN(Math.abs(queda))+'</span></div></div>';
  html+='</div>';

  el.innerHTML=html;
}

// ── FIJOS ─────────────────────────────────────────────────────────────────────
function renderFijos(){
  var el=document.getElementById('tab-fijos');if(!el)return;
  var d=getMonthData();
  el.innerHTML='<div class="section-title">Gastos fijos del mes</div><div id="fijos-list"></div><button class="add-btn" onclick="openGasto(\'fijo\')">＋ Agregar gasto fijo</button>';
  renderGastoList('fijos-list',d.fijos||[],'fijo');
}
function renderVariables(){
  var el=document.getElementById('tab-variables');if(!el)return;
  var d=getMonthData();
  el.innerHTML='<div class="section-title">Gastos variables del mes</div><div id="variables-list"></div><button class="add-btn" onclick="openGasto(\'variable\')">＋ Agregar gasto</button>';
  renderGastoList('variables-list',d.variables||[],'variable');
}
function renderGastoList(id,items,type){
  var el=document.getElementById(id);if(!el)return;
  if(!items||!items.length){el.innerHTML='<div class="empty-state">📭<br>Sin registros este mes</div>';return;}
  var cats=getCats();
  el.innerHTML=items.map(function(item,i){
    var cat=getCatById(item.cat||'otro');
    var who=item.who||'shared';
    var whoLabel=who==='loli'?'💜 Loli':who==='hugo'?'💙 Hugo':'🤝 50/50';
    var whoBadge=who==='loli'?'badge-loli':who==='hugo'?'badge-hugo':'badge-shared';
    return '<div class="expense-row">'+
      '<div><div class="expense-name">'+esc(item.desc)+'</div>'+
      '<div class="expense-rubro">'+cat.emoji+' '+cat.nombre+'</div></div>'+
      '<span class="badge '+whoBadge+'">'+whoLabel+'</span>'+
      '<span class="amount" style="color:#F87171">'+fmt(item.amount,item.currency||'ARS')+'</span>'+
      '<button class="btn-icon" onclick="removeGasto(\''+type+'\','+i+')">🗑</button>'+
      '</div>';
  }).join('');
}

// ── AHORROS ───────────────────────────────────────────────────────────────────
function renderAhorros(){
  var el=document.getElementById('tab-ahorros');if(!el)return;
  var d=getMonthData();

  // Sumar los movimientos GP categorizados como dolares
  var movs=getMovsMes();
  var gpUSD=0;
  movs.forEach(function(mv){
    var o=getMovOverride(mv);
    if(o.cat==='dolares')gpUSD+=Number(mv.monto||0);
  });

  var total=(d.ahorros||[]).reduce(function(s,a){return s+(a.tipo==='deposito'?a.amount:-a.amount);},0);

  el.innerHTML='<div class="usd-card">'+
    '<div class="usd-label">Ahorro total en dólares (manual)</div>'+
    '<div class="usd-amount" style="color:#06B6D4">U$S '+Math.round(total).toLocaleString('es-AR')+'</div>'+
    (gpUSD>0?'<div class="usd-label" style="margin-top:8px;color:#F59E0B">+ '+fmtN(gpUSD)+' categorizados como compra USD en movimientos</div>':'')+
    '</div>'+
    '<div class="section-title">Movimientos manuales</div>'+
    '<div id="ahorros-list"></div>'+
    '<button class="add-btn" onclick="openGasto(\'ahorro\')">＋ Registrar movimiento USD</button>';

  var listEl=document.getElementById('ahorros-list');
  if(!(d.ahorros||[]).length){listEl.innerHTML='<div class="empty-state">Sin movimientos manuales este mes</div>';return;}
  listEl.innerHTML=(d.ahorros||[]).map(function(a,i){
    return '<div class="mov-row">'+
      '<div class="mov-top">'+
      '<div class="mov-concepto">'+esc(a.desc)+'</div>'+
      '<div class="mov-monto" style="color:'+(a.tipo==='deposito'?'#34D399':'#F87171')+'">'+(a.tipo==='deposito'?'+':'-')+' U$S '+Math.round(a.amount).toLocaleString('es-AR')+'</div>'+
      '</div>'+
      '<div style="display:flex;justify-content:flex-end"><button class="btn-icon" onclick="removeGasto(\'ahorro\','+i+')">🗑</button></div>'+
      '</div>';
  }).join('');
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
function renderConfig(){
  var el=document.getElementById('tab-config');if(!el)return;
  var cats=getCats();
  var custom=localData.customCats||[];

  var html='<div class="config-section"><div class="config-title">Categorías del sistema</div>';
  DEFAULT_CATS.forEach(function(c){
    html+='<div class="cat-item"><span>'+c.emoji+' '+c.nombre+(c.usd?' <span class="tag-usd">→ USD</span>':'')+'</span><span style="font-size:11px;color:#64748B">Base</span></div>';
  });
  html+='</div>';

  html+='<div class="config-section"><div class="config-title" style="display:flex;justify-content:space-between;align-items:center">Categorías personalizadas <button class="btn-save" style="padding:5px 12px;font-size:12px" onclick="openModal(\'modal-cat\')">＋ Nueva</button></div>';
  if(!custom.length){html+='<div style="color:#64748B;font-size:13px;padding:8px 0">Sin categorías personalizadas</div>';}
  custom.forEach(function(c,i){
    html+='<div class="cat-item"><span>'+esc(c.emoji||'📦')+' '+esc(c.nombre)+(c.usd?' <span class="tag-usd">→ USD</span>':'')+'</span><button class="btn-danger" onclick="deleteCat('+i+')">Borrar</button></div>';
  });
  html+='</div>';

  html+='<div class="config-section"><div class="config-title">Gastos fijos recurrentes</div><p style="font-size:12px;color:#64748B;margin-bottom:8px">Los gastos que cargues en la pestaña Fijos se mantienen mes a mes.</p></div>';

  el.innerHTML=html;
}

function deleteCat(i){
  if(!localData.customCats)return;
  localData.customCats.splice(i,1);
  saveLocal();renderConfig();
}

// ── MODALES ───────────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).style.display='flex';}
function closeModal(id){document.getElementById(id).style.display='none';}

function openGasto(type){
  modalGastoType=type;
  selectedWhoModal='shared';
  document.getElementById('mg-desc').value='';
  document.getElementById('mg-amount').value='';
  document.getElementById('mg-currency').value=type==='ahorro'?'USD':'ARS';
  document.querySelectorAll('.who-btn').forEach(function(b){b.className='who-btn';});

  // Llenar categorias
  var catSel=document.getElementById('mg-cat');
  catSel.innerHTML=getCats().map(function(c){return '<option value="'+c.id+'">'+c.emoji+' '+c.nombre+'</option>';}).join('');

  var isA=type==='ahorro';
  document.getElementById('mg-rubro-group').style.display=isA?'none':'';
  document.getElementById('mg-who-group').style.display=isA?'none':'';
  document.getElementById('mg-ahorro-group').style.display=isA?'':'none';
  document.getElementById('modal-gasto-title').textContent=isA?'Movimiento USD':type==='fijo'?'Gasto fijo':'Gasto variable';
  document.getElementById('mg-amount-label').textContent=isA?'Monto (U$S)':'Monto ($)';
  openModal('modal-gasto');
  setTimeout(function(){document.getElementById('mg-desc').focus();},100);
}

function selectWhoModal(who,btn){
  selectedWhoModal=who;
  document.querySelectorAll('.who-btn').forEach(function(b){b.className='who-btn';});
  btn.className='who-btn sel-'+who;
}

function saveGasto(){
  var desc=document.getElementById('mg-desc').value.trim();
  var amount=parseFloat(document.getElementById('mg-amount').value);
  var currency=document.getElementById('mg-currency').value;
  if(!desc||!amount||amount<=0){document.getElementById('mg-desc').style.borderColor='#EF4444';setTimeout(function(){document.getElementById('mg-desc').style.borderColor='';},1500);return;}
  var d=getMonthData();
  var cat=document.getElementById('mg-cat')?document.getElementById('mg-cat').value:'otro';
  if(modalGastoType==='ahorro'){
    if(!d.ahorros)d.ahorros=[];
    d.ahorros.push({desc:desc,amount:amount,tipo:document.getElementById('mg-ahorro-type').value});
  } else if(modalGastoType==='fijo'){
    if(!d.fijos)d.fijos=[];
    d.fijos.push({desc:desc,amount:amount,currency:currency,who:selectedWhoModal,cat:cat});
  } else {
    if(!d.variables)d.variables=[];
    d.variables.push({desc:desc,amount:amount,currency:currency,who:selectedWhoModal,cat:cat});
  }
  closeModal('modal-gasto');saveLocal();render();
  var a=document.querySelector('.tab.active');if(a)a.click();
}

function removeGasto(type,idx){
  var d=getMonthData();
  if(type==='fijo')d.fijos.splice(idx,1);
  else if(type==='variable')d.variables.splice(idx,1);
  else if(type==='ahorro')d.ahorros.splice(idx,1);
  saveLocal();render();
  var a=document.querySelector('.tab.active');if(a)a.click();
}

function saveCat(){
  var nombre=document.getElementById('nc-nombre').value.trim();
  var emoji=document.getElementById('nc-emoji').value.trim()||'📦';
  var usd=document.getElementById('nc-usd').value==='1';
  if(!nombre){alert('El nombre es obligatorio');return;}
  if(!localData.customCats)localData.customCats=[];
  localData.customCats.push({id:'custom_'+Date.now(),nombre:nombre,emoji:emoji,usd:usd});
  saveLocal();closeModal('modal-cat');renderConfig();
}
</script>
